name: Answer remaining Qs
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          SIG = "\n\n— Sonix Mx"
          answers = {
              "13567023777": "Hola! Sí, es bocina JBL 100% original. Saludos!",
              "13567781190": "Hola! La bocina está funcional al 100%. Solo marcas estéticas de uso normales. Probada antes de enviar.",
              "13567031637": "Hola! Sí, enciende y reproduce música perfectamente. Toda la funcionalidad al 100%, probada antes de enviar.",
          }
          for qid, text in answers.items():
              r = requests.post("https://api.mercadolibre.com/answers", headers=h,
                  json={"question_id": int(qid), "text": text + SIG}, timeout=15)
              print(f"{qid}: {r.status_code}")
              if r.status_code != 200:
                  print(f"  err: {r.text[:200]}")
          PY
