name: Answer remaining
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          SIG = "\n\n— Sonix Mx"
          answers = {
              "13567050281": "Hola! Incluye la bocina y su cable de carga original. Todo lo que viene está en las fotos.",
              "13567800912": "Hola! Es producto original JBL. La procedencia puede variar según el lote del fabricante.",
              "13567823388": "Hola! Buenas tardes, sí viene con cable de carga original.",
              "13567085253": "Hola! Tiene uso moderado, pero está 100% funcional y probada antes de enviar. Solo marcas estéticas normales de uso.",
          }
          for qid, text in answers.items():
              r = requests.post("https://api.mercadolibre.com/answers", headers=h,
                  json={"question_id": int(qid), "text": text + SIG}, timeout=15)
              print(f"{qid}: {r.status_code}")
          PY
