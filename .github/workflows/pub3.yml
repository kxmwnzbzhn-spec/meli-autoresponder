name: Buds retry + Flip7 Rojo/Morado (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, io, sys
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          def upload_pics_from(pids_list, limit=11):
              all_urls = []
              for pid in pids_list:
                  pr = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
                  urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[])]
                  all_urls.extend(urls)
              ids = []
              for u in all_urls[:limit]:
                  try:
                      u2 = u.replace("-F.jpg","-O.jpg")
                      rr = requests.get(u2, timeout=15)
                      if rr.status_code != 200 or len(rr.content) < 3000:
                          rr = requests.get(u, timeout=15)
                      im = Image.open(io.BytesIO(rr.content))
                      if im.mode != "RGB":
                          if im.mode in ("RGBA","LA","P"):
                              bg = Image.new("RGB", im.size, (255,255,255))
                              if im.mode == "P": im = im.convert("RGBA")
                              bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                              im = bg
                          else: im = im.convert("RGB")
                      w,h = im.size; ss = min(1200/w, 1200/h)
                      nw, nh = int(w*ss), int(h*ss)
                      im = im.resize((nw,nh), Image.LANCZOS)
                      c = Image.new("RGB", (1200,1200), (255,255,255))
                      c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                      buf = io.BytesIO(); c.save(buf, "JPEG", quality=92)
                      up = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                          headers={"Authorization": f"Bearer {AT}"}, files={"file":("p.jpg",buf.getvalue(),"image/jpeg")})
                      if up.status_code < 400: ids.append({"id": up.json()["id"]})
                  except Exception as e:
                      print(f"  pic err: {e}")
              return ids

          # === 1. Redmi Buds 4 Lite Negro refurbished (RETRY con warranty 90 días) ===
          print("\n=== Redmi Buds 4 Lite ===")
          pics = upload_pics_from(["MLM40336571"], 11)
          print(f"fotos: {len(pics)}")
          attrs_buds = [
              {"id":"BRAND","value_name":"Xiaomi"},{"id":"MODEL","value_name":"Redmi Buds 4 Lite"},
              {"id":"LINE","value_name":"Redmi Buds"},{"id":"MPN","value_name":"M2231E1"},
              {"id":"GTIN","value_name":"6934177767203"},
              {"id":"MANUFACTURER","value_name":"Xiaomi"},
              {"id":"SELLER_SKU","value_name":"XIAOMI-REDMI-BUDS4L-NGR-001"},
              {"id":"COLOR","value_name":"Negro"},{"id":"MAIN_COLOR","value_name":"Negro"},
              {"id":"ITEM_CONDITION","value_name":"Reacondicionado"},{"id":"GRADING","value_name":"Excelente"},
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"IS_WATERPROOF","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"Sí"},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              {"id":"HEADPHONE_FORMAT","value_name":"In-ear"},
              {"id":"CONNECTIVITY","value_name":"Inalámbrico"},
              {"id":"MAX_BATTERY_AUTONOMY","value_name":"5 h","value_struct":{"number":5,"unit":"h"}},
              {"id":"IP_CLASSIFICATION","value_name":"IPX4"},
          ]
          desc_buds = (
              "Audifonos inalambricos Xiaomi Redmi Buds 4 Lite color negro REACONDICIONADOS "
              "en excelente estado, probados y funcionando al 100%. Se entregan con caja y cable USB-C de carga. "
              "Reacondicionamiento profesional con prueba de sonido, microfono y bateria. "
              "Bluetooth 5.3, microfono con reduccion de ruido, controles tactiles, IPX4 resistentes al sudor, "
              "hasta 5 horas de autonomia por carga (20h con estuche). "
              "Envio GRATIS con Mercado Envios. Facturamos si se requiere."
          )
          item_buds = {
              "title":"Xiaomi Redmi Buds 4 Lite Audifonos Bluetooth Negro",
              "category_id":"MLM5072","price":149,"currency_id":"MXN",
              "available_quantity":1,"buying_mode":"buy_it_now",
              "listing_type_id":"gold_pro","condition":"refurbished",
              "pictures":pics,"attributes":attrs_buds,
              "sale_terms":[
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"90 días"},
              ],
              "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=H, json=item_buds)
          print(f"  buds POST={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(f"  ERR: {json.dumps(resp, ensure_ascii=False)[:1500]}")
          else:
              nid = resp["id"]
              requests.put(f"https://api.mercadolibre.com/items/{nid}/description",
                  headers=H, json={"plain_text": desc_buds})
              print(f"  buds OK: {nid}  {resp.get('permalink')}")

          # === 2/3. Flip 7 Rojo y Morado ===
          def flip7_specs(color_name, main_color, mpn, gtin, sku):
              return [
                  {"id":"BRAND","value_name":"JBL"},{"id":"MODEL","value_name":"Flip 7"},
                  {"id":"MPN","value_name":mpn},{"id":"GTIN","value_name":gtin},
                  {"id":"MANUFACTURER","value_name":"Harman International Industries"},
                  {"id":"SELLER_SKU","value_name":sku},
                  {"id":"COLOR","value_name":color_name},{"id":"MAIN_COLOR","value_name":main_color},
                  {"id":"ITEM_CONDITION","value_name":"Usado"},
                  {"id":"POWER_OUTPUT_RMS","value_name":"35 W","value_struct":{"number":35,"unit":"W"}},
                  {"id":"MIN_FREQUENCY_RESPONSE","value_name":"65 Hz","value_struct":{"number":65,"unit":"Hz"}},
                  {"id":"MAX_FREQUENCY_RESPONSE","value_name":"20 kHz","value_struct":{"number":20,"unit":"kHz"}},
                  {"id":"SOUND_RANGE","value_name":"15 m","value_struct":{"number":15,"unit":"m"}},
                  {"id":"SPEAKERS_NUMBER","value_name":"2"},{"id":"SPEAKER_FORMAT","value_name":"Caja"},
                  {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
                  {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
                  {"id":"MAX_BATTERY_AUTONOMY","value_name":"14 h","value_struct":{"number":14,"unit":"h"}},
                  {"id":"CHARGE_TIME","value_name":"2.5 h","value_struct":{"number":2.5,"unit":"h"}},
                  {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
                  {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
                  {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"WITH_WI_FI","value_name":"No"},
                  {"id":"WITH_NFC","value_name":"No"},{"id":"WITH_RADIO","value_name":"No"},
                  {"id":"IS_WIRELESS","value_name":"Sí"},
                  {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
                  {"id":"IS_WATERPROOF","value_name":"Sí"},{"id":"IP_CLASSIFICATION","value_name":"IP68"},
                  {"id":"IS_DUST_RESISTANT","value_name":"Sí"},{"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
                  {"id":"IS_PORTABLE","value_name":"Sí"},{"id":"WITH_BASE","value_name":"No"},
                  {"id":"WITH_LED_LIGHTS","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"No"},
                  {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},{"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
                  {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},{"id":"WITH_VOICE_EFFECT","value_name":"No"},
                  {"id":"WITH_SCREEN","value_name":"No"},{"id":"IS_GAMER","value_name":"No"},
                  {"id":"IS_PROFESSIONAL","value_name":"No"},{"id":"IS_A_STAGE_MONITOR","value_name":"No"},
                  {"id":"INCLUDES_SUPPORT","value_name":"No"},{"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
                  {"id":"INCLUDES_CHARGER","value_name":"No"},{"id":"INCLUDES_WHEELS","value_name":"No"},
                  {"id":"INCLUDES_LATCH","value_name":"No"},
                  {"id":"HEIGHT","value_name":"7.2 cm","value_struct":{"number":7.2,"unit":"cm"}},
                  {"id":"WIDTH","value_name":"18.15 cm","value_struct":{"number":18.15,"unit":"cm"}},
                  {"id":"DEPTH","value_name":"7.2 cm","value_struct":{"number":7.2,"unit":"cm"}},
                  {"id":"WEIGHT","value_name":"560 g","value_struct":{"number":560,"unit":"g"}},
              ]

          def publish_flip7(color_q, color_norm, main_color, mpn, gtin, sku, product_ids):
              print(f"\n=== Flip 7 {color_q} ===")
              pics = upload_pics_from(product_ids, 11)
              print(f"  fotos: {len(pics)}")
              if not pics: return None
              title_col = "Roja" if color_q.lower()=="rojo" else "Morada"
              title = f"JBL Flip 7 Bocina Bluetooth Portatil {title_col} Original Usada"
              desc = (
                  f"Bocina JBL Flip 7 color {color_norm.lower()} en perfecto estado, practicamente sin uso: "
                  f"solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
                  f"Producto 100 por ciento original JBL. "
                  f"IMPORTANTE: esta unidad NO es compatible con la aplicacion JBL Portable; "
                  f"su operacion es Bluetooth estandar. "
                  f"Sonido potente, bateria en excelente estado, resistencia IP68, "
                  f"hasta 14 horas de reproduccion. "
                  f"Envio GRATIS con Mercado Envios desde Mexico. Facturamos si se requiere."
                  f"\n\n* Nota: esta version incluye entrada USB para reproduccion directa desde memoria."
              )
              attrs = flip7_specs(color_norm, main_color, mpn, gtin, sku)
              item = {
                  "title":title,"category_id":"MLM59800","price":399,"currency_id":"MXN",
                  "available_quantity":1,"buying_mode":"buy_it_now",
                  "listing_type_id":"gold_pro","condition":"used",
                  "pictures":pics,"attributes":attrs,
                  "sale_terms":[
                      {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                      {"id":"WARRANTY_TIME","value_name":"7 días"},
                  ],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}
              }
              r = requests.post("https://api.mercadolibre.com/items", headers=H, json=item)
              print(f"  POST={r.status_code}")
              resp = r.json()
              if r.status_code >= 400:
                  print(f"  ERR: {json.dumps(resp, ensure_ascii=False)[:600]}")
                  return None
              nid = resp["id"]
              requests.put(f"https://api.mercadolibre.com/items/{nid}/description",
                  headers=H, json={"plain_text": desc})
              print(f"  OK {nid}  {resp.get('permalink')}")
              return nid

          # Flip 7 Rojo → MLM48958711 (color Rojo, 5 fotos)
          rojo = publish_flip7("Rojo","Rojo","Rojo","JBLFLIP7REDAM","050036399135","JBL-FLIP7-RED-001",["MLM48958711"])

          # Flip 7 Morado: buscar primero
          print("\n=== Buscando Flip 7 Morado ===")
          best = None
          for q in ["JBL Flip 7 Morado","JBL Flip 7 purple","JBL Flip 7 violeta","Flip 7 lila","Flip 7 lavanda"]:
              s = requests.get("https://api.mercadolibre.com/products/search",
                  params={"site_id":"MLM","q":q,"limit":20}, headers=H).json()
              for r in s.get('results',[])[:20]:
                  rid = r.get('id')
                  pr = requests.get(f"https://api.mercadolibre.com/products/{rid}", headers=H).json()
                  col=None; mod=None
                  for a in pr.get('attributes',[]):
                      if a.get('id')=='COLOR': col=a.get('value_name')
                      if a.get('id')=='MODEL': mod=a.get('value_name')
                  n = r.get('name','').lower()
                  pics = len(pr.get('pictures',[]))
                  if pics>=3 and (mod and 'Flip 7' in str(mod) or 'FLIP 7' in str(mod).upper() or 'flip 7' in n):
                      col_l = (col or '').lower()
                      if any(c in col_l for c in ['morado','purpura','púrpura','violeta','lila','purple','lavanda']) or any(c in n for c in ['morado','purpura','púrpura','violeta','lila','purple','lavanda']):
                          print(f"  cand: {rid} color={col} pics={pics} name={n[:60]}")
                          if best is None or pics > best['pics']:
                              best = {"id":rid,"pics":pics}
          print(f"BEST morado: {best}")
          morado_id = None
          if best:
              morado_id = publish_flip7("Morado","Morado","Violeta","JBLFLIP7PURAM","050036399142","JBL-FLIP7-MOR-001",[best["id"]])

          print(f"\n=== RESULTADOS ===")
          print(f"  Flip 7 Rojo: {rojo}")
          print(f"  Flip 7 Morado: {morado_id}")
          PY
