name: Force activate 3 items v2
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Stock config local (checkout tiene el archivo)
          with open("stock_config.json") as f: cfg = json.load(f)

          # Mapeo de los 3 items a sus entradas del stock_config
          mapping = {
              "MLM2874596867": None,  # Flip 7 Rojo
              "MLM2874537897": None,  # Flip 7 Morado
              "MLM5212880744": None,  # Charge 6 Negro
          }
          for iid in mapping:
              # Buscar directo o como previous_id
              for k,v in cfg.items():
                  if k.startswith("_"): continue
                  if k == iid or iid in (v.get("previous_ids") or []):
                      mapping[iid] = (k, v); break

          for iid, km in mapping.items():
              print(f"\n=== {iid} ===")
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"  status={it.get('status')} sub={it.get('sub_status')} stock={it.get('available_quantity')} vend={it.get('sold_quantity')}")
              if km:
                  key, meta = km
                  print(f"  cfg key: {key} real_stock={meta.get('real_stock')}")
              else:
                  print(f"  sin entrada en stock_config — usar metadata del item")
                  meta = {}

              # Charge 6 Negro under_review: re-enviar descripción + forzar activación
              if it.get("status") == "under_review":
                  print("  → intentar reactivar desde under_review")
                  # Traer descripción actual
                  d = requests.get(f"https://api.mercadolibre.com/items/{iid}/description", headers=H).json()
                  new_desc = d.get("plain_text","") or "Bocina JBL Charge 6 color negro, producto 100% original."
                  # Re-enviar descripción
                  dr = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
                      headers=H, json={"plain_text": new_desc})
                  print(f"    desc: {dr.status_code}")
                  # Forzar active
                  r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
                      headers=H, json={"status":"active"})
                  print(f"    activate: {r.status_code}")
                  if r.status_code >= 400:
                      print(f"    ERR: {json.dumps(r.json(), ensure_ascii=False)[:600]}")
                  else:
                      ver = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
                      print(f"    → status ahora: {ver.get('status')} sub: {ver.get('sub_status')}")
                  continue

              # Closed con ventas → relist
              if it.get("status") == "closed" and it.get("sold_quantity",0) > 0:
                  rbody = {"quantity":1,
                           "listing_type_id":it.get("listing_type_id","gold_pro"),
                           "price":it.get("price"),
                           "currency_id":it.get("currency_id","MXN"),
                           "condition":it.get("condition","used")}
                  seo = meta.get("seo_title") if meta else None
                  if seo: rbody["title"] = seo
                  r = requests.post(f"https://api.mercadolibre.com/items/{iid}/relist",
                      headers=H, json=rbody)
                  print(f"  relist status={r.status_code}")
                  resp = r.json()
                  if r.status_code < 400:
                      new_id = resp.get("id")
                      print(f"  ✓ new_id={new_id}  link={resp.get('permalink')}")
                      # actualizar stock_config
                      if km:
                          key, meta = km
                          new_meta = dict(meta)
                          new_meta["real_stock"] = max(0, int(meta.get("real_stock",0))-1)
                          new_meta["previous_ids"] = (meta.get("previous_ids") or []) + [key]
                          cfg[new_id] = new_meta
                          cfg.pop(key, None)
                  else:
                      print(f"  ERR: {json.dumps(resp, ensure_ascii=False)[:600]}")

          # Guardar stock_config actualizado
          with open("stock_config.json","w") as f:
              json.dump(cfg, f, indent=2, ensure_ascii=False)
          print("stock_config.json guardado")
          PY
      - name: Commit stock_config
        if: always()
        run: |
          if ! git diff --quiet stock_config.json 2>/dev/null; then
            git config user.name "meli-bot"
            git config user.email "bot@sonixmx.local"
            git add stock_config.json
            git commit -m "[manual-fix] relist 3 items atrasados"
            git push
          fi
