name: Verify new item (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token",
                    "client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = r["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          for iid in ["MLM5206968736", "MLM2872698375"]:
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"=== {iid} ===")
              print(f"  status: {it.get('status')}  sub_status: {it.get('sub_status')}")
              print(f"  available_quantity: {it.get('available_quantity')}")
              print(f"  sold_quantity: {it.get('sold_quantity')}")
              print(f"  price: ${it.get('price')}")
              print(f"  permalink: {it.get('permalink')}")
              print(f"  title: {it.get('title')}")
              print(f"  pictures: {len(it.get('pictures',[]))}")
              print(f"  attributes filled: {sum(1 for a in it.get('attributes',[]) if a.get('value_name') or a.get('value_struct'))}")
              print()
          PY
