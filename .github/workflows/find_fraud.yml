name: Find fraud order + info buyer (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]

          # Traer todas las ordenes recientes y ver cuales tienen multiples items
          orders = requests.get("https://api.mercadolibre.com/orders/search",
              params={"seller":sid, "sort":"date_desc", "limit":50}, headers=H).json()
          print(f"Total orders últimas 50: {len(orders.get('results',[]))}")

          # Filtrar las que tienen múltiples order_items o quantity > 1
          multi = []
          for o in orders.get('results',[]):
              items = o.get('order_items',[])
              total_units = sum(oi.get('quantity',0) for oi in items)
              if len(items) > 1 or total_units > 1:
                  multi.append((o, total_units, len(items)))

          print(f"\nOrdenes multi: {len(multi)}")
          for o, units, count in multi[:5]:
              buyer = o.get('buyer',{}) or {}
              buyer_id = buyer.get('id')
              ship = o.get('shipping',{}) or {}
              payments = o.get('payments',[])
              pay_status = [p.get('status') for p in payments]
              print(f"\n=== ORDER {o.get('id')} ===")
              print(f"  date: {o.get('date_created','')[:19]}")
              print(f"  status: {o.get('status')}  pay: {pay_status}")
              print(f"  total: ${o.get('total_amount')} {o.get('currency_id')}")
              print(f"  items: {count} distintos, {units} unidades")
              print(f"  buyer_id: {buyer_id}  nickname: {buyer.get('nickname')}")
              for oi in o.get('order_items',[])[:15]:
                  it = oi.get('item',{})
                  print(f"    qty={oi.get('quantity')} {it.get('id')} {it.get('title','')[:60]} @${oi.get('unit_price')}")
              print(f"  shipping_id: {ship.get('id')}")
              # Detalles del comprador
              if buyer_id:
                  bdet = requests.get(f"https://api.mercadolibre.com/users/{buyer_id}", headers=H).json()
                  brep = bdet.get('seller_reputation',{}) or {}
                  print(f"  buyer reputation level: {brep.get('level_id')}")
                  print(f"  buyer registered: {bdet.get('registration_date','')[:10]}")
                  print(f"  buyer sites_status: {bdet.get('status',{}).get('site_status')}")
              # Detalles del shipping
              if ship.get('id'):
                  sdet = requests.get(f"https://api.mercadolibre.com/shipments/{ship['id']}", headers=H).json()
                  dest = sdet.get('destination',{}).get('receiver_address',{}) or {}
                  print(f"  shipping status: {sdet.get('status')} sub: {sdet.get('substatus')}")
                  print(f"  destino: {dest.get('city',{}).get('name','')} / {dest.get('state',{}).get('name','')} / CP {dest.get('zip_code','')}")
                  print(f"  receptor: {dest.get('receiver_name','')}  phone: {dest.get('receiver_phone','')}")
          PY
