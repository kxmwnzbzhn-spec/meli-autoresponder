name: Scan and close ALL old
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # First: LIST all JBL in all statuses to see what we have
          all_jbl = {"active":[],"paused":[],"under_review":[],"closed":[]}
          for st in all_jbl:
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              for iid in r.json().get("results",[]):
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,condition,sub_status,status", headers=h, timeout=6)
                  it = r2.json()
                  if "jbl" not in (it.get("title","") or "").lower(): continue
                  all_jbl[st].append({
                      "id": iid, "title": it.get("title",""),
                      "condition": it.get("condition"),
                      "sub_status": it.get("sub_status",[]),
                  })
          
          for st, items in all_jbl.items():
              print(f"\n=== {st} ({len(items)}) ===")
              for it in items:
                  rec_mark = "[REC]" if "reacondicionado" in it["title"].lower() else "[OLD]"
                  print(f"  {rec_mark} {it['id']} cond={it['condition']} ss={it['sub_status']} | {it['title'][:55]}")
          
          # Now close all OLD (non-Reacondicionado) in any active/paused/review state
          to_close = []
          for st in ("active","paused","under_review"):
              for it in all_jbl[st]:
                  if "reacondicionado" in it["title"].lower(): continue
                  to_close.append(it)
          
          print(f"\n\n=== CLOSING {len(to_close)} viejos ===")
          ok = 0; err = 0
          for it in to_close:
              iid = it["id"]
              if "forbidden" in (it["sub_status"] or []):
                  print(f"  [forbidden skip] {iid}")
                  continue
              # Force: pause then close
              requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"status":"paused"}, timeout=10)
              time.sleep(1)
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"status":"closed"}, timeout=15)
              if r.status_code == 200:
                  print(f"  ✓ CLOSED {iid} | {it['title'][:50]}")
                  ok += 1
              else:
                  print(f"  ✗ {iid}: {r.status_code} {r.json().get('message','')[:100]}")
                  err += 1
              time.sleep(0.5)
          
          print(f"\n=== DONE: OK={ok} ERR={err} ===")
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown",
                  "text":f"🔒 *JBL viejos cerrados definitivo*\n\nCerrados: *{ok}*\nErr: {err}"})
          PY
