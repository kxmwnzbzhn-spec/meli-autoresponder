name: Answer all pending Qs (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, unicodedata
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          def norm(s):
              s = s.lower()
              s = unicodedata.normalize("NFD", s)
              return "".join(c for c in s if unicodedata.category(c) != "Mn")

          # Cargar templates del repo
          with open("qa_templates.json") as f: cfg = json.load(f)
          templates = cfg.get("templates",[])
          signature = cfg.get("signature","")

          # Agregar keywords extra que observo que faltan
          extra_kws = {
              "bateria": ["pila"],
              "original": ["fake","original??","original?","orijinal","es original","completamente original","es autentico"],
              "app_jbl": ["app de jbl","no se vincula","aplicacion de jbl"],
              "estado_usado": ["golpeada","marcas esteticas","tiempo de uso","viene con caja","viene con"],
              "incluye_cable": ["cargador"],
          }
          # Merge
          for t in templates:
              tid = t.get("id")
              if tid in extra_kws:
                  t["match"] = list(set((t.get("match") or []) + extra_kws[tid]))

          # Template nuevo OEM
          templates.append({
              "id":"oem_question",
              "match":["oem","generico","producto generico","producto oem","version oem"],
              "response":"Buenas tardes. Si, esta version es OEM, fabricada bajo estandares originales de JBL; producto genuino que funciona identico al modelo oficial. Lo especificamos en la descripcion para total claridad."
          })

          def match_template(text):
              n = norm(text)
              for t in templates:
                  for kw in t.get("match",[]):
                      if norm(kw) in n:
                          return t
              return None

          # Obtener preguntas pendientes
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]
          q = requests.get(f"https://api.mercadolibre.com/questions/search",
              params={"seller_id":sid,"status":"UNANSWERED","limit":50}, headers=H).json()
          qs = q.get("questions",[]) or []
          print(f"Pendientes: {len(qs)}")

          BLOCKED = {735376363}
          answered, skipped_blocked, no_template = 0, 0, []

          for qu in qs:
              qid = qu.get("id")
              bid = (qu.get("from") or {}).get("id")
              qtext = qu.get("text","") or ""
              if bid in BLOCKED:
                  print(f"  SKIP blocked {qid}: {qtext[:60]}")
                  skipped_blocked += 1; continue
              tmpl = match_template(qtext)
              if tmpl:
                  ans = tmpl["response"] + signature
                  r = requests.post("https://api.mercadolibre.com/answers",
                      headers=H, json={"question_id": int(qid), "text": ans})
                  if r.status_code == 200:
                      print(f"  ✓ {qid} [{tmpl['id']}]: {qtext[:60]}")
                      answered += 1
                  else:
                      print(f"  ✗ {qid} err {r.status_code}: {r.text[:150]}")
              else:
                  no_template.append((qid, qtext))
                  print(f"  ? {qid} (sin template): {qtext[:80]}")

          print(f"\n=== RESUMEN ===")
          print(f"  Respondidas: {answered}")
          print(f"  Saltadas (blocked): {skipped_blocked}")
          print(f"  Sin template: {len(no_template)}")

          # Guardar templates mejorados al repo
          with open("qa_templates.json","w") as f:
              json.dump(cfg, f, indent=2, ensure_ascii=False)
          PY
      - name: Commit qa_templates if changed
        if: always()
        run: |
          if ! git diff --quiet qa_templates.json 2>/dev/null; then
            git config user.name "meli-bot"
            git config user.email "bot@sonixmx.local"
            git add qa_templates.json
            git commit -m "Update QA templates: +OEM, +typos, +synonyms"
            git push
          fi
