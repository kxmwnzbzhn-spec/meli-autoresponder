name: answer-all-jbl
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: python scripts/answer_all.py
      - run: |
          git config user.name bot
          git config user.email b@b.com
          git add qa_templates.json
          git diff --cached --quiet || git commit -m "add OEM+app templates"
          git push || true
