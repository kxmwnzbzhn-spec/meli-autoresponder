name: Deep analysis item (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          item_id = "MLM2874367731"

          it = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
          print("=== ITEM ACTIVO ===")
          print(f"  id: {it.get('id')}  status: {it.get('status')}")
          print(f"  stock: {it.get('available_quantity')}  vendidas: {it.get('sold_quantity')}")
          print(f"  precio: ${it.get('price')}")
          print(f"  listing: {it.get('listing_type_id')}")
          print(f"  tags: {it.get('tags')}")
          print(f"  creado: {it.get('date_created','')[:19]}")
          print(f"  accepts_mercadopago: {it.get('accepts_mercadopago')}")
          print(f"  warranty: {it.get('warranty')}")

          # Visitas agregadas (suma de TODA la cadena usando ids anteriores)
          prev_ids = ["MLM2872698375", "MLM5206968736", "MLM5209016022", "MLM2874367731"]
          tot_7d = 0
          day_tot = {}
          for pid in prev_ids:
              try:
                  v = requests.get(f"https://api.mercadolibre.com/items/visits/time_window",
                      params={"ids": pid, "last": 7, "unit": "day"}, headers=H).json()
                  if isinstance(v, list) and v:
                      tot_7d += v[0].get("total_visits", 0)
                      for r in v[0].get("results",[]):
                          day = r.get("date","")[:10]
                          day_tot[day] = day_tot.get(day,0) + r.get("total",0)
              except: pass
          print(f"\n=== VISITAS 7d (TODA la cadena) ===")
          print(f"  total acumulado: {tot_7d}")
          for day in sorted(day_tot.keys()):
              print(f"   {day}: {day_tot[day]}")

          # Preguntas
          q = requests.get("https://api.mercadolibre.com/questions/search",
              params={"item": item_id, "limit": 20}, headers=H).json()
          print(f"\n=== PREGUNTAS: {q.get('total',0)} ===")
          for qu in q.get("questions",[])[:3]:
              print(f"  [{qu.get('status','')}] {qu.get('date_created','')[:19]} Q: {(qu.get('text') or '')[:80]}")

          # Ordenes del seller
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]
          ord_r = requests.get("https://api.mercadolibre.com/orders/search",
              params={"seller": sid, "sort":"date_desc", "limit":20}, headers=H).json()
          print(f"\n=== ORDENES total seller: {ord_r.get('paging',{}).get('total',0)} ===")
          for o in ord_r.get("results",[])[:5]:
              items = [(oi.get('item') or {}).get('id') for oi in o.get('order_items',[])]
              pay = [p.get('status') for p in o.get('payments',[])]
              shi = (o.get('shipping') or {}).get('id')
              print(f"  {o.get('date_created','')[:19]} | {o.get('status')} | pay={pay} | ship={shi} | ${o.get('total_amount')} | items={items}")

          # Reputacion del seller (revisar health si mejoró)
          rep = me.get("seller_reputation", {}) or {}
          print(f"\n=== SELLER REPUTATION ===")
          print(f"  level_id: {rep.get('level_id')}")
          print(f"  power_seller_status: {rep.get('power_seller_status')}")
          tx = rep.get("transactions", {}) or {}
          print(f"  transactions: total={tx.get('total',0)} completed={tx.get('completed',0)} canceled={tx.get('canceled',0)}")
          pm = rep.get("metrics", {}).get("claims", {}) if rep.get("metrics") else {}
          print(f"  claims rate: {pm.get('rate',0)}")
          PY
