name: Add buyer to blocklist (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: .seen_claims.json
          key: seen-state
          restore-keys: seen-state
      - run: |
          python3 <<'PY'
          import json, time, os
          STATE = ".seen_claims.json"
          try:
              with open(STATE) as f: state = json.load(f)
          except:
              state = {}
          bl = state.setdefault("buyer_blocklist", {})
          buyer_id = "1928752871"
          entry = bl.setdefault(buyer_id, {"events": [], "risk": "NONE"})
          entry["events"].append({
              "ts": int(time.time()),
              "reason": "limosnero_con_garrote",
              "source": "manual_user_instruction",
              "note": "Pregunto 2 veces cuestionando originalidad con insinuaciones. Bloqueado por seller."
          })
          entry["risk"] = "CRITICAL"
          entry["nickname_hint"] = "unknown"
          with open(STATE,"w") as f: json.dump(state, f, indent=2, ensure_ascii=False)
          print(f"Added buyer {buyer_id} to blocklist")
          print(json.dumps(entry, indent=2, ensure_ascii=False))
          PY
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: .seen_claims.json
          key: seen-state-${{ github.run_id }}
