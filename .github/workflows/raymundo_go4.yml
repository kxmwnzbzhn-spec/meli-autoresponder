name: raymundo-go4-used
on: {workflow_dispatch: {}}
jobs:
  run:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          MELI_REFRESH_TOKEN_RAYMUNDO: ${{ secrets.MELI_REFRESH_TOKEN_RAYMUNDO }}
        run: python scripts/raymundo_go4_used.py
      - run: |
          git config user.email b@b.com && git config user.name bot
          git add stock_config_raymundo.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Raymundo Go4 usada unificada publicada"
          git push || true
