name: Publish last 10 with deep GTIN scan
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          try:
              with open("stock_config.json") as f: stock = json.load(f)
          except: stock = {}
          
          # 1) Register survivors from dupe cleanup
          SURVIVORS = {
              "MLM5221328952": {"idx":15, "title":"PERFUME ORIGINAL MARSHMALLOW BLUSH EDP 100ML MUJER IMPORTADO"},
              "MLM5221355096": {"idx":21, "title":"PERFUME GAME OF SPADES WILDCARD PARFUM 100ML"},
          }
          for iid, info in SURVIVORS.items():
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,status,title", headers=h, timeout=10)
              if r.status_code == 200 and r.json().get("status") != "closed":
                  if iid not in stock:
                      stock[iid] = {
                          "real_stock":10,"sku":f"PERF-{info['idx']:03d}",
                          "label":info["title"][:50],"auto_replenish":True,"replenish_quantity":1,
                          "seo_title":info["title"],"previous_ids":[],"_perfume":True,"_idx":info["idx"]
                      }
                      print(f"Registered survivor {iid} idx={info['idx']}")
          
          # 2) Publish the 10 failed ones with DEEP GTIN scan
          FAILED = [
              {"idx":19,"title":"ARMAF CLUB DE NUIT ICONIC EAU DE PARFUM","price":499,
               "search":"Armaf Club de Nuit Iconic","brand":"Armaf","vol":"105 mL","gender":"Hombre"},
              {"idx":22,"title":"ARMAF THE LIONS CLUB RUGIR EDP 100ML HOMBRE ORIGINAL","price":499,
               "search":"Armaf Lions Club Rugir 100ml","brand":"Armaf","vol":"100 mL","gender":"Hombre"},
              {"idx":27,"title":"PERFUME ORIGINAL DIOR SAUVAGE EAU DE PARFUM 100ML HOMBRE","price":999,
               "search":"Dior Sauvage Eau de Parfum 100ml","brand":"Dior","vol":"100 mL","gender":"Hombre"},
              {"idx":30,"title":"PERFUME SAUVAGE EAU FORTE 100 MI HOMBRE CíTRICO AMADERADO","price":999,
               "search":"Dior Sauvage Eau Forte 100ml","brand":"Dior","vol":"100 mL","gender":"Hombre"},
              {"idx":32,"title":"AL HARAMAIN AMBER OUD GOLD EDP SPRAY 60 ML","price":499,
               "search":"Al Haramain Amber Oud Gold 60ml","brand":"Al Haramain","vol":"60 mL","gender":"Sin género"},
              {"idx":34,"title":"OUD ROYAL ARMANI PRIVé 100 ML EAU DE PARFUM ORIGINAL","price":1999,
               "search":"Armani Prive Oud Royal 100ml","brand":"Giorgio Armani","vol":"100 mL","gender":"Sin género"},
              {"idx":35,"title":"PACO RABANNE MILLION GOLD FOR HER EDP PARA MUJER 90 ML","price":999,
               "search":"Paco Rabanne Lady Million Gold 90ml","brand":"Paco Rabanne","vol":"90 mL","gender":"Mujer"},
              {"idx":36,"title":"LATTAFA MAYAR EAU DE PARFUM 100ML ORIGINAL MUJER","price":499,
               "search":"Lattafa Mayar 100ml","brand":"Lattafa","vol":"100 mL","gender":"Mujer"},
              {"idx":37,"title":"JEAN PAUL GAULTIER LE BEAU EDT HOMBRE 125 ML","price":999,
               "search":"Jean Paul Gaultier Le Beau 125ml","brand":"Jean Paul Gaultier","vol":"125 mL","gender":"Hombre"},
              {"idx":39,"title":"PERFUME ORIGINAL CARTIER LA PANTHERE EDP 100ML MUJER LUJO","price":1999,
               "search":"Cartier La Panthere 100ml","brand":"Cartier","vol":"100 mL","gender":"Mujer"},
          ]
          
          def deep_scan(search_q, brand):
              """Scan up to 20 direct items AND catalog products to find a valid GTIN."""
              pics_fallback = None
              # Item search first (items often have GTIN)
              for q in [search_q, search_q.replace("+"," ")+" "+brand]:
                  try:
                      r = requests.get(f"https://api.mercadolibre.com/sites/MLM/search?q={q.replace(' ','+')}&limit=15&category=MLM1271", headers=h, timeout=15)
                      for it in r.json().get("results",[])[:15]:
                          iid = it.get("id")
                          r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=8)
                          it_full = r2.json()
                          gtin = next((a.get("value_name") for a in it_full.get("attributes",[]) if a.get("id")=="GTIN"), None)
                          if gtin and len(str(gtin).strip()) >= 8:
                              pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in it_full.get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                              if pics:
                                  return pics[:8], str(gtin).strip()
                          elif not pics_fallback:
                              pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in it_full.get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                              if pics:
                                  pics_fallback = pics[:8]
                  except Exception as e:
                      print(f"  err: {e}")
              # Catalog fallback
              try:
                  r = requests.get(f"https://api.mercadolibre.com/products/search?site_id=MLM&q={search_q}&limit=10", headers=h, timeout=15)
                  for p in r.json().get("results",[]):
                      pid = p.get("id")
                      r2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=h, timeout=8)
                      pd = r2.json()
                      pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in pd.get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                      if not pics: continue
                      gtin = next((a.get("value_name") for a in pd.get("attributes",[]) if a.get("id")=="GTIN"), None)
                      if gtin:
                          return pics[:8], gtin
                      if not pics_fallback:
                          pics_fallback = pics[:8]
              except Exception as e:
                  print(f"  cat err: {e}")
              return pics_fallback, None
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          ok_list = []; err_list = []
          for p in FAILED:
              idx = p["idx"]; title = p["title"]; price = p["price"]
              print(f"\n[{idx}] {title}")
              pics, gtin = deep_scan(p["search"].replace(" ","+"), p["brand"])
              print(f"  pics={len(pics) if pics else 0} gtin={gtin}")
              if not pics:
                  print(f"  ✗ no pics")
                  err_list.append((idx, title, "no_pics"))
                  continue
              
              attrs = [
                  {"id":"BRAND","value_name":p["brand"]},
                  {"id":"GENDER","value_name":p["gender"]},
                  {"id":"UNIT_VOLUME","value_name":p["vol"]},
                  {"id":"NET_VOLUME","value_name":p["vol"]},
                  {"id":"PERFUME_NAME","value_name":title.split()[0].capitalize()},
                  {"id":"ITEM_CONDITION","value_name":"Nuevo"},
              ]
              if gtin:
                  attrs.append({"id":"GTIN","value_name":gtin})
              body = {
                  "title": title, "category_id": "MLM1271", "price": price,
                  "currency_id":"MXN", "available_quantity": 1, "buying_mode":"buy_it_now",
                  "condition":"new", "listing_type_id":"gold_pro",
                  "pictures": pics, "attributes": attrs,
                  "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},{"id":"WARRANTY_TIME","value_name":"30 días"}],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":False}
              }
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=25)
              resp = r.json()
              if r.status_code in (200,201):
                  new_id = resp.get("id")
                  print(f"  ✓ {new_id}")
                  try:
                      desc = (f"{title}\n\nPerfume original 100% autentico.\n\n"
                              f"CARACTERISTICAS:\n- Marca: {p['brand']}\n- Volumen: {p['vol']}\n- Genero: {p['gender']}\n"
                              f"- Condicion: Nuevo, sellado de fabrica\n\nGARANTIAS:\n- NUEVO y 100% Original\n"
                              f"- 30 dias de garantia\n- Factura disponible\n- Envio el mismo dia antes de 3pm\n\n- Sonix Mx")
                      requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h, json={"plain_text":desc}, timeout=10)
                  except: pass
                  stock[new_id] = {"real_stock":10,"sku":f"PERF-{idx:03d}","label":title[:50],
                                   "auto_replenish":True,"replenish_quantity":1,"seo_title":title,
                                   "previous_ids":[],"_perfume":True,"_idx":idx}
                  ok_list.append((idx, new_id, price, title))
              else:
                  errs = [c for c in resp.get("cause",[]) if isinstance(c,dict) and c.get("type")=="error"]
                  err_codes = [c.get("code","?") for c in errs[:2]]
                  print(f"  ✗ {r.status_code} {err_codes}")
                  for c in errs[:2]:
                      print(f"    {c.get('message','')[:120]}")
                  err_list.append((idx, title, ",".join(err_codes)))
              time.sleep(3)
          
          with open("stock_config.json","w") as f:
              json.dump(stock, f, indent=2, ensure_ascii=False)
          print(f"\n=== FINAL === OK:{len(ok_list)} ERR:{len(err_list)}")
          if tt and tc:
              m = f"🎯 *Last 10 retry*\n\nOK: *{len(ok_list)}/10*\nErr: *{len(err_list)}*\n\n"
              for idx, iid, price, title in ok_list:
                  m += f"✓ `{iid}` ${price} idx{idx}\n"
              for idx, title, err in err_list:
                  m += f"✗ idx{idx}: {title[:30]}\n"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m[:4000]})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock_config.json
          git diff --cached --quiet || git commit -m "[perfumes] last 10 retry + register survivors"
          git push || echo "no push"
