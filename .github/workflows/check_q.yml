name: Check pending questions (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]

          # Todas las preguntas UNANSWERED
          q = requests.get(f"https://api.mercadolibre.com/questions/search",
              params={"seller_id":sid,"status":"UNANSWERED","limit":50}, headers=H).json()
          questions = q.get("questions",[]) or []
          print(f"=== PREGUNTAS UNANSWERED: {len(questions)} ===\n")
          for qu in questions:
              qid = qu.get("id")
              item_id = qu.get("item_id")
              buyer_id = (qu.get("from") or {}).get("id")
              qtext = qu.get("text","") or ""
              fecha = qu.get("date_created","")[:19]
              it = requests.get(f"https://api.mercadolibre.com/items/{item_id}",
                  headers=H, params={"attributes":"title,price"}).json()
              print(f"[{qid}] {fecha}")
              print(f"  item: {item_id} · {it.get('title','')[:55]} · ${it.get('price')}")
              print(f"  buyer: {buyer_id}")
              print(f"  Q: {qtext}")
              print()

          # También ver preguntas ANSWERED recientes (últimas 10 para contexto)
          qa = requests.get(f"https://api.mercadolibre.com/questions/search",
              params={"seller_id":sid,"status":"ANSWERED","limit":10}, headers=H).json()
          print(f"\n=== ULTIMAS 5 ANSWERED ===")
          for qu in qa.get("questions",[])[:5]:
              qid = qu.get("id")
              qt = qu.get("text","")[:100]
              at = (qu.get("answer") or {}).get("text","")[:100]
              print(f"  [{qid}] Q: {qt}")
              print(f"           A: {at}")
          PY
