name: Extract rosa + free shipping (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          # Ver el item+variaciones
          it = requests.get("https://api.mercadolibre.com/items/MLM2869028135", headers=H).json()
          print(f"item title: {it.get('title','')[:70]}")
          print(f"product_id: {(it.get('catalog_product_id'))}")
          print(f"variations count: {len(it.get('variations',[]))}")
          for v in it.get('variations',[])[:10]:
              print(f"  variation id={v.get('id')}  combos={v.get('attribute_combinations')}")
              pids = v.get('picture_ids',[])
              print(f"    picture_ids: {len(pids)}: {pids[:3]}")

          # Buscar en catalog por "rosa" si existe product_id
          pid = it.get('catalog_product_id')
          if pid:
              pr = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
              print(f"\ncatalog_product: {pr.get('name','')[:80]}")
              print(f"catalog pictures: {len(pr.get('pictures',[]))}")
              # Ver si hay attributes de color
              for a in pr.get('attributes',[])[:5]:
                  print(f"  attr {a.get('id')}: {a.get('value_name')}")

          # Variación específica 200335897605
          vid = "200335897605"
          for v in it.get('variations',[]):
              if str(v.get('id')) == vid:
                  print(f"\n=== VARIACION ROSA {vid} ===")
                  print(f"  combos: {v.get('attribute_combinations')}")
                  for pic_id in v.get('picture_ids',[])[:15]:
                      # obtener URL publica
                      pr = requests.get(f"https://api.mercadolibre.com/pictures/{pic_id}", headers=H).json()
                      url = pr.get('url') or pr.get('secure_url')
                      print(f"  pic {pic_id} → {url}")
                  break

          # Buscar product catalog rosa JBL Go 4
          print("\n=== Buscando producto catalogo JBL Go 4 Rosa ===")
          s = requests.get("https://api.mercadolibre.com/products/search",
              params={"site_id":"MLM","q":"JBL Go 4 rosa","limit":10}, headers=H).json()
          for r in s.get('results',[])[:5]:
              print(f"  {r.get('id')} - {r.get('name','')[:70]}")
          PY
