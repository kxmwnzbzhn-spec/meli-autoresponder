name: Check correct item (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          for iid in ["MLM2874367731", "MLM5206968736", "MLM2872698375", "MLM2872660967"]:
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"=== {iid} ===")
              if it.get("error"):
                  print(f"  ERR: {it}"); print(); continue
              print(f"  status: {it.get('status')}  sub: {it.get('sub_status')}")
              print(f"  stock: {it.get('available_quantity')}  vendidas: {it.get('sold_quantity')}")
              print(f"  price: ${it.get('price')}  listing: {it.get('listing_type_id')}")
              print(f"  title: {it.get('title')}")
              print(f"  creado: {it.get('date_created','')[:19]}")
              print(f"  actualizado: {it.get('last_updated','')[:19]}")
              print()

          # Listar TODOS los items del seller para descubrir realidad
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]
          print(f"=== TODOS los items del seller {sid} ===")
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search",
              params={"limit": 50}, headers=H).json()
          print(f"  total: {r.get('paging',{}).get('total',0)}")
          for iid in r.get("results",[]):
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H,
                  params={"attributes":"id,title,status,available_quantity,sold_quantity,price,date_created"}).json()
              print(f"  {it.get('id')} | {it.get('status'):10s} | stock={it.get('available_quantity')} vend={it.get('sold_quantity')} | ${it.get('price')} | {(it.get('title') or '')[:55]} | creado={it.get('date_created','')[:19]}")
          PY
