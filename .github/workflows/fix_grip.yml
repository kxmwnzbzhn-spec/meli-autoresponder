name: Fix Grip pictures urgente (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, io, sys
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}
          iid = "MLM2874596557"

          # Pausar para evitar venta con fotos equivocadas
          r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
              headers=H, json={"status":"paused"})
          print(f"[pause] {r.status_code}")

          # Combinar fotos de MLM59802579 (7) + MLM61631985 (3) = 10 total de Grip sola
          all_urls = []
          for pid in ["MLM59802579","MLM61631985"]:
              pr = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
              urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[])]
              all_urls.extend(urls)
              print(f"[src {pid}] {len(urls)} fotos")
          print(f"Total: {len(all_urls)} fotos")

          pic_ids = []
          for u in all_urls[:11]:
              try:
                  u2 = u.replace("-F.jpg","-O.jpg")
                  rr = requests.get(u2, timeout=15)
                  if rr.status_code != 200 or len(rr.content) < 3000:
                      rr = requests.get(u, timeout=15)
                  im = Image.open(io.BytesIO(rr.content))
                  if im.mode != "RGB":
                      if im.mode in ("RGBA","LA","P"):
                          bg = Image.new("RGB", im.size, (255,255,255))
                          if im.mode == "P": im = im.convert("RGBA")
                          bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                          im = bg
                      else: im = im.convert("RGB")
                  w,h = im.size; ss = min(1200/w, 1200/h)
                  nw, nh = int(w*ss), int(h*ss)
                  im = im.resize((nw,nh), Image.LANCZOS)
                  c = Image.new("RGB", (1200,1200), (255,255,255))
                  c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                  buf = io.BytesIO(); c.save(buf, "JPEG", quality=92)
                  up = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                      headers={"Authorization": f"Bearer {AT}"}, files={"file":("p.jpg",buf.getvalue(),"image/jpeg")})
                  if up.status_code < 400:
                      pic_ids.append({"id": up.json()["id"]})
              except Exception as e:
                  print(f"  pic err: {e}")
          print(f"Fotos nuevas: {len(pic_ids)}")

          if pic_ids:
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
                  headers=H, json={"pictures": pic_ids, "status":"active"})
              print(f"[update+activate] {r.status_code}")
              final = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"  status final: {final.get('status')}  pics: {len(final.get('pictures',[]))}")
          PY
