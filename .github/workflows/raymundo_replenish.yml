name: raymundo-replenish
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions: {contents: write}
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_RAYMUNDO: ${{ secrets.MELI_REFRESH_TOKEN_RAYMUNDO }}
          LOOP_ITERATIONS: "5"
          LOOP_SLEEP: "60"
        run: python scripts/raymundo_replenish.py
      - run: |
          git config user.email b@b.com && git config user.name bot
          git pull --rebase --no-edit || true
          git add stock_config_raymundo.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "[bot] raymundo replenish"
          git push || true
