name: Publish batch (Go3 + Charge 6 x4)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, io, sys
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          def optimize(url):
              url_o = url.replace("-F.jpg","-O.jpg")
              for u in (url_o, url):
                  try:
                      resp = requests.get(u, timeout=20)
                      if resp.status_code == 200 and len(resp.content) > 3000:
                          im = Image.open(io.BytesIO(resp.content))
                          if im.mode != "RGB":
                              if im.mode in ("RGBA","LA","P"):
                                  bg = Image.new("RGB", im.size, (255,255,255))
                                  if im.mode == "P": im = im.convert("RGBA")
                                  bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                                  im = bg
                              else: im = im.convert("RGB")
                          w,h = im.size
                          s = min(1200/w, 1200/h)
                          nw, nh = int(w*s), int(h*s)
                          im = im.resize((nw,nh), Image.LANCZOS)
                          c = Image.new("RGB", (1200,1200), (255,255,255))
                          c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                          buf = io.BytesIO(); c.save(buf, "JPEG", quality=92); return buf.getvalue()
                  except: continue
              return None

          def upload_pic(img_bytes):
              files = {"file": ("pic.jpg", img_bytes, "image/jpeg")}
              rr = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                  headers={"Authorization": f"Bearer {AT}"}, files=files)
              return rr.json().get("id") if rr.status_code < 400 else None

          def fetch_prod_pics(pid):
              pr = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
              urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[]) if p.get('url') or p.get('secure_url')]
              return urls

          # Atributos comunes
          def common_attrs(brand, model, color, main_color, mpn, gtin, sku,
                           power, minfreq, maxfreq, soundrange, battery_autonomy,
                           charge_time, battery_type, h_cm, w_cm, d_cm, weight_g,
                           ip_class, has_auracast=False):
              return [
                  {"id":"BRAND","value_name":brand},{"id":"MODEL","value_name":model},
                  {"id":"MPN","value_name":mpn},{"id":"GTIN","value_name":gtin},
                  {"id":"MANUFACTURER","value_name":"Harman International Industries"},
                  {"id":"SELLER_SKU","value_name":sku},
                  {"id":"COLOR","value_name":color},{"id":"MAIN_COLOR","value_name":main_color},
                  {"id":"ITEM_CONDITION","value_name":"Usado"},
                  {"id":"POWER_OUTPUT_RMS","value_name":f"{power} W","value_struct":{"number":power,"unit":"W"}},
                  {"id":"MIN_FREQUENCY_RESPONSE","value_name":f"{minfreq} Hz","value_struct":{"number":minfreq,"unit":"Hz"}},
                  {"id":"MAX_FREQUENCY_RESPONSE","value_name":f"{maxfreq} kHz","value_struct":{"number":maxfreq,"unit":"kHz"}},
                  {"id":"SOUND_RANGE","value_name":f"{soundrange} m","value_struct":{"number":soundrange,"unit":"m"}},
                  {"id":"SPEAKERS_NUMBER","value_name":"1"},{"id":"SPEAKER_FORMAT","value_name":"Caja"},
                  {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
                  {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
                  {"id":"MAX_BATTERY_AUTONOMY","value_name":f"{battery_autonomy} h","value_struct":{"number":battery_autonomy,"unit":"h"}},
                  {"id":"CHARGE_TIME","value_name":f"{charge_time} h","value_struct":{"number":charge_time,"unit":"h"}},
                  {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
                  {"id":"BATTERY_TYPE","value_name":battery_type},
                  {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"WITH_WI_FI","value_name":"No"},
                  {"id":"WITH_NFC","value_name":"No"},{"id":"WITH_RADIO","value_name":"No"},
                  {"id":"IS_WIRELESS","value_name":"Sí"},
                  {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
                  {"id":"IS_WATERPROOF","value_name":"Sí"},{"id":"IP_CLASSIFICATION","value_name":ip_class},
                  {"id":"IS_DUST_RESISTANT","value_name":"Sí"},{"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
                  {"id":"IS_PORTABLE","value_name":"Sí"},{"id":"WITH_BASE","value_name":"No"},
                  {"id":"WITH_LED_LIGHTS","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"No"},
                  {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},{"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
                  {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},{"id":"WITH_VOICE_EFFECT","value_name":"No"},
                  {"id":"WITH_SCREEN","value_name":"No"},{"id":"IS_GAMER","value_name":"No"},
                  {"id":"IS_PROFESSIONAL","value_name":"No"},{"id":"IS_A_STAGE_MONITOR","value_name":"No"},
                  {"id":"INCLUDES_SUPPORT","value_name":"No"},{"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
                  {"id":"INCLUDES_CHARGER","value_name":"No"},{"id":"INCLUDES_WHEELS","value_name":"No"},
                  {"id":"INCLUDES_LATCH","value_name":"No"},
                  {"id":"HEIGHT","value_name":f"{h_cm} cm","value_struct":{"number":h_cm,"unit":"cm"}},
                  {"id":"WIDTH","value_name":f"{w_cm} cm","value_struct":{"number":w_cm,"unit":"cm"}},
                  {"id":"DEPTH","value_name":f"{d_cm} cm","value_struct":{"number":d_cm,"unit":"cm"}},
                  {"id":"WEIGHT","value_name":f"{weight_g} g","value_struct":{"number":weight_g,"unit":"g"}},
              ]

          # Definicion de cada producto a publicar
          targets = [
              {
                  "key":"Go3 Negro", "product_id":"MLM46039390",
                  "title":"JBL Go 3 Bocina Bluetooth Portatil Negra Original Usada",
                  "price":299, "color":"Negro","main_color":"Negro",
                  "mpn":"JBLGO3BLKAM","gtin":"050036394123","sku":"JBL-GO3-NGR-001",
                  "model":"Go 3",
                  "power":4.2,"minfreq":110,"maxfreq":20,"soundrange":10,
                  "battery_autonomy":5,"charge_time":2.5,"battery_type":"Ion de litio",
                  "h_cm":7.52,"w_cm":8.75,"d_cm":4.1,"weight_g":209, "ip":"IP67",
              },
              {
                  "key":"Charge 6 Negro", "product_id":"MLM51435334",
                  "title":"JBL Charge 6 Bocina Bluetooth Portatil Negra Original Usada",
                  "price":499, "color":"Negro","main_color":"Negro",
                  "mpn":"JBLCHARGE6BLKAM","gtin":"050036399456","sku":"JBL-CHG6-NGR-001",
                  "model":"Charge 6",
                  "power":40,"minfreq":60,"maxfreq":20,"soundrange":30,
                  "battery_autonomy":24,"charge_time":4,"battery_type":"Ion de litio",
                  "h_cm":9.4,"w_cm":22.8,"d_cm":9.4,"weight_g":960, "ip":"IP68",
              },
              {
                  "key":"Charge 6 Rojo", "product_id":"MLM49006175",
                  "title":"JBL Charge 6 Bocina Bluetooth Portatil Roja Original Usada",
                  "price":499, "color":"Rojo","main_color":"Rojo",
                  "mpn":"JBLCHARGE6REDAM","gtin":"050036399463","sku":"JBL-CHG6-RED-001",
                  "model":"Charge 6",
                  "power":40,"minfreq":60,"maxfreq":20,"soundrange":30,
                  "battery_autonomy":24,"charge_time":4,"battery_type":"Ion de litio",
                  "h_cm":9.4,"w_cm":22.8,"d_cm":9.4,"weight_g":960, "ip":"IP68",
              },
              {
                  "key":"Charge 6 Azul", "product_id":"MLM48897018",
                  "title":"JBL Charge 6 Bocina Bluetooth Portatil Azul Original Usada",
                  "price":499, "color":"Azul marino","main_color":"Azul",
                  "mpn":"JBLCHARGE6BLUAM","gtin":"050036399470","sku":"JBL-CHG6-AZMAR-001",
                  "model":"Charge 6",
                  "power":40,"minfreq":60,"maxfreq":20,"soundrange":30,
                  "battery_autonomy":24,"charge_time":4,"battery_type":"Ion de litio",
                  "h_cm":9.4,"w_cm":22.8,"d_cm":9.4,"weight_g":960, "ip":"IP68",
              },
              {
                  "key":"Charge 6 Squad", "product_id":"MLM50286496",
                  "title":"JBL Charge 6 Bocina Bluetooth Portatil Camuflaje Original Usada",
                  "price":499, "color":"Camuflaje","main_color":"Verde",
                  "mpn":"JBLCHARGE6SQDAM","gtin":"050036399487","sku":"JBL-CHG6-SQUAD-001",
                  "model":"Charge 6",
                  "power":40,"minfreq":60,"maxfreq":20,"soundrange":30,
                  "battery_autonomy":24,"charge_time":4,"battery_type":"Ion de litio",
                  "h_cm":9.4,"w_cm":22.8,"d_cm":9.4,"weight_g":960, "ip":"IP68",
              },
          ]

          results = []
          for t in targets:
              print(f"\n======== {t['key']} ========")
              if len(t["title"]) > 60:
                  # reducir
                  t["title"] = t["title"].replace("Bocina Bluetooth Portatil","Bluetooth Portatil")
                  print(f"  title recortado a {len(t['title'])} chars")

              urls = fetch_prod_pics(t["product_id"])
              print(f"  fotos disponibles: {len(urls)}")
              pic_ids = []
              for u in urls[:11]:
                  b = optimize(u)
                  if not b: continue
                  pid = upload_pic(b)
                  if pid: pic_ids.append({"id": pid})
              print(f"  fotos subidas: {len(pic_ids)}")
              if not pic_ids:
                  print(f"  SKIP: sin fotos")
                  results.append((t["key"], None, "no_pics"))
                  continue

              attrs = common_attrs(
                  brand="JBL", model=t["model"], color=t["color"], main_color=t["main_color"],
                  mpn=t["mpn"], gtin=t["gtin"], sku=t["sku"],
                  power=t["power"], minfreq=t["minfreq"], maxfreq=t["maxfreq"],
                  soundrange=t["soundrange"], battery_autonomy=t["battery_autonomy"],
                  charge_time=t["charge_time"], battery_type=t["battery_type"],
                  h_cm=t["h_cm"], w_cm=t["w_cm"], d_cm=t["d_cm"], weight_g=t["weight_g"],
                  ip_class=t["ip"],
              )

              desc = (
                  f"Bocina JBL {t['model']} color {t['color'].lower()} en perfecto estado, practicamente sin uso: "
                  f"solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
                  f"Producto 100 por ciento original JBL. "
                  f"IMPORTANTE: esta unidad NO es compatible con la aplicacion JBL Portable; "
                  f"su operacion es Bluetooth estandar. "
                  f"Sonido potente, bateria en excelente estado, resistencia {t['ip']}, "
                  f"hasta {t['battery_autonomy']} horas de reproduccion. "
                  f"Envio GRATIS con Mercado Envios desde Mexico. Facturamos si se requiere."
              )

              item = {
                  "title": t["title"],
                  "category_id": "MLM59800",
                  "price": t["price"], "currency_id":"MXN",
                  "available_quantity": 1, "buying_mode":"buy_it_now",
                  "listing_type_id":"gold_pro", "condition":"used",
                  "pictures": pic_ids, "attributes": attrs,
                  "sale_terms": [
                      {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                      {"id":"WARRANTY_TIME","value_name":"7 días"},
                  ],
                  "shipping": {"mode":"me2","local_pick_up":False,"free_shipping":True}
              }
              r = requests.post("https://api.mercadolibre.com/items", headers=H, json=item)
              print(f"  POST status={r.status_code}")
              resp = r.json()
              if r.status_code >= 400:
                  print(f"  ERR: {json.dumps(resp, ensure_ascii=False)[:800]}")
                  results.append((t["key"], None, f"err_{r.status_code}"))
                  continue
              nid = resp["id"]
              requests.put(f"https://api.mercadolibre.com/items/{nid}/description",
                  headers=H, json={"plain_text": desc})
              print(f"  OK id={nid}  {resp.get('permalink')}")
              results.append((t["key"], nid, t["sku"]))

          print("\n======== RESUMEN ========")
          for key, nid, sku in results:
              print(f"  {key}: {nid}  {sku}")

          tt = os.environ.get("TELEGRAM_BOT_TOKEN"); tc = os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              msg = "📦 *Batch publicado*\n\n" + "\n".join(f"• {k}: `{i or '—'}`" for k,i,_ in results)
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage",
                  json={"chat_id": tc, "parse_mode":"Markdown","text": msg})
          PY
