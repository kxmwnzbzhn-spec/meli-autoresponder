name: Revert price hike
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}", "Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Divide por 1.5 para revertir el +50%
          DIVIDE_BY = 1.5
          
          def nice_price(p):
              """Redondear a .49 o .99 endings"""
              if p < 100: return round(p)
              base = int(p)
              # Round to nearest .49 or .99
              last_two = base % 100
              # Find closest among .49 and .99
              candidates = [base - last_two + 49, base - last_two + 99,
                            base - last_two - 51, base - last_two + 149]
              return min(candidates, key=lambda x: abs(x - p))
          
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status=active&limit=50", headers=h, timeout=15)
          active = r.json().get("results", [])
          print(f"Active items: {len(active)}")
          
          changed = []
          skipped = []
          for iid in active:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,price,catalog_listing", headers=h, timeout=10)
              it = r.json()
              cur = int(it.get("price") or 0)
              if cur <= 0: continue
              new = nice_price(cur / DIVIDE_BY)
              title = it.get("title","")[:50]
              if it.get("catalog_listing"):
                  # Catalog listings: lower the price but handle via catalog endpoint? Just try PUT anyway
                  r_p = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h,
                      json={"price": new}, timeout=15)
                  if r_p.status_code == 200:
                      changed.append((iid, cur, new, title, "catalog"))
                      print(f"  ✓ {iid} (catalog) ${cur} → ${new} | {title}")
                  else:
                      skipped.append((iid, r_p.status_code, r_p.json().get("message","")[:60]))
                      print(f"  ✗ {iid} (catalog): {r_p.status_code} {r_p.json().get('message','')[:60]}")
                  continue
              # Regular
              r_p = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"price": new}, timeout=15)
              if r_p.status_code == 200:
                  changed.append((iid, cur, new, title, "regular"))
                  print(f"  ✓ {iid} ${cur} → ${new} | {title}")
              else:
                  skipped.append((iid, r_p.status_code, r_p.json().get("message","")[:60]))
                  print(f"  ✗ {iid}: {r_p.status_code} {r_p.json().get('message','')[:60]}")
          
          print(f"\n=== RESUMEN ===\n  Cambios: {len(changed)}\n  Skipped: {len(skipped)}")
          
          # Sync catalog_listings.json with new catalog price
          try:
              with open("catalog_listings.json") as f:
                  clc = json.load(f)
              for cat_id, meta in clc.items():
                  if cat_id.startswith("_") or not isinstance(meta, dict): continue
                  ci = meta.get("catalog_item_id")
                  if not ci: continue
                  # find new price
                  for (iid, cur, new, title, typ) in changed:
                      if iid == ci:
                          meta["last_price"] = new
                          meta["floor_alerted"] = False
                          print(f"  catalog_listings.json: {ci} last_price={new}")
                          break
              with open("catalog_listings.json","w") as f:
                  json.dump(clc, f, indent=2, ensure_ascii=False)
          except Exception as e:
              print(f"cl sync err: {e}")
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"💰 *Precios revertidos /1.5*\n\n"
              m += f"Cambios: *{len(changed)}*\n"
              if skipped:
                  m += f"Saltados: *{len(skipped)}*\n"
              m += f"\nPrecios volvieron al original (antes del +50%)."
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add catalog_listings.json
          git diff --cached --quiet || git commit -m "[price] revert hike /1.5"
          git push || echo "no push"
