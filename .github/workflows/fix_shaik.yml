name: Fix Shaik item
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, requests, time, json
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          # 1. Get the Shaik item details
          iid = "MLM5220687352"
          r = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=15)
          it = r.json()
          print(f"Current state: {it.get('status')} ss={it.get('sub_status')}")
          print(f"Title: {it.get('title')}")
          print(f"Catalog: {it.get('catalog_product_id')}")
          print(f"Pics: {len(it.get('pictures',[]))}")
          for p in it.get('pictures',[])[:3]:
              print(f"  {p.get('url') or p.get('secure_url')}")
          
          # 2. Close this broken item (already flagged as not reactivable)
          r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"status":"closed"}, timeout=15)
          print(f"\nClose {iid}: {r.status_code}")
          
          # 3. Check also MLM2880142515 (another Shaik Sapphire — same product)
          iid2 = "MLM2880142515"
          r = requests.get(f"https://api.mercadolibre.com/items/{iid2}", headers=h, timeout=15)
          if r.status_code == 200:
              it2 = r.json()
              print(f"\n{iid2}: {it2.get('status')} ss={it2.get('sub_status')}")
              # Also close if same issue
              if "inactive" in (it2.get("status") or "") or it2.get("status") == "under_review":
                  rc = requests.put(f"https://api.mercadolibre.com/items/{iid2}", headers=h, json={"status":"closed"}, timeout=15)
                  print(f"Close {iid2}: {rc.status_code}")
          
          # 4. Search for correct Shaik Sapphire catalog with proper photos matching SHAIK brand
          print("\n=== Searching Shaik Sapphire catalogs ===")
          for q in ["Shaik Sapphire Opulent","Shaik Opulent 77","Shaik Chic Sapphire"]:
              r = requests.get(f"https://api.mercadolibre.com/products/search?site_id=MLM&q={q.replace(' ','+')}&limit=5", headers=h, timeout=15)
              for p in r.json().get("results",[])[:5]:
                  pid = p.get("id")
                  nm = p.get("name","")
                  if "shaik" not in nm.lower(): continue
                  r2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=h, timeout=8)
                  pd = r2.json()
                  attrs = {a.get("id"): a.get("value_name") for a in pd.get("attributes",[])}
                  brand = attrs.get("BRAND","?")
                  gtin = attrs.get("GTIN")
                  pics = pd.get("pictures",[])
                  print(f"  {pid} | brand={brand} | gtin={gtin} | pics={len(pics)} | {nm[:70]}")
          PY
