name: Reactivate all JBL
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}", "Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Scan all items, find JBL paused
          results = []
          for st in ("paused","closed","inactive","active"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=50", headers=h, timeout=15)
              for iid in r.json().get("results", []):
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,status,sub_status", headers=h, timeout=8)
                  it = r2.json()
                  title = (it.get("title") or "").lower()
                  if "jbl" not in title:
                      continue
                  results.append((iid, it.get("status"), it.get("sub_status"), it.get("title")))
          
          print(f"=== {len(results)} JBL items found ===")
          reactivated = []
          skipped = []
          for iid, status, ss, title in results:
              if status == "active":
                  skipped.append((iid, "already active"))
                  continue
              if ss and any(s in ("forbidden","deleted") for s in (ss if isinstance(ss,list) else [ss])):
                  skipped.append((iid, f"sub_status {ss}"))
                  continue
              # Try reactivate
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h,
                  json={"status":"active"}, timeout=20)
              if r.status_code == 200:
                  reactivated.append((iid, title))
                  print(f"  ✓ {iid} | {title[:55]}")
              else:
                  msg = r.json().get("message","")
                  # Try closed → relist
                  if status == "closed":
                      r2 = requests.post(f"https://api.mercadolibre.com/items/{iid}/relist", headers=h, json={"quantity":1}, timeout=20)
                      if r2.status_code in (200,201):
                          new_id = r2.json().get("id")
                          reactivated.append((new_id, title + " (relisted)"))
                          print(f"  ✓ {iid} → {new_id} (relist) | {title[:50]}")
                          continue
                  skipped.append((iid, f"{r.status_code} {msg[:80]}"))
                  print(f"  ✗ {iid}: {r.status_code} {msg[:80]}")
          
          print(f"\n=== RESUMEN ===\n  Reactivados: {len(reactivated)}\n  Skipped: {len(skipped)}")
          
          # Update stock_config: clear paused_by_user + auto_replenish=true
          try:
              with open("stock_config.json") as f:
                  cfg = json.load(f)
              changed = 0
              for k in list(cfg.keys()):
                  if k.startswith("_") or not isinstance(cfg[k], dict): continue
                  v = cfg[k]
                  label = (v.get("label") or "").lower()
                  # Match JBL items via label
                  if "jbl" in label and not v.get("deleted"):
                      if v.get("paused_by_user"):
                          v.pop("paused_by_user", None)
                          changed += 1
                      if not v.get("auto_replenish"):
                          v["auto_replenish"] = True
                          changed += 1
              with open("stock_config.json","w") as f:
                  json.dump(cfg, f, indent=2, ensure_ascii=False)
              print(f"stock_config updated: {changed} changes")
          except Exception as e:
              print(f"stock_config err: {e}")
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"🟢 *JBL reactivados*\n\nReactivados: *{len(reactivated)}*\nSkipped: *{len(skipped)}*\n\nauto_replenish ON para todos."
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock_config.json
          git diff --cached --quiet || git commit -m "[jbl] reactivate all + enable auto_replenish"
          git push || echo "no push"
