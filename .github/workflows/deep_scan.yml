name: Deep scan all items
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_token():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  body = r.json()
                  if r.status_code == 200 and "access_token" in body:
                      return body["access_token"]
                  time.sleep(5)
              raise Exception("auth failed")
          tok = get_token()
          h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          print(f"Account: {r.json().get('nickname')} ({sid})")
          
          # Scan ALL items in ALL statuses
          all_items = []
          for st in ("active","paused","under_review","inactive","closed"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              ids = r.json().get("results",[])
              all_items.extend([(iid, st) for iid in ids])
              print(f"  {st}: {len(ids)}")
          print(f"Total: {len(all_items)}")
          
          # Count by (status, sub_status)
          from collections import Counter
          breakdown = Counter()
          invoice_related = []
          all_paused = []
          
          for iid, search_st in all_items:
              try:
                  r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,status,sub_status,tags,health", headers=h, timeout=8)
                  it = r.json()
                  title = it.get("title","")[:55]
                  status = it.get("status","")
                  ss = it.get("sub_status") or []
                  if isinstance(ss, str): ss = [ss]
                  tags = it.get("tags") or []
                  
                  key = f"{status}:{','.join(sorted(ss)) or '-'}"
                  breakdown[key] += 1
                  
                  # Check for invoice-related tags/substatus
                  all_flags = list(ss) + list(tags)
                  if any("invoice" in str(f).lower() or "documentation" in str(f).lower() or "factura" in str(f).lower() or "pending" in str(f).lower() or "waiting" in str(f).lower() for f in all_flags):
                      invoice_related.append((iid, status, ss, tags, title))
                  
                  if status in ("paused","under_review","inactive"):
                      all_paused.append((iid, status, ss, tags, title))
                  
                  # Also check moderation endpoint
                  try:
                      rm = requests.get(f"https://api.mercadolibre.com/items/{iid}/moderations", headers=h, timeout=5)
                      if rm.status_code == 200:
                          mods = rm.json()
                          if mods:
                              print(f"\n  MODERATIONS {iid}: {json.dumps(mods)[:300]}")
                  except: pass
              except Exception as e:
                  print(f"  err {iid}: {e}")
          
          print("\n=== Breakdown (status:sub_status → count) ===")
          for k, n in breakdown.most_common():
              print(f"  {n:3}x {k}")
          
          print(f"\n=== TODOS los PAUSADOS/REVIEW/INACTIVE ({len(all_paused)}) ===")
          for iid, status, ss, tags, title in all_paused:
              print(f"  {iid} [{status}] ss={ss} tags={tags} | {title}")
          
          print(f"\n=== INVOICE/DOCUMENTATION FLAGS ({len(invoice_related)}) ===")
          for iid, status, ss, tags, title in invoice_related:
              print(f"  {iid} [{status}] ss={ss} tags={tags} | {title}")
          PY
