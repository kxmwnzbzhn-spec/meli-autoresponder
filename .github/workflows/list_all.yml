name: List all items (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]; H = {"Authorization": f"Bearer {AT}"}
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]
          for st in ["active","paused","closed","under_review"]:
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search",
                  params={"status":st,"limit":50}, headers=H).json()
              ids = r.get("results",[])
              print(f"=== {st}: {len(ids)} ===")
              for iid in ids[:20]:
                  it = requests.get(f"https://api.mercadolibre.com/items/{iid}",
                      headers=H, params={"attributes":"id,title,price,status,sub_status"}).json()
                  print(f"  {iid} ${it.get('price')} · {(it.get('title') or '')[:50]}")
          PY
