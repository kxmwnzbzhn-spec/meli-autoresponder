name: TG test (one-shot)
on:
  workflow_dispatch:
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RETURNS_BOT_TOKEN: ${{ secrets.TELEGRAM_RETURNS_BOT_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          MAIN = os.environ["TELEGRAM_BOT_TOKEN"]
          RET  = os.environ["TELEGRAM_RETURNS_BOT_TOKEN"]
          CHAT = os.environ["TELEGRAM_CHAT_ID"]

          # Test 1: mensaje simple al bot principal
          r1 = requests.post(f"https://api.telegram.org/bot{MAIN}/sendMessage",
              json={"chat_id": CHAT, "text": "🧪 Test main bot OK"})
          print("main:", r1.status_code, r1.json().get("ok"), r1.json().get("description",""))

          # Test 2: intentar con markdown + botones (como start_return_playbook)
          msg = "🚨 *DEVOLUCION ABIERTA*\n\nClaim: `TEST-001`\nComprador: `999999999`\n\nCuando llegue el paquete:"
          r2 = requests.post(f"https://api.telegram.org/bot{MAIN}/sendMessage",
              json={"chat_id": CHAT, "text": msg, "parse_mode": "Markdown",
                    "reply_markup": {"inline_keyboard": [[
                        {"text":"📦 Iniciar protocolo anti-fraude",
                         "url":"https://t.me/Sonixmx_devoluciones_bot?start=TEST-001"}
                    ]]}})
          print("main+md+btn:", r2.status_code, r2.json().get("ok"), r2.json().get("description",""))

          # Test 3: mensaje simple del bot de devoluciones (pueda/no pueda)
          r3 = requests.post(f"https://api.telegram.org/bot{RET}/sendMessage",
              json={"chat_id": CHAT, "text": "🧪 Test returns bot — /start received?"})
          print("returns:", r3.status_code, r3.json().get("ok"), r3.json().get("description",""))

          # Test 4: getUpdates del bot de devoluciones para ver si tiene el chat_id
          r4 = requests.get(f"https://api.telegram.org/bot{RET}/getUpdates")
          print("returns getUpdates:", r4.status_code)
          upd = r4.json()
          print(f"  updates: {len(upd.get('result',[]))}")
          for u in upd.get("result",[])[:5]:
              m = u.get("message") or {}
              print(f"    update={u.get('update_id')} from={m.get('from',{}).get('id')} chat={m.get('chat',{}).get('id')} text={m.get('text','')[:60]}")
          PY
