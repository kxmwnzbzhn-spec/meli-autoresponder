name: print-app
on: {workflow_dispatch: {}}
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
        run: python scripts/print_app.py
