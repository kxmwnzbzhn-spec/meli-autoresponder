name: Find Asva DVR-3 dashcam (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          # Predict category
          title = "Dashcam 3 Camaras Pantalla Full HD Camara Reversa Asva DVR-3"
          print(f"\n=== category predict ===")
          cp = requests.get("https://api.mercadolibre.com/sites/MLM/domain_discovery/search",
              params={"q":title}, headers=H).json()
          print(json.dumps(cp, indent=2)[:1000])

          # Buscar productos en catalog
          for q in ["Asva DVR-3","Asva dashcam","DVR-3 camara","dashcam 3 camaras pantalla"]:
              print(f"\n=== q='{q}' ===")
              s = requests.get("https://api.mercadolibre.com/products/search",
                  params={"site_id":"MLM","q":q,"limit":10}, headers=H).json()
              for r in s.get('results',[])[:10]:
                  rid = r.get('id')
                  pr = requests.get(f"https://api.mercadolibre.com/products/{rid}", headers=H).json()
                  brand=None; model=None
                  for a in pr.get('attributes',[]):
                      if a.get('id')=='BRAND': brand=a.get('value_name')
                      if a.get('id')=='MODEL': model=a.get('value_name')
                  pics = len(pr.get('pictures',[]))
                  print(f"  {rid}: brand={brand} model={model} pics={pics}  name={r.get('name','')[:80]}")
          PY
