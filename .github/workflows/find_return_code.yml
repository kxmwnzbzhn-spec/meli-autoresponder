name: Find daily return code
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          print(f"sid={sid}")
          
          # Probar múltiples endpoints que podrían tener el código diario
          candidates = [
              f"/users/{sid}/returns/pickup_code",
              f"/users/{sid}/returns/daily_code",
              f"/users/{sid}/pickup_code",
              f"/users/{sid}/daily_code",
              f"/post-purchase/v1/returns/pickup_code",
              f"/post-purchase/v1/returns/daily_code",
              f"/post-purchase/v1/returns/seller_code",
              f"/post-purchase/v1/seller/{sid}/returns/code",
              f"/shipments/returns/pickup_code",
              f"/myaccount/returns/code",
              f"/users/{sid}/returns/settings",
              f"/users/{sid}/returns",
              f"/post-purchase/v1/claims/actions",
              f"/returns/actions/pickup_code",
          ]
          for path in candidates:
              r = requests.get(f"https://api.mercadolibre.com{path}", headers=h, timeout=10)
              body = r.text[:300] if r.status_code != 404 else "404"
              if r.status_code != 404:
                  print(f"\n=== {path} → {r.status_code} ===")
                  print(body)
          
          # Try with stage=action_required to get what needs seller action
          print("\n\n=== Claims con acciones pendientes ===")
          r = requests.get("https://api.mercadolibre.com/post-purchase/v1/claims/search?stage=claim&limit=10", headers=h, timeout=15)
          print(f"stage=claim: {r.status_code}, total: {r.json().get('paging',{}).get('total','?')}")
          data = r.json().get("data", [])
          if data:
              print(json.dumps(data[0], indent=2)[:1500])
          
          # Also probe returns endpoint with various claim IDs
          print("\n=== Claims con stage=dispute (devoluciones en curso) ===")
          r = requests.get("https://api.mercadolibre.com/post-purchase/v1/claims/search?stage=dispute&limit=10", headers=h, timeout=15)
          print(f"total: {r.json().get('paging',{}).get('total','?')}")
          for c in r.json().get("data",[])[:3]:
              print(f"  claim {c.get('id')} reason={c.get('reason_id')} status={c.get('status')} type={c.get('type')}")
              cid = c.get('id')
              # Get returns
              rr = requests.get(f"https://api.mercadolibre.com/post-purchase/v1/claims/{cid}/returns", headers=h, timeout=10)
              print(f"    returns: {rr.status_code} {rr.text[:300]}")
          PY
