name: Link Redmi stock
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}", "Content-Type":"application/json"}
          
          CATALOG = "MLM2877711851"
          TRAD = "MLM2877535563"
          
          # Read both items to find existing user_product_id
          for iid in [CATALOG, TRAD]:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=15)
              it = r.json()
              print(f"\n{iid}: status={it.get('status')} qty={it.get('available_quantity')}")
              print(f"  user_product_id: {it.get('user_product_id')}")
              print(f"  seller_custom_field: {it.get('seller_custom_field')}")
              print(f"  inventory_id: {it.get('inventory_id')}")
              # Attributes that might link stock
              for a in it.get('attributes',[]):
                  if a.get('id') in ('SELLER_SKU','PACKAGE_LENGTH','USER_PRODUCT_ID'):
                      print(f"  attr {a['id']}: {a.get('value_name')}")
          
          # MELI: link stock via user_product_id (inventory endpoint)
          # Try 1: PUT user_product_id match to both
          print("\n=== Link via user_product_id ===")
          # Read catalog item's user_product_id
          r = requests.get(f"https://api.mercadolibre.com/items/{CATALOG}", headers=h, timeout=15)
          upid = r.json().get("user_product_id")
          print(f"Catalog user_product_id: {upid}")
          if upid:
              # Patch traditional to use same upid
              r = requests.put(f"https://api.mercadolibre.com/items/{TRAD}", headers=h,
                  json={"user_product_id": upid}, timeout=20)
              print(f"PUT trad user_product_id={upid}: {r.status_code}")
              if r.status_code >= 400:
                  print(f"  err: {r.json()}")
          
          # Try 2: Link via SKU / seller_custom_field (deprecated but sometimes works)
          print("\n=== Link via seller_custom_field SKU ===")
          SKU = "REDMI-BUDS-4-LITE-NEGRO-NUEVO"
          for iid in [CATALOG, TRAD]:
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h,
                  json={"seller_custom_field": SKU,
                        "attributes":[{"id":"SELLER_SKU","value_name":SKU}]}, timeout=20)
              print(f"PUT {iid} SKU: {r.status_code}")
              if r.status_code >= 400:
                  cs = r.json().get("cause",[])
                  for c in cs[:3]: print(f"  {c.get('code')}: {c.get('message','')[:100]}")
          PY
