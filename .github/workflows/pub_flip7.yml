name: Publish JBL Flip 7 Negro (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, io, sys
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Buscar Flip 7 Negro
          print("=== Buscando JBL Flip 7 Negro ===")
          s = requests.get("https://api.mercadolibre.com/products/search",
              params={"site_id":"MLM","q":"JBL Flip 7 Negro","limit":15}, headers=H).json()
          candidates = []
          for r in s.get('results',[])[:15]:
              rid = r.get('id')
              nm = (r.get('name') or '')
              if 'Flip 7' in nm or 'flip 7' in nm.lower():
                  pr = requests.get(f"https://api.mercadolibre.com/products/{rid}", headers=H).json()
                  color = None; model = None
                  for a in pr.get('attributes',[]):
                      if a.get('id') == 'COLOR': color = a.get('value_name')
                      if a.get('id') == 'MODEL': model = a.get('value_name')
                  candidates.append({"id":rid,"name":nm,"color":color,"model":model,"pics":len(pr.get('pictures',[]))})
                  print(f"  {rid}: {nm[:70]} color={color} model={model} pics={len(pr.get('pictures',[]))}")

          # El mejor candidato: el que tenga MODEL=Flip 7 y COLOR=Negro con mas fotos
          best = None
          for c in candidates:
              if (c['color'] or '').lower() in ('negro','black') and c['model'] == 'Flip 7':
                  if best is None or c['pics'] > best['pics']:
                      best = c
          if not best:
              # Fallback: el que tenga MODEL=Flip 7 y mas fotos
              f7 = [c for c in candidates if c['model']=='Flip 7']
              if f7: best = max(f7, key=lambda c: c['pics'])
          if not best:
              print("ERR: no se encontro Flip 7"); sys.exit(1)
          print(f"\nBEST: {best}")

          pr = requests.get(f"https://api.mercadolibre.com/products/{best['id']}", headers=H).json()
          urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[]) if p.get('url') or p.get('secure_url')]

          # optimizar y subir
          pic_ids = []
          for u in urls[:11]:
              try:
                  u2 = u.replace("-F.jpg","-O.jpg")
                  resp = requests.get(u2, timeout=15)
                  if resp.status_code != 200 or len(resp.content) < 3000:
                      resp = requests.get(u, timeout=15)
                  im = Image.open(io.BytesIO(resp.content))
                  if im.mode != "RGB":
                      if im.mode in ("RGBA","LA","P"):
                          bg = Image.new("RGB", im.size, (255,255,255))
                          if im.mode == "P": im = im.convert("RGBA")
                          bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                          im = bg
                      else: im = im.convert("RGB")
                  w,h = im.size
                  s = min(1200/w, 1200/h)
                  nw, nh = int(w*s), int(h*s)
                  im = im.resize((nw,nh), Image.LANCZOS)
                  c = Image.new("RGB", (1200,1200), (255,255,255))
                  c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                  buf = io.BytesIO(); c.save(buf, "JPEG", quality=92)
                  files = {"file":("pic.jpg", buf.getvalue(), "image/jpeg")}
                  rr = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                      headers={"Authorization": f"Bearer {AT}"}, files=files)
                  if rr.status_code < 400:
                      pic_ids.append({"id": rr.json()["id"]})
              except Exception as e:
                  print(f"  pic err: {e}")
          print(f"Fotos subidas: {len(pic_ids)}")

          title = "JBL Flip 7 Bocina Bluetooth Portatil Negra Original Usada"
          print(f"title len={len(title)}")

          desc = (
              "Bocina JBL Flip 7 color negro en perfecto estado, practicamente sin uso: "
              "solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
              "Producto 100 por ciento original JBL. "
              "IMPORTANTE: esta unidad NO es compatible con la aplicacion JBL Portable; "
              "su operacion es Bluetooth estandar. "
              "Sonido potente, bateria en excelente estado, resistencia IP68, "
              "hasta 14 horas de reproduccion (+ 2 extra con PlayTime Boost). "
              "Envio GRATIS con Mercado Envios desde Mexico. Facturamos si se requiere."
          )

          attrs = [
              {"id":"BRAND","value_name":"JBL"},{"id":"MODEL","value_name":"Flip 7"},
              {"id":"MPN","value_name":"JBLFLIP7BLKAM"},{"id":"GTIN","value_name":"050036399128"},
              {"id":"MANUFACTURER","value_name":"Harman International Industries"},
              {"id":"SELLER_SKU","value_name":"JBL-FLIP7-NGR-001"},
              {"id":"COLOR","value_name":"Negro"},{"id":"MAIN_COLOR","value_name":"Negro"},
              {"id":"ITEM_CONDITION","value_name":"Usado"},
              {"id":"POWER_OUTPUT_RMS","value_name":"35 W","value_struct":{"number":35,"unit":"W"}},
              {"id":"MIN_FREQUENCY_RESPONSE","value_name":"65 Hz","value_struct":{"number":65,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE","value_name":"20 kHz","value_struct":{"number":20,"unit":"kHz"}},
              {"id":"SOUND_RANGE","value_name":"15 m","value_struct":{"number":15,"unit":"m"}},
              {"id":"SPEAKERS_NUMBER","value_name":"2"},{"id":"SPEAKER_FORMAT","value_name":"Caja"},
              {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
              {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
              {"id":"MAX_BATTERY_AUTONOMY","value_name":"14 h","value_struct":{"number":14,"unit":"h"}},
              {"id":"CHARGE_TIME","value_name":"2.5 h","value_struct":{"number":2.5,"unit":"h"}},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_NFC","value_name":"No"},{"id":"WITH_RADIO","value_name":"No"},
              {"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
              {"id":"IS_WATERPROOF","value_name":"Sí"},{"id":"IP_CLASSIFICATION","value_name":"IP68"},
              {"id":"IS_DUST_RESISTANT","value_name":"Sí"},{"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
              {"id":"IS_PORTABLE","value_name":"Sí"},{"id":"WITH_BASE","value_name":"No"},
              {"id":"WITH_LED_LIGHTS","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"No"},
              {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},{"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
              {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},{"id":"WITH_VOICE_EFFECT","value_name":"No"},
              {"id":"WITH_SCREEN","value_name":"No"},{"id":"IS_GAMER","value_name":"No"},
              {"id":"IS_PROFESSIONAL","value_name":"No"},{"id":"IS_A_STAGE_MONITOR","value_name":"No"},
              {"id":"INCLUDES_SUPPORT","value_name":"No"},{"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
              {"id":"INCLUDES_CHARGER","value_name":"No"},{"id":"INCLUDES_WHEELS","value_name":"No"},
              {"id":"INCLUDES_LATCH","value_name":"No"},
              {"id":"HEIGHT","value_name":"7.2 cm","value_struct":{"number":7.2,"unit":"cm"}},
              {"id":"WIDTH","value_name":"18.15 cm","value_struct":{"number":18.15,"unit":"cm"}},
              {"id":"DEPTH","value_name":"7.2 cm","value_struct":{"number":7.2,"unit":"cm"}},
              {"id":"WEIGHT","value_name":"560 g","value_struct":{"number":560,"unit":"g"}},
          ]

          item = {
              "title": title, "category_id":"MLM59800",
              "price": 399, "currency_id":"MXN",
              "available_quantity": 1, "buying_mode":"buy_it_now",
              "listing_type_id":"gold_pro", "condition":"used",
              "pictures": pic_ids, "attributes": attrs,
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"7 días"},
              ],
              "shipping": {"mode":"me2","local_pick_up":False,"free_shipping":True}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=H, json=item)
          print(f"POST status={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(json.dumps(resp, ensure_ascii=False)[:2000]); sys.exit(1)
          nid = resp["id"]
          requests.put(f"https://api.mercadolibre.com/items/{nid}/description",
              headers=H, json={"plain_text": desc})
          print(f"OK id={nid} link={resp.get('permalink')}")

          tt = os.environ.get("TELEGRAM_BOT_TOKEN"); tc = os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage",
                  json={"chat_id": tc, "parse_mode":"Markdown",
                        "text": f"🆕 *JBL Flip 7 Negro publicada*\n\n🆔 `{nid}`\n💰 $399 usado\n🔗 {resp.get('permalink')}"})
          print(f"==NEW_ID={nid}==")
          PY
