name: Find duplicates
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          from collections import defaultdict
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Get ALL items (active, paused, under_review)
          all_items = []
          for st in ("active","paused","under_review"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              all_items.extend(r.json().get("results",[]))
          print(f"Total items to scan: {len(all_items)}")
          
          items_by_title = defaultdict(list)
          for iid in all_items:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,price,status,date_created", headers=h, timeout=8)
              it = r.json()
              title = it.get("title","")
              # Normalize: lower, strip, collapse spaces
              norm = " ".join(title.lower().split())
              items_by_title[norm].append({
                  "id": iid, "title": title, "price": it.get("price"),
                  "status": it.get("status"), "date": it.get("date_created","")
              })
          
          # Find duplicates
          dupes = {t: items for t, items in items_by_title.items() if len(items) > 1}
          print(f"\n=== {len(dupes)} DUPLICADOS ENCONTRADOS ===\n")
          for title, items in dupes.items():
              print(f"\n'{title}':")
              for it in items:
                  print(f"  {it['id']} | ${it['price']} | {it['status']} | {it['date'][:19]}")
          
          if not dupes:
              print("No duplicates found.")
          PY
