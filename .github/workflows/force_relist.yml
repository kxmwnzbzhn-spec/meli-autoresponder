name: Force relist 3 items (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Stock config actual
          import urllib.request
          sc_raw = requests.get("https://raw.githubusercontent.com/kxmwnzbzhn-spec/meli-autoresponder/main/stock_config.json").text
          # no es publico, leer local del checkout
          try:
              with open("stock_config.json") as f: cfg = json.load(f)
          except:
              # si no hay checkout, lo traemos del API
              cfg = {}

          targets = ["MLM2874596867","MLM2874537897","MLM5212880744"]

          for iid in targets:
              print(f"\n=== {iid} ===")
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"  status={it.get('status')} sub={it.get('sub_status')} stock={it.get('available_quantity')} vend={it.get('sold_quantity')}")

              # Buscar metadatos en stock_config (por si es un ID sucesor)
              meta = None
              for k,v in cfg.items():
                  if k.startswith("_"): continue
                  if k == iid:
                      meta = v; break
                  if isinstance(v,dict) and iid in (v.get("previous_ids") or []):
                      meta = v
                      print(f"  nota: {iid} es ID previo; sucesor activo = {k}")
                      break

              if not meta:
                  print(f"  NO encontrado en stock_config")
                  continue
              real = meta.get("real_stock",0)
              print(f"  real_stock: {real}")

              # Decidir acción
              if it.get("status") == "closed" and it.get("sold_quantity",0) > 0:
                  # relist
                  ltype = it.get("listing_type_id","gold_pro")
                  iprice = it.get("price")
                  rbody = {"quantity":1,"listing_type_id":ltype,"price":iprice,
                           "currency_id": it.get("currency_id","MXN"),
                           "condition": it.get("condition","used")}
                  if meta.get("seo_title"): rbody["title"] = meta["seo_title"]
                  r = requests.post(f"https://api.mercadolibre.com/items/{iid}/relist",
                      headers=H, json=rbody)
                  print(f"  relist status={r.status_code}")
                  resp = r.json()
                  if r.status_code < 400:
                      new_id = resp.get("id")
                      print(f"  new_id={new_id} link={resp.get('permalink')}")
                  else:
                      print(f"  ERR: {json.dumps(resp, ensure_ascii=False)[:500]}")
              elif it.get("status") in ("paused","inactive") or (it.get("status")=="closed" and it.get("sold_quantity",0)==0):
                  # intentar reactivar
                  body = {"status":"active"}
                  if it.get("available_quantity",0) == 0:
                      body["available_quantity"] = 1
                  r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=H, json=body)
                  print(f"  reactivate status={r.status_code}")
                  if r.status_code >= 400:
                      print(f"  ERR: {json.dumps(r.json(), ensure_ascii=False)[:500]}")
              else:
                  print(f"  item ya activo, nada que hacer")

          # Forzar también un check_and_replenish general
          print("\n=== Disparando check_and_replenish_stock ===")
          # No tengo acceso al bot local, pero puedo hacer el loop aqui
          items_in_cfg = [(k,v) for k,v in cfg.items() if not k.startswith("_") and isinstance(v,dict) and v.get("auto_replenish")]
          fixed = 0
          for item_id, meta in items_in_cfg:
              it = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
              if it.get("status")=="closed" and it.get("sold_quantity",0)>0 and int(meta.get("real_stock",0))>0:
                  print(f"  FIX {item_id}: closed con stock real {meta.get('real_stock')}")
                  rbody = {"quantity":1,"listing_type_id":it.get("listing_type_id","gold_pro"),
                           "price":it.get("price"),"currency_id":it.get("currency_id","MXN"),
                           "condition":it.get("condition","used")}
                  if meta.get("seo_title"): rbody["title"] = meta["seo_title"]
                  r = requests.post(f"https://api.mercadolibre.com/items/{item_id}/relist",
                      headers=H, json=rbody)
                  print(f"    relist {r.status_code}")
                  if r.status_code<400:
                      fixed += 1
                      resp = r.json()
                      print(f"    new={resp.get('id')}")
          print(f"\n=== TOTAL REPUESTOS: {fixed} ===")
          PY
