name: Get cancelled order IDs
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          from datetime import datetime, timedelta, timezone
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          from_48h = (datetime.now(timezone.utc) - timedelta(hours=72)).strftime("%Y-%m-%dT%H:%M:%S.000Z")
          r = requests.get(f"https://api.mercadolibre.com/orders/search?seller={sid}&order.status=cancelled&order.date_created.from={from_48h}&limit=50", headers=h, timeout=15)
          cancelled = r.json().get("results",[])
          print(f"=== CANCELADAS CORONAREGALADOANTONIO (apelables) ===")
          for o in cancelled:
              buyer = (o.get("buyer") or {}).get("nickname","?")
              cd = o.get("cancel_detail") or {}
              if buyer != "CORONAREGALADOANTONIO": continue
              if cd.get("group") != "seller": continue
              oid = o.get("id")
              amt = o.get("total_amount",0)
              dc = o.get("date_created","")[:19]
              items = ",".join(oi.get("item",{}).get("title","?")[:40] for oi in o.get("order_items",[]))
              print(f"  Order ID: {oid} | ${amt} | {dc} | {items}")
          PY
