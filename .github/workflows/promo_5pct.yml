name: Promociones 5% JBL v2
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          jbl = []
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status=active&limit=100", headers=h, timeout=15)
          for iid in r.json().get("results",[]):
              r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,price", headers=h, timeout=6)
              it = r2.json()
              t = (it.get("title") or "").lower()
              if "jbl" in t and "reacondicionado" in t:
                  jbl.append((iid, it.get("title",""), it.get("price")))
          print(f"JBL Reacondicionado: {len(jbl)}")
          
          # First probe with app_version=v2 query param
          test_iid = jbl[0][0]; test_price = jbl[0][2]
          new_price = int(test_price * 0.95)
          
          print(f"\nProbe GET item promo info con app_version=v2")
          r = requests.get(f"https://api.mercadolibre.com/seller-promotions/items/{test_iid}?app_version=v2", headers=h, timeout=10)
          print(f"  [{r.status_code}] {r.text[:400]}")
          
          print(f"\nProbe candidates con app_version")
          r = requests.get(f"https://api.mercadolibre.com/seller-promotions/users/{sid}/candidates?app_version=v2&limit=20", headers=h, timeout=10)
          print(f"  [{r.status_code}] {r.text[:400]}")
          
          # Try posting with app_version param
          for apv in ("v2","v1","vpp"):
              body = {"type":"PRICE_DISCOUNT","item_id":test_iid,"deal_price":new_price}
              r = requests.post(f"https://api.mercadolibre.com/seller-promotions/items/{test_iid}?app_version={apv}",
                                headers=h, json=body, timeout=15)
              print(f"\n[{r.status_code}] POST app_version={apv} body={json.dumps(body)[:80]}")
              print(f"  {r.text[:400]}")
              if r.status_code in (200,201): break
          
          # Maybe structure is different for PRICE_DISCOUNT - offer via top-level promotion
          print("\n=== Try /seller-promotions/promotions ===")
          r = requests.post(f"https://api.mercadolibre.com/seller-promotions/promotions?app_version=v2",
              headers=h, json={"type":"PRICE_DISCOUNT","item_id":test_iid,"deal_price":new_price}, timeout=15)
          print(f"  [{r.status_code}] {r.text[:400]}")
          PY
