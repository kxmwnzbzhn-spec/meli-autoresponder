name: Republicar JBL remanufacturados
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time, re
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Price by model
          PRICES = {"flip 7":899, "go 4":499, "go 3":499, "charge 6":999, "clip 5":799, "grip":699}
          # Dimensions by model
          DIMS = {
              "go":     {"L":12,"W":8,"H":7,"WEIGHT":250},
              "clip":   {"L":10,"W":7,"H":5,"WEIGHT":200},
              "flip":   {"L":17,"W":8,"H":8,"WEIGHT":480},
              "charge": {"L":20,"W":8,"H":8,"WEIGHT":480},
              "grip":   {"L":14,"W":8,"H":8,"WEIGHT":350},
          }
          
          def model_of(title):
              t = title.lower()
              for m in ["flip 7","go 4","go 3","charge 6","clip 5","grip"]:
                  if m in t: return m
              return None
          
          def color_of(title):
              t = title.lower()
              for c in ["negra","negro","roja","rojo","azul marino","azul","rosa","morada","morado","camuflaje","verde"]:
                  if c in t: return c
              return None
          
          def dim_of(model):
              if "flip" in model: return DIMS["flip"]
              if "charge" in model: return DIMS["charge"]
              if "clip" in model: return DIMS["clip"]
              if "grip" in model: return DIMS["grip"]
              return DIMS["go"]
          
          # Get all JBL active items + their catalog_product_id
          jbl = []
          for st in ("active","paused","under_review"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              for iid in r.json().get("results",[]):
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=8)
                  it = r2.json()
                  if "jbl" not in (it.get("title","") or "").lower(): continue
                  pics = [{"source": p.get("url") or p.get("secure_url")} for p in it.get("pictures",[]) if p.get("url") or p.get("secure_url")]
                  attrs = {a.get("id"): a.get("value_name") for a in it.get("attributes",[])}
                  jbl.append({
                      "id": iid, "title": it.get("title",""), "status": it.get("status"),
                      "catalog_product_id": it.get("catalog_product_id"),
                      "category_id": it.get("category_id") or "MLM59800",
                      "pictures": pics[:8],
                      "brand": attrs.get("BRAND") or "JBL",
                      "model": attrs.get("MODEL"),
                      "color": attrs.get("COLOR"),
                      "line": attrs.get("LINE"),
                  })
          print(f"=== {len(jbl)} JBL encontrados ===\n")
          
          # Load stock_config
          try:
              with open("stock_config.json") as f: stock = json.load(f)
          except: stock = {}
          
          # Process each
          ok = 0; err = 0
          for old in jbl:
              old_id = old["id"]
              title_old = old["title"]
              m = model_of(title_old)
              c = color_of(title_old)
              if not m or not c:
                  print(f"[SKIP] {old_id}: no model/color parsed from '{title_old[:50]}'")
                  continue
              price = PRICES.get(m)
              if not price:
                  print(f"[SKIP] {old_id}: no price for model '{m}'")
                  continue
              dims = dim_of(m)
              
              # Build new title
              model_label = m.title()  # "Flip 7", "Go 4", etc.
              color_label = c.capitalize()
              if color_label.lower() in ("negra","negro"): color_label = "Negra"
              elif color_label.lower() in ("roja","rojo"): color_label = "Roja"
              elif color_label.lower() == "azul marino": color_label = "Azul Marino"
              elif color_label.lower() == "camuflaje": color_label = "Camuflaje"
              
              new_title = f"Bocina Bluetooth Jbl {model_label} Portatil {color_label} Reacondicionado"
              if len(new_title) > 60:
                  new_title = f"Jbl {model_label} Bluetooth Portatil {color_label} Reacondicionado"
                  if len(new_title) > 60:
                      new_title = f"Jbl {model_label} {color_label} Reacondicionado Bluetooth"[:60]
              
              print(f"\n[{old_id}] {title_old[:45]}")
              print(f"  → {new_title} (${price}) catalog={old['catalog_product_id']}")
              
              # 1) Pause old item (keep as backup, don't close)
              rp = requests.put(f"https://api.mercadolibre.com/items/{old_id}", headers=h,
                  json={"status":"paused"}, timeout=15)
              print(f"  pause old: {rp.status_code}")
              
              # 2) Create new item
              attrs_new = [
                  {"id":"BRAND","value_name":"JBL"},
                  {"id":"COLOR","value_name":color_label},
                  {"id":"PACKAGE_LENGTH","value_name":f"{dims['L']} cm"},
                  {"id":"PACKAGE_WIDTH","value_name":f"{dims['W']} cm"},
                  {"id":"PACKAGE_HEIGHT","value_name":f"{dims['H']} cm"},
                  {"id":"PACKAGE_WEIGHT","value_name":f"{dims['WEIGHT']} g"},
              ]
              if old.get("model"):
                  attrs_new.append({"id":"MODEL","value_name": old["model"]})
              if old.get("line"):
                  attrs_new.append({"id":"LINE","value_name": old["line"]})
              
              body = {
                  "title": new_title,
                  "category_id": old["category_id"],
                  "price": price,
                  "currency_id":"MXN",
                  "available_quantity": 1,
                  "buying_mode":"buy_it_now",
                  "condition":"used",
                  "listing_type_id":"gold_pro",
                  "pictures": old["pictures"],
                  "attributes": attrs_new,
                  "sale_terms":[
                      {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                      {"id":"WARRANTY_TIME","value_name":"30 días"}
                  ],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":False}
              }
              # VINCULAR con catálogo (NO catalog_listing=true)
              if old.get("catalog_product_id"):
                  body["catalog_product_id"] = old["catalog_product_id"]
              
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              resp = r.json()
              if r.status_code not in (200,201) and body.get("catalog_product_id"):
                  # Retry without catalog link if it failed
                  body.pop("catalog_product_id", None)
                  r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
                  resp = r.json()
              
              if r.status_code in (200,201):
                  new_id = resp.get("id")
                  print(f"  ✓ NEW {new_id} | {resp.get('permalink','')}")
                  ok += 1
                  # Description
                  desc = (
                      f"{new_title}\n\n"
                      f"PRODUCTO REACONDICIONADO\n"
                      f"Bocina bluetooth JBL {model_label} {color_label}, reacondicionada a estado Excelente.\n"
                      f"Probada y verificada al 100% antes de enviar. Condicion estetica con marcas minimas de uso.\n\n"
                      f"CARACTERISTICAS:\n"
                      f"- Bocina bluetooth portatil JBL {model_label}\n"
                      f"- Sonido potente original\n"
                      f"- Resistente al agua\n"
                      f"- Bateria recargable\n"
                      f"- Conectividad bluetooth universal\n\n"
                      f"INCLUYE:\n"
                      f"- Bocina reacondicionada\n"
                      f"- Cable de carga\n\n"
                      f"GARANTIAS:\n"
                      f"- 30 dias de garantia del vendedor\n"
                      f"- Envio el mismo dia antes de 3pm\n"
                      f"- Producto probado antes de enviar\n\n"
                      f"- Sonix Mx"
                  )
                  try:
                      requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h, json={"plain_text":desc}, timeout=15)
                  except: pass
                  # Update stock_config: transfer real_stock from old
                  old_real_stock = 10
                  if old_id in stock:
                      old_real_stock = stock[old_id].get("real_stock", 10)
                      stock[old_id]["_superseded_by"] = new_id
                      stock[old_id]["auto_replenish"] = False  # stop trying to reactivate old
                  stock[new_id] = {
                      "real_stock": old_real_stock, "sku": f"JBL-{new_id[-6:]}",
                      "label": new_title[:50], "auto_replenish": True,
                      "replenish_quantity": 1, "seo_title": new_title,
                      "previous_ids": [old_id], "_jbl_remanufacturado": True
                  }
              else:
                  err += 1
                  errs = [c for c in resp.get("cause",[]) if isinstance(c,dict) and c.get("type")=="error"]
                  for c in errs[:3]:
                      print(f"    err: {c.get('code')}: {c.get('message','')[:120]}")
              
              time.sleep(3)
          
          # Save state
          with open("stock_config.json","w") as f:
              json.dump(stock, f, indent=2, ensure_ascii=False)
          
          print(f"\n=== FINAL === OK:{ok} ERR:{err}")
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown",
                  "text":f"🔄 *JBL republicados*\n\nOK: *{ok}*\nErr: {err}\n\nNuevos precios: Flip 7 $899, Go 4 $499, Charge 6 $999, Clip 5 $799, Grip $699, Go 3 $499\n\nViejos pausados (no cerrados)."})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock_config.json
          git diff --cached --quiet || git commit -m "[jbl] republicar como reacondicionados"
          git push || echo "no push"
