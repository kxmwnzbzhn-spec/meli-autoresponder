name: Buyers breakdown (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          from collections import defaultdict
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          sid = 2681696373

          orders = requests.get("https://api.mercadolibre.com/orders/search",
              params={"seller":sid,"sort":"date_desc","limit":50}, headers=H).json()

          # Agrupar por buyer_id
          by_buyer = defaultdict(list)
          for o in orders.get('results',[]):
              bid = (o.get('buyer') or {}).get('id')
              by_buyer[bid].append(o)

          print(f"Total ordenes: {len(orders.get('results',[]))}")
          print(f"Buyers unicos: {len(by_buyer)}")
          print()
          sorted_buyers = sorted(by_buyer.items(), key=lambda x: -len(x[1]))
          for bid, olist in sorted_buyers[:10]:
              bnick = (olist[0].get('buyer') or {}).get('nickname')
              total_mxn = sum(float(o.get('total_amount',0)) for o in olist)
              print(f"buyer {bid} ({bnick}): {len(olist)} ordenes · ${total_mxn:,.0f} total")
              for o in olist[:12]:
                  items = o.get('order_items',[])
                  item_titles = [(oi.get('item') or {}).get('title','')[:40] for oi in items]
                  pay = [p.get('status') for p in o.get('payments',[])]
                  ship_id = (o.get('shipping') or {}).get('id')
                  print(f"  order={o.get('id')} date={o.get('date_created','')[:19]} status={o.get('status')} pay={pay} ship={ship_id} ${o.get('total_amount')} · {' | '.join(item_titles)}")

          # Si hay un buyer con muchas, traer detalles
          if sorted_buyers and len(sorted_buyers[0][1]) >= 3:
              top_bid = sorted_buyers[0][0]
              olist = sorted_buyers[0][1]
              print(f"\n=== DETALLE del TOP BUYER {top_bid} ===")
              bdet = requests.get(f"https://api.mercadolibre.com/users/{top_bid}", headers=H).json()
              print(f"  nickname: {bdet.get('nickname')}")
              print(f"  registered: {bdet.get('registration_date','')[:10]}")
              print(f"  site_status: {bdet.get('status',{}).get('site_status')}")
              brep = bdet.get('seller_reputation',{}) or {}
              print(f"  seller_rep_level: {brep.get('level_id')}")
              # Shipping comun
              ships = set()
              for o in olist:
                  sh = (o.get('shipping') or {}).get('id')
                  if sh: ships.add(sh)
              print(f"  envíos distintos: {len(ships)}")
              for shid in list(ships)[:3]:
                  sdet = requests.get(f"https://api.mercadolibre.com/shipments/{shid}", headers=H).json()
                  dest = (sdet.get('destination') or {}).get('receiver_address',{}) or {}
                  print(f"    ship {shid}: status={sdet.get('status')} destino={dest.get('city',{}).get('name','')} CP {dest.get('zip_code','')} receptor={dest.get('receiver_name','')}")
          PY
