name: Date format probe
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, requests, time, json
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          # Multiple date formats
          date_formats = [
              ("2026-04-21T15:00:00", "2026-05-11T15:00:00"),
              ("2026-04-21T15:00:00Z", "2026-05-11T15:00:00Z"),
              ("2026-04-21T15:00:00-06:00", "2026-05-11T15:00:00-06:00"),
              ("2026-04-21T15:00:00-0600", "2026-05-11T15:00:00-0600"),
              ("2026-04-21 15:00:00", "2026-05-11 15:00:00"),
              ("2026-04-21", "2026-05-11"),
              (1745269200000, 1746997200000),
          ]
          
          for start, finish in date_formats:
              body = {"type":"PRICE_DISCOUNT","start_date":start,"finish_date":finish}
              r = requests.post("https://api.mercadolibre.com/seller-promotions/promotions?app_version=v2", headers=h, json=body, timeout=10)
              print(f"\n[{r.status_code}] start={start} finish={finish}")
              print(f"  {r.text[:300]}")
          PY
