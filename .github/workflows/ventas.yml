name: Ventas check (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          from datetime import datetime, timedelta, timezone
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]

          orders = requests.get("https://api.mercadolibre.com/orders/search",
              params={"seller":sid,"sort":"date_desc","limit":50}, headers=H).json()
          all_orders = orders.get("results",[])
          total = orders.get("paging",{}).get("total",0)

          now = datetime.now(timezone.utc)
          one_h = now - timedelta(hours=1)
          six_h = now - timedelta(hours=6)
          twelve_h = now - timedelta(hours=12)

          h1 = [o for o in all_orders if datetime.fromisoformat(o['date_created'].replace('Z','+00:00')) >= one_h]
          h6 = [o for o in all_orders if datetime.fromisoformat(o['date_created'].replace('Z','+00:00')) >= six_h]
          h12 = [o for o in all_orders if datetime.fromisoformat(o['date_created'].replace('Z','+00:00')) >= twelve_h]

          rev1 = sum(float(o.get('total_amount',0)) for o in h1)
          rev6 = sum(float(o.get('total_amount',0)) for o in h6)
          rev12 = sum(float(o.get('total_amount',0)) for o in h12)
          rev_all = sum(float(o.get('total_amount',0)) for o in all_orders)

          print(f"=== VENTAS ===")
          print(f"  Ultima hora: {len(h1)} ordenes · ${rev1:,.0f} MXN")
          print(f"  Ultimas 6 h: {len(h6)} ordenes · ${rev6:,.0f}")
          print(f"  Ultimas 12 h: {len(h12)} ordenes · ${rev12:,.0f}")
          print(f"  Total histórico: {total} órdenes · ${rev_all:,.0f}")

          print(f"\n=== ULTIMAS 10 ORDENES ===")
          for o in all_orders[:10]:
              items = o.get('order_items',[])
              t = ', '.join([(oi.get('item') or {}).get('title','')[:40] for oi in items][:2])
              buyer = (o.get('buyer') or {}).get('nickname','')
              buyer_id = (o.get('buyer') or {}).get('id')
              pay = [p.get('status') for p in o.get('payments',[])]
              ship_stat = (o.get('shipping') or {}).get('status','')
              blocked = " 🚫" if buyer_id == 735376363 else ""
              print(f"  {o['date_created'][:19]} · ${o['total_amount']} · {buyer}{blocked} · pay={pay} · ship={ship_stat}")
              print(f"    {t}")
          PY
