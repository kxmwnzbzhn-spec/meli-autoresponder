name: Publish JBL Go 4 Negro (one-shot)

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached token
        uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token

      - name: Publish item
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, time, requests, base64, sys

          APP_ID = os.environ["MELI_APP_ID"]
          APP_SECRET = os.environ["MELI_APP_SECRET"]
          RT = os.environ["MELI_REFRESH_TOKEN"]
          TG_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN","")
          TG_CHAT = os.environ.get("TELEGRAM_CHAT_ID","")

          # === Refresh token ===
          tcache = None
          try:
              with open(".meli_token.json") as f:
                  tcache = json.load(f)
          except: pass

          if tcache and tcache.get("expires_at",0) > time.time() + 60:
              AT = tcache["access_token"]
              print(f"[token] cache hit, user_id={tcache.get('user_id')}")
          else:
              r = requests.post("https://api.mercadolibre.com/oauth/token",
                  headers={"Accept":"application/json","Content-Type":"application/x-www-form-urlencoded"},
                  data={"grant_type":"refresh_token","client_id":APP_ID,"client_secret":APP_SECRET,"refresh_token":RT})
              d = r.json()
              AT = d["access_token"]
              print(f"[token] refreshed, user_id={d.get('user_id')}")
              with open(".meli_token.json","w") as f:
                  json.dump({"access_token":AT,"refresh_token":d.get("refresh_token",RT),"user_id":d.get("user_id"),"expires_at":time.time()+d.get("expires_in",21600)-120}, f)

          H = {"Authorization": f"Bearer {AT}", "Accept":"application/json"}

          # === Verificar cuenta ===
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          print(f"[account] {me.get('nickname')} id={me.get('id')} status={me.get('status',{}).get('site_status')}")
          sid = me["id"]

          # === Predecir category ===
          title = "JBL Go 4 Bocina Bluetooth Portatil Negra Original Usada"
          rp = requests.get(f"https://api.mercadolibre.com/sites/MLM/domain_discovery/search?q={requests.utils.quote(title)}", headers=H).json()
          if isinstance(rp, list) and len(rp) > 0:
              cat_id = rp[0].get("category_id")
              print(f"[category] predicted {cat_id} {rp[0].get('category_name')}")
          else:
              cat_id = "MLM1183"
              print(f"[category] fallback MLM1183 - Bocinas Portátiles")

          # === Upload 6 imágenes desde assets/go4_negro_001/ ===
          pic_ids = []
          for i in range(1,7):
              path = f"assets/go4_negro_001/img_{i}.jpg"
              with open(path,"rb") as f:
                  files = {"file": (f"img_{i}.jpg", f, "image/jpeg")}
                  rr = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                      headers={"Authorization": f"Bearer {AT}"}, files=files)
              if rr.status_code >= 400:
                  print(f"[pic] img_{i} ERROR {rr.status_code}: {rr.text[:200]}")
                  sys.exit(1)
              pid = rr.json().get("id")
              pic_ids.append({"id": pid})
              print(f"[pic] img_{i}.jpg → {pid}")

          # === Construir payload del item ===
          desc = (
              "Bocina JBL Go 4 color negro en excelente estado, probada y funcionando al 100%. "
              "Sonido potente y claro, conexion Bluetooth estable, bateria en buen estado. "
              "Producto original JBL. Se entrega solo la bocina sin caja original ni accesorios extra. "
              "Ideal para uso diario, oficina o viajes. Envio seguro con Mercado Envios."
          )

          item = {
              "title": title,
              "category_id": cat_id,
              "price": 300,
              "currency_id": "MXN",
              "available_quantity": 1,
              "buying_mode": "buy_it_now",
              "listing_type_id": "gold_special",
              "condition": "used",
              "pictures": pic_ids,
              "description": {"plain_text": desc},
              "attributes": [
                  {"id":"BRAND","value_name":"JBL"},
                  {"id":"MODEL","value_name":"Go 4"},
                  {"id":"COLOR","value_name":"Negro"},
                  {"id":"LINE","value_name":"Go"},
                  {"id":"ITEM_CONDITION","value_name":"Usado"},
                  {"id":"GTIN","value_name":""}
              ],
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"7 días"}
              ],
              "shipping": {
                  "mode": "me2",
                  "local_pick_up": False,
                  "free_shipping": False
              }
          }

          r = requests.post("https://api.mercadolibre.com/items",
              headers={"Authorization": f"Bearer {AT}","Content-Type":"application/json"},
              json=item)
          print(f"[item] status={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(json.dumps(resp, indent=2, ensure_ascii=False)[:2000])
              sys.exit(1)

          item_id = resp.get("id")
          permalink = resp.get("permalink")
          print(f"[item] ✓ id={item_id}")
          print(f"[item] permalink={permalink}")
          print(f"[item] description en /items/{item_id}/description")

          # Set description via PUT
          dr = requests.put(f"https://api.mercadolibre.com/items/{item_id}/description",
              headers={"Authorization": f"Bearer {AT}","Content-Type":"application/json"},
              json={"plain_text": desc})
          print(f"[desc] status={dr.status_code}")

          # Notificar en Telegram
          if TG_TOKEN and TG_CHAT:
              msg = f"✅ *JBL Go 4 Negro* publicada en cuenta nueva\n\n📦 {title}\n💰 $300 usado\n🆔 `{item_id}`\n🔗 {permalink}"
              requests.post(f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage",
                  json={"chat_id": TG_CHAT, "text": msg, "parse_mode":"Markdown", "disable_web_page_preview": False})
              print("[tg] notified")

          print("\n==PUBLISH_OK==")
          print(f"==ITEM_ID={item_id}==")
          print(f"==PERMALINK={permalink}==")
          PY

      - name: Save token cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token-${{ github.run_id }}
