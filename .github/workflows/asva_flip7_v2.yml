name: asva-flip7-v2
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_ASVA: ${{ secrets.MELI_REFRESH_TOKEN_ASVA }}
        run: python scripts/asva_flip7_v2.py
      - run: |
          git config user.name bot
          git config user.email b@b.com
          git add stock_config_asva.json
          git diff --cached --quiet || git commit -m "ASVA Flip7 unificada published"
          git push || true
