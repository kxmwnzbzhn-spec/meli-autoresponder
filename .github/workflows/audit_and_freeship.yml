name: Audit perfumes + JBL free shipping
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests openpyxl
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # ===== 1) JBL REACONDICIONADO: FREE SHIPPING =====
          print("=== JBL Reacondicionado → free shipping ===")
          jbl_new = []
          for st in ("active","paused","under_review"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              for iid in r.json().get("results",[]):
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title", headers=h, timeout=6)
                  t = r2.json().get("title","")
                  if "jbl" in t.lower() and "reacondicionado" in t.lower():
                      jbl_new.append((iid, t))
          print(f"JBL Reacondicionado: {len(jbl_new)}")
          
          jbl_ok = 0; jbl_err = 0
          for iid, title in jbl_new:
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h,
                  json={"shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}}, timeout=15)
              if r.status_code == 200:
                  jbl_ok += 1
                  print(f"  ✓ {iid} | {title[:45]}")
              else:
                  jbl_err += 1
                  print(f"  ✗ {iid}: {r.status_code}")
              time.sleep(0.5)
          print(f"FreeShip: OK={jbl_ok} ERR={jbl_err}")
          
          # ===== 2) AUDIT PERFUMES (NO changes) =====
          print("\n\n=== AUDITORIA PERFUMES ===")
          perfumes = []
          for st in ("active","paused","under_review"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              for iid in r.json().get("results",[]):
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=8)
                  it = r2.json()
                  title = (it.get("title") or "")
                  # Skip JBL/accesorios/dashcam
                  low = title.lower()
                  if "jbl" in low or "dashcam" in low or "xiaomi" in low or "redmi" in low: continue
                  attrs = {a.get("id"): a.get("value_name") for a in it.get("attributes",[])}
                  perfumes.append({
                      "id": iid, "title": title, "status": it.get("status"),
                      "ss": it.get("sub_status",[]),
                      "price": it.get("price"),
                      "brand": attrs.get("BRAND"),
                      "perfume_name": attrs.get("PERFUME_NAME"),
                      "gtin": attrs.get("GTIN"),
                      "catalog": it.get("catalog_product_id"),
                      "pic0": (it.get("pictures") or [{}])[0].get("url") if it.get("pictures") else None,
                  })
          print(f"Total perfumes: {len(perfumes)}")
          
          # Audit each — flag risky ones
          flagged = []
          for p in perfumes:
              t = p["title"].upper()
              brand = (p["brand"] or "").upper()
              pname = (p["perfume_name"] or "").upper()
              issues = []
              
              # Issue 1: BRAND parece ser nombre del perfume (patrón frecuente)
              risky_brands = {
                  "GENERICO": "BRAND genérico → MELI rechaza. Necesita marca fabricante real",
                  "OPULENT": "'Opulent' no es marca, es línea — real = Shaik",
                  "OUD ROYAL": "'Oud Royal' no es marca, real = Giorgio Armani (Armani Privé)",
                  "MARSHMALLOW": "'Marshmallow' es nombre del perfume, no marca. Ver empaque",
                  "BACCARAT": "'Baccarat Rouge' puede venir — real = Maison Francis Kurkdjian",
                  "GAME OF SPADES": "'Game of Spades' es marca/línea — ok si empaque dice eso",
                  "KURKY": "'Kurky' no es marca — real = Maison Francis Kurkdjian",
                  "MAISON FRANCIS KURKDJIAN": "OK — es la marca real",
                  "PATCHOULI": "no es marca, real = Guerlain",
                  "ROSE AMIRA": "no es marca, real = Guerlain",
              }
              for risky, msg in risky_brands.items():
                  if brand == risky:
                      issues.append(f"BRAND={brand}: {msg}")
              
              # Issue 2: BRAND ausente
              if not p["brand"]:
                  issues.append("BRAND vacío")
              
              # Issue 3: GTIN placeholder '0000...' (los que generé en fast)
              if p["gtin"] and str(p["gtin"]).startswith("0000") and len(str(p["gtin"])) <= 12:
                  issues.append(f"GTIN placeholder: {p['gtin']} — alto riesgo de bloqueo")
              
              # Issue 4: forbidden sub_status
              if "forbidden" in (p["ss"] or []):
                  issues.append("BLOQUEADO forbidden (no-recuperable)")
              
              # Issue 5: BRAND no contenido en título (posible mismatch con foto)
              if p["brand"] and p["brand"].upper() not in t and p["brand"].upper() != "GENERICO":
                  issues.append(f"BRAND '{p['brand']}' no aparece en título → posible mismatch con foto")
              
              if issues:
                  flagged.append({**p, "issues": issues})
          
          print(f"\n=== ITEMS CON ISSUES: {len(flagged)} / {len(perfumes)} ===\n")
          for p in flagged:
              print(f"\n{p['id']} [{p['status']}] ${p['price']}")
              print(f"  Title: {p['title'][:70]}")
              print(f"  BRAND: {p['brand']} | PERFUME_NAME: {p['perfume_name']}")
              print(f"  GTIN: {p['gtin']} | catalog: {p['catalog']}")
              for issue in p["issues"]:
                  print(f"  ⚠ {issue}")
          
          # Save audit to json + markdown for easy read
          with open("audit_perfumes.json","w") as f:
              json.dump({"total":len(perfumes),"flagged":flagged}, f, indent=2, ensure_ascii=False)
          
          md = [f"# Auditoría Perfumes\n\n**Total revisados:** {len(perfumes)}\n**Con issues:** {len(flagged)}\n"]
          for p in flagged:
              md.append(f"\n## {p['id']}  `${p['price']}`  [{p['status']}]")
              md.append(f"**{p['title']}**\n")
              md.append(f"- BRAND: `{p['brand']}`")
              md.append(f"- PERFUME_NAME: `{p['perfume_name']}`")
              md.append(f"- GTIN: `{p['gtin']}`")
              md.append(f"- Catalog: `{p['catalog']}`")
              md.append(f"- Issues:")
              for i in p['issues']:
                  md.append(f"  - ⚠ {i}")
          with open("audit_perfumes.md","w") as f:
              f.write("\n".join(md))
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown",
                  "text":f"🔍 *Auditoría perfumes*\n\nTotal: {len(perfumes)}\n🚩 Con issues: *{len(flagged)}*\n\n✅ JBL free shipping: {jbl_ok}/{len(jbl_new)}\n\nRevisar audit_perfumes.md en el repo (no modifiqué nada)."})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add audit_perfumes.json audit_perfumes.md
          git diff --cached --quiet || git commit -m "audit perfumes (no changes)"
          git push || echo "no push"
