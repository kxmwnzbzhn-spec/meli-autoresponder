name: Daily brief
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          from datetime import datetime, timedelta, timezone
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          me = r.json(); sid = me["id"]
          print(f"=== {me.get('nickname')} ({sid}) ===")
          
          for st in ("active","paused","under_review","closed"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=50", headers=h, timeout=15)
              print(f"  {st}: {len(r.json().get('results',[]))}")
          
          from_24h = (datetime.now(timezone.utc) - timedelta(hours=24)).strftime("%Y-%m-%dT%H:%M:%S.000Z")
          from_today = (datetime.now(timezone.utc).replace(hour=0,minute=0,second=0)).strftime("%Y-%m-%dT%H:%M:%S.000Z")
          from_7d = (datetime.now(timezone.utc) - timedelta(days=7)).strftime("%Y-%m-%dT%H:%M:%S.000Z")
          
          for lbl, f in [("today", from_today),("24h", from_24h),("7d", from_7d)]:
              r = requests.get(f"https://api.mercadolibre.com/orders/search?seller={sid}&order.date_created.from={f}&limit=50", headers=h, timeout=15)
              orders = r.json().get("results",[])
              total = sum(float(x.get("total_amount",0)) for x in orders)
              print(f"\nVentas {lbl}: {len(orders)} orders | ${total:,.0f}")
              if lbl == "today":
                  by = {}
                  for o in orders:
                      for oi in o.get("order_items",[]):
                          iid = oi.get("item",{}).get("id","?")
                          t = oi.get("item",{}).get("title","?")[:45]
                          by[iid] = [by.get(iid,[0,t])[0]+1, t]
                  for iid,(n,t) in sorted(by.items(), key=lambda x:-x[1][0]):
                      print(f"  {n}x {iid} | {t}")
          
          r = requests.get(f"https://api.mercadolibre.com/questions/search?seller_id={sid}&status=UNANSWERED&limit=50", headers=h, timeout=15)
          pq = len(r.json().get("questions",[]) or [])
          print(f"\nPreguntas pendientes: {pq}")
          
          for stg in ("claim","dispute"):
              r = requests.get(f"https://api.mercadolibre.com/post-purchase/v1/claims/search?stage={stg}&limit=5", headers=h, timeout=15)
              print(f"Claims {stg}: {r.json().get('paging',{}).get('total',0)}")
          
          # Visitas 7d
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status=active&limit=50", headers=h, timeout=15)
          active = r.json().get("results",[])
          total_visits=0
          vdata=[]
          for iid in active[:17]:
              r = requests.get(f"https://api.mercadolibre.com/items/visits/time_window?ids={iid}&last=7&unit=day", headers=h, timeout=10)
              vs = r.json()
              if isinstance(vs, list) and vs:
                  v = vs[0].get("total_visits",0); total_visits += v
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=title,price,sold_quantity", headers=h, timeout=10)
                  it = r2.json()
                  vdata.append((v, iid, it.get("price"), it.get("sold_quantity"), it.get("title","")[:45]))
          vdata.sort(key=lambda x:-x[0])
          print(f"\nVisitas 7d total: {total_visits}")
          print("Top items por visitas:")
          for v,iid,p,sq,t in vdata[:10]:
              print(f"  {v:>4} visits | ${p} | vendidas={sq} | {iid} | {t}")
          PY
