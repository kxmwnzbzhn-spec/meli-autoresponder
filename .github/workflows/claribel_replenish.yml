name: claribel-replenish
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
permissions:
  contents: write
concurrency:
  group: claribel-replenish
  cancel-in-progress: true   # nuevo run cancela el anterior si sigue corriendo
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python scripts/claribel_replenish.py
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_CLARIBEL: ${{ secrets.MELI_REFRESH_TOKEN_CLARIBEL }}
          LOOP_ITERATIONS: "4"
          LOOP_SLEEP: "55"
      - run: |
          for i in 1 2 3 4 5; do
            git config user.email b@b.com && git config user.name bot
            git pull --rebase 2>/dev/null && git add stock_config_claribel.json && (git diff --cached --quiet || git commit -m "claribel auto-replenish state") && git push origin main && break
            sleep $((RANDOM % 8 + 3))
          done
