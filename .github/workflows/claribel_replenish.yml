name: claribel-replenish
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # GitHub min 5min, dentro loop 5x cada 60s = replenish cada 1 min
permissions:
  contents: write
concurrency:
  group: claribel-replenish
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # loop dura ~5 min
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python scripts/claribel_replenish.py
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_CLARIBEL: ${{ secrets.MELI_REFRESH_TOKEN_CLARIBEL }}
          LOOP_ITERATIONS: "6"
          LOOP_SLEEP: "50"
      - run: |
          git config user.email b@b.com && git config user.name bot
          git pull --rebase 2>/dev/null || true
          git add stock_config_claribel.json
          git diff --cached --quiet || (git commit -m "claribel auto-replenish state" && (for i in 1 2 3 4 5; do git pull --rebase 2>/dev/null && git push origin main && break || sleep $((RANDOM % 10 + 5)); done))
