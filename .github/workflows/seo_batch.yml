name: SEO batch optimize all JBL/Xiaomi (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          BASE_USB = "\n\n* Nota: esta version incluye entrada USB para reproduccion directa desde memoria."

          def desc_bocina(modelo, color_norm, ip, bateria_h, potencia_w, tipo_extra=""):
              secs = [
                  f"BOCINA BLUETOOTH JBL {modelo.upper()} COLOR {color_norm.upper()} - USADA EN EXCELENTE ESTADO",
                  "",
                  f"Producto 100% original JBL, practicamente sin uso: solo se abrio y se uso una vez. "
                  f"Se entrega con su caja original y todos sus accesorios originales. Ideal para regalo o uso personal.",
                  "",
                  "CARACTERISTICAS PRINCIPALES:",
                  f"- Modelo: JBL {modelo} {color_norm}",
                  f"- Potencia: {potencia_w}W RMS - sonido potente y claro marca JBL",
                  f"- Bateria recargable de hasta {bateria_h} horas de reproduccion continua",
                  f"- Bluetooth 5.3 - emparejamiento rapido con cualquier dispositivo",
                  f"- Resistencia {ip} - a prueba de agua y polvo",
                  "- Cable USB-C de carga original incluido",
                  "- Disenada para uso interior y exterior",
              ]
              if tipo_extra: secs.append("- " + tipo_extra)
              secs += [
                  "",
                  "IMPORTANTE:",
                  "- Esta unidad NO es compatible con la aplicacion JBL Portable.",
                  "- Su operacion es Bluetooth estandar, un dispositivo a la vez.",
                  "",
                  "CONDICIONES DE VENTA:",
                  "- Envio GRATIS con Mercado Envios a todo Mexico",
                  "- Garantia del vendedor 7 dias contra defectos",
                  "- Factura electronica (CFDI) a solicitud",
                  "- Pago con todos los metodos disponibles en Mercado Libre",
                  "",
                  f"Bocina JBL {modelo} original, sonido profesional JBL Pro Sound en un diseno portatil.",
              ]
              return "\n".join(secs)

          def desc_buds():
              return (
                  "AUDIFONOS INALAMBRICOS XIAOMI REDMI BUDS 4 LITE - NEGRO - REACONDICIONADOS\n\n"
                  "Audifonos Bluetooth in-ear Xiaomi Redmi Buds 4 Lite en estado reacondicionado EXCELENTE, "
                  "probados y funcionando al 100%. Reacondicionamiento profesional con prueba de sonido, "
                  "microfono, bateria y emparejamiento.\n\n"
                  "CARACTERISTICAS PRINCIPALES:\n"
                  "- Marca: Xiaomi / Modelo: Redmi Buds 4 Lite\n"
                  "- Bluetooth 5.3 - conexion rapida y estable hasta 10 metros\n"
                  "- Driver dinamico de 12 mm para sonido potente con bajos profundos\n"
                  "- Bateria: hasta 5 horas por carga + 20 horas totales con estuche\n"
                  "- Resistencia IPX4 al sudor y salpicaduras\n"
                  "- Microfono con reduccion de ruido ambiental para llamadas claras\n"
                  "- Controles tactiles personalizables\n"
                  "- Carga por USB-C\n"
                  "- Modo baja latencia para gaming (Game Mode)\n\n"
                  "CONTENIDO:\n"
                  "- 1 par de audifonos Redmi Buds 4 Lite\n"
                  "- 1 estuche de carga\n"
                  "- 1 cable USB-C de carga\n"
                  "- Almohadillas de repuesto (varios tamaños)\n\n"
                  "CONDICIONES DE VENTA:\n"
                  "- Envio GRATIS con Mercado Envios a todo Mexico\n"
                  "- Garantia del vendedor 90 dias contra defectos\n"
                  "- Factura electronica (CFDI) a solicitud\n\n"
                  "Audifonos Xiaomi originales reacondicionados, excelente calidad-precio."
              )

          # Mapeo: id → (titulo_seo, modelo, color_norm, ip, bateria, potencia, tipo_extra, is_buds)
          items = [
              ("MLM2874367731", "Bocina Bluetooth JBL Go 4 Portatil Negra Original Usada", "Go 4", "Negro", "IP67", 7, 4.2, ""),
              ("MLM2874595277", "Bocina Bluetooth JBL Go 4 Portatil Azul Marino Original Usada", "Go 4", "Azul Marino", "IP67", 7, 4.2, ""),
              ("MLM2874595625", "Bocina Bluetooth JBL Go 4 Portatil Roja Original Usada", "Go 4", "Rojo", "IP67", 7, 4.2, ""),
              ("MLM5209619690", "Bocina Bluetooth JBL Go 4 Portatil Camuflaje Original Usada", "Go 4", "Camuflaje", "IP67", 7, 4.2, ""),
              ("MLM2874536995", "Bocina Bluetooth JBL Go 4 Portatil Rosa Chicle Original Usada", "Go 4", "Rosa Chicle", "IP67", 7, 4.2, ""),
              ("MLM2874537147", "Bocina Bluetooth JBL Go 3 Portatil Negra Original Usada", "Go 3", "Negro", "IP67", 5, 4.2, ""),
              ("MLM5209619958", "Bocina Bluetooth JBL Charge 6 Portatil Negra Original Usada", "Charge 6", "Negro", "IP68", 24, 40, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM2874596165", "Bocina Bluetooth JBL Charge 6 Portatil Roja Original Usada", "Charge 6", "Rojo", "IP68", 24, 40, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM2874607951", "Bocina Bluetooth JBL Charge 6 Portatil Azul Original Usada", "Charge 6", "Azul Marino", "IP68", 24, 40, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM5209619970", "Bocina Bluetooth JBL Charge 6 Portatil Camuflaje Original Usada", "Charge 6", "Camuflaje", "IP68", 24, 40, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM5209620060", "Bocina Bluetooth JBL Flip 7 Portatil Negra Original Usada", "Flip 7", "Negro", "IP68", 14, 35, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM2874596867", "Bocina Bluetooth JBL Flip 7 Portatil Roja Original Usada", "Flip 7", "Rojo", "IP68", 14, 35, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM2874537897", "Bocina Bluetooth JBL Flip 7 Portatil Morada Original Usada", "Flip 7", "Morado", "IP68", 14, 35, "Incluye entrada USB para reproduccion desde memoria"),
              ("MLM2874537405", "Bocina Bluetooth JBL Clip 5 Portatil Negra Original Usada", "Clip 5", "Negro", "IP67", 12, 7, "Mosqueton integrado para cuelgue facil"),
              ("MLM2874608285", "Bocina Bluetooth JBL Clip 5 Portatil Rosa Original Usada", "Clip 5", "Rosa Chicle", "IP67", 12, 7, "Mosqueton integrado para cuelgue facil"),
              ("MLM2874537571", "Bocina Bluetooth JBL Clip 5 Portatil Morada Original Usada", "Clip 5", "Morado", "IP67", 12, 7, "Mosqueton integrado para cuelgue facil"),
              ("MLM2874596557", "Bocina Bluetooth JBL Grip Portatil Negra Original Usada", "Grip", "Negro", "IP67", 12, 10, "Mosqueton integrado para cuelgue facil"),
          ]

          for iid, title, modelo, color, ip, bateria, potencia, extra in items:
              if len(title) > 60:
                  title = title.replace("Bocina Bluetooth","Bocina BT")[:60]
              print(f"\n>>> {iid} ({len(title)}): {title}")
              desc = desc_bocina(modelo, color, ip, bateria, potencia, extra)
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
                  headers=H, json={"title": title})
              print(f"  title PUT: {r.status_code}")
              if r.status_code >= 400:
                  try: print(f"   err: {r.json().get('message','')[:200]}")
                  except: pass
              dr = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
                  headers=H, json={"plain_text": desc})
              print(f"  desc PUT: {dr.status_code}")

          # Redmi Buds aparte
          print(f"\n>>> MLM2874537869 Redmi Buds")
          title_b = "Audifonos Xiaomi Redmi Buds 4 Lite Bluetooth Negros"
          r = requests.put("https://api.mercadolibre.com/items/MLM2874537869",
              headers=H, json={"title": title_b})
          print(f"  title PUT: {r.status_code}  ({len(title_b)} chars)")
          dr = requests.put("https://api.mercadolibre.com/items/MLM2874537869/description",
              headers=H, json={"plain_text": desc_buds()})
          print(f"  desc PUT: {dr.status_code}")

          print("\n=== DONE ===")
          PY
