name: MELI Auto-Responder

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: meli-bot-cron
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token
      - name: Run auto-responder loop (15s polling, 14 min)
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RETURNS_BOT_TOKEN: ${{ secrets.TELEGRAM_RETURNS_BOT_TOKEN }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
        run: |
          END=$(( $(date +%s) + 840 ))   # 14 min
          iter=0
          while [ $(date +%s) -lt $END ]; do
            iter=$((iter+1))
            echo "--- iter $iter $(date -u +%H:%M:%S) ---"
            python meli_autoresponder.py || echo "iter failed (non-fatal)"
            if [ $(( $(date +%s) + 18 )) -lt $END ]; then
              sleep 15
            else
              break
            fi
          done
          echo "total iter: $iter"
      - name: Commit state + stock_config if changed
        if: always()
        run: |
          git config user.name "meli-bot"
          git config user.email "bot@sonixmx.local"
          git pull --rebase --no-edit || true
          # commit bot_state.json SIEMPRE que cambie (persistencia real)
          git add bot_state.json stock_config.json 2>/dev/null || true
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "[bot] state sync"
            # push con retry si hay conflicto
            for i in 1 2 3; do
              if git push; then break; fi
              git pull --rebase --no-edit && git push && break
              sleep 2
            done
            echo "bot_state+stock_config committed"
          else
            echo "state sin cambios"
          fi
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token-${{ github.run_id }}
      - name: Auto-chain next run (no dependes del schedule de GH)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_AUTO_CHAIN_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_AUTO_CHAIN_TOKEN no configurado, skip auto-chain"
            exit 0
          fi
          curl -s -o /dev/null -w "chain HTTP %{http_code}\n" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/cron.yml/dispatches" \
            -d '{"ref":"main"}'
