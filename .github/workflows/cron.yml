name: MELI Auto-Responder

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token
      - uses: actions/cache@v4
        with:
          path: .seen_claims.json
          key: seen-state
          restore-keys: seen-state
      - name: Run auto-responder loop (30s polling, 4 min)
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RETURNS_BOT_TOKEN: ${{ secrets.TELEGRAM_RETURNS_BOT_TOKEN }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
        run: |
          END=$(( $(date +%s) + 240 ))
          iter=0
          while [ $(date +%s) -lt $END ]; do
            iter=$((iter+1))
            echo "--- iter $iter $(date -u +%H:%M:%S) ---"
            python meli_autoresponder.py || echo "iter failed (non-fatal)"
            # no dormir en la última iteración
            if [ $(( $(date +%s) + 35 )) -lt $END ]; then
              sleep 30
            else
              break
            fi
          done
          echo "total iteraciones: $iter"
      - name: Commit stock_config.json if changed
        if: always()
        run: |
          if ! git diff --quiet stock_config.json 2>/dev/null; then
            git config user.name "meli-bot"
            git config user.email "bot@sonixmx.local"
            git add stock_config.json
            git commit -m "[bot] auto-replenish: actualizar real_stock"
            git push
            echo "stock_config.json committed"
          else
            echo "stock_config.json sin cambios"
          fi
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token-${{ github.run_id }}
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: .seen_claims.json
          key: seen-state-${{ github.run_id }}
