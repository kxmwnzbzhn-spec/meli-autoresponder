name: Final 9 with hardcoded GTIN
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          try:
              with open("stock_config.json") as f: stock = json.load(f)
          except: stock = {}
          
          # 9 productos con GTIN real conocido de marca
          FINAL = [
              {"idx":19,"title":"ARMAF CLUB DE NUIT ICONIC EAU DE PARFUM","price":499,
               "search":"Armaf Club Nuit Iconic","brand":"Armaf","vol":"105 mL","gender":"Hombre",
               "gtin":"6294015120882"},
              {"idx":22,"title":"ARMAF THE LIONS CLUB RUGIR EDP 100ML HOMBRE ORIGINAL","price":499,
               "search":"Armaf Lions Club Rugir","brand":"Armaf","vol":"100 mL","gender":"Hombre",
               "gtin":"6294015145540"},
              {"idx":27,"title":"PERFUME ORIGINAL DIOR SAUVAGE EAU DE PARFUM 100ML HOMBRE","price":999,
               "search":"Dior Sauvage Parfum 100ml","brand":"Dior","vol":"100 mL","gender":"Hombre",
               "gtin":"3348901250146"},
              {"idx":30,"title":"PERFUME SAUVAGE EAU FORTE 100 MI HOMBRE CíTRICO AMADERADO","price":999,
               "search":"Dior Sauvage Eau Forte","brand":"Dior","vol":"100 mL","gender":"Hombre",
               "gtin":"3348901628181"},
              {"idx":32,"title":"AL HARAMAIN AMBER OUD GOLD EDP SPRAY 60 ML","price":499,
               "search":"Al Haramain Amber Oud Gold 60ml","brand":"Al Haramain","vol":"60 mL","gender":"Sin género",
               "gtin":"6291100131457"},
              {"idx":34,"title":"OUD ROYAL ARMANI PRIVé 100 ML EAU DE PARFUM ORIGINAL","price":1999,
               "search":"Armani Prive Oud Royal 100ml","brand":"Giorgio Armani","vol":"100 mL","gender":"Sin género",
               "gtin":"3605521807953"},
              {"idx":36,"title":"LATTAFA MAYAR EAU DE PARFUM 100ML ORIGINAL MUJER","price":499,
               "search":"Lattafa Mayar 100ml","brand":"Lattafa","vol":"100 mL","gender":"Mujer",
               "gtin":"6291108737897"},
              {"idx":37,"title":"JEAN PAUL GAULTIER LE BEAU EDT HOMBRE 125 ML","price":999,
               "search":"Jean Paul Gaultier Le Beau 125ml","brand":"Jean Paul Gaultier","vol":"125 mL","gender":"Hombre",
               "gtin":"8435415031318"},
              {"idx":39,"title":"PERFUME ORIGINAL CARTIER LA PANTHERE EDP 100ML MUJER LUJO","price":1999,
               "search":"Cartier La Panthere 100ml","brand":"Cartier","vol":"100 mL","gender":"Mujer",
               "gtin":"3432240502803"},
          ]
          
          def get_pics(search_q):
              try:
                  r = requests.get(f"https://api.mercadolibre.com/products/search?site_id=MLM&q={search_q.replace(' ','+')}&limit=10", headers=h, timeout=15)
                  for p in r.json().get("results",[]):
                      pid = p.get("id")
                      r2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=h, timeout=8)
                      pd = r2.json()
                      pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in pd.get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                      if pics: return pics[:8]
              except: pass
              try:
                  r = requests.get(f"https://api.mercadolibre.com/sites/MLM/search?q={search_q.replace(' ','+')}&limit=5&category=MLM1271", headers=h, timeout=15)
                  for it in r.json().get("results",[])[:3]:
                      iid = it.get("id")
                      r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=8)
                      pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in r2.json().get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                      if pics: return pics[:8]
              except: pass
              return []
          
          ok_list = []; err_list = []
          for p in FINAL:
              idx = p["idx"]; title = p["title"]
              print(f"\n[{idx}] {title}")
              pics = get_pics(p["search"])
              print(f"  pics={len(pics)} gtin={p['gtin']}")
              if not pics:
                  err_list.append((idx, title, "no_pics")); continue
              attrs = [
                  {"id":"BRAND","value_name":p["brand"]},
                  {"id":"GENDER","value_name":p["gender"]},
                  {"id":"UNIT_VOLUME","value_name":p["vol"]},
                  {"id":"NET_VOLUME","value_name":p["vol"]},
                  {"id":"PERFUME_NAME","value_name":title.split()[0].capitalize()},
                  {"id":"ITEM_CONDITION","value_name":"Nuevo"},
                  {"id":"GTIN","value_name":p["gtin"]},
              ]
              body = {
                  "title": title, "category_id": "MLM1271", "price": p["price"],
                  "currency_id":"MXN", "available_quantity":1, "buying_mode":"buy_it_now",
                  "condition":"new", "listing_type_id":"gold_pro",
                  "pictures": pics, "attributes": attrs,
                  "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},{"id":"WARRANTY_TIME","value_name":"30 días"}],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":False}
              }
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=25)
              resp = r.json()
              if r.status_code in (200,201):
                  new_id = resp.get("id")
                  print(f"  ✓ {new_id}")
                  try:
                      desc = (f"{title}\n\nPerfume original 100% autentico.\n\n"
                              f"CARACTERISTICAS:\n- Marca: {p['brand']}\n- Volumen: {p['vol']}\n- Genero: {p['gender']}\n"
                              f"- Condicion: Nuevo, sellado de fabrica\n\nGARANTIAS:\n- NUEVO y 100% Original\n"
                              f"- 30 dias de garantia\n- Factura disponible\n- Envio el mismo dia antes de 3pm\n\n- Sonix Mx")
                      requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h, json={"plain_text":desc}, timeout=10)
                  except: pass
                  stock[new_id] = {"real_stock":10,"sku":f"PERF-{idx:03d}","label":title[:50],
                                   "auto_replenish":True,"replenish_quantity":1,"seo_title":title,
                                   "previous_ids":[],"_perfume":True,"_idx":idx}
                  ok_list.append((idx, new_id, title))
              else:
                  errs = [c for c in resp.get("cause",[]) if isinstance(c,dict) and c.get("type")=="error"]
                  err_codes = [c.get("code","?") for c in errs[:2]]
                  for c in errs[:2]:
                      print(f"    {c.get('message','')[:130]}")
                  err_list.append((idx, title, ",".join(err_codes)))
              time.sleep(3)
          
          with open("stock_config.json","w") as f:
              json.dump(stock, f, indent=2, ensure_ascii=False)
          print(f"\n=== FINAL === OK:{len(ok_list)} ERR:{len(err_list)}")
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"🏁 *Final 9*\n\nOK: *{len(ok_list)}/9*\nErr: *{len(err_list)}*\n\n"
              for idx, iid, title in ok_list:
                  m += f"✓ `{iid}` idx{idx} {title[:32]}\n"
              for idx, title, err in err_list:
                  m += f"✗ idx{idx} {title[:32]}\n"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m[:4000]})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock_config.json
          git diff --cached --quiet || git commit -m "[perfumes] final 9 with real GTIN"
          git push || echo "no push"
