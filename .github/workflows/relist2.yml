name: Relist full attrs (one-shot)
on:
  workflow_dispatch:
    inputs:
      old_item_id:
        required: true
        type: string
      stock:
        required: true
        type: string
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OLD_ID: ${{ inputs.old_item_id }}
          STOCK: ${{ inputs.stock }}
        run: |
          python3 <<'PY'
          import os, json, requests, sys

          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          old_id = os.environ["OLD_ID"]
          stock = int(os.environ["STOCK"])

          cur = requests.get(f"https://api.mercadolibre.com/items/{old_id}", headers=H).json()
          pictures = [{"id": p["id"]} for p in cur.get("pictures", [])]
          print(f"[src] pics={len(pictures)} cat={cur.get('category_id')}")

          new_desc = (
              "Bocina JBL Go 4 color negro en perfecto estado, practicamente sin uso: "
              "solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales incluidos. "
              "Producto 100 por ciento original JBL. Bluetooth 5.3, sonido potente y claro con JBL Pro Sound, "
              "resistencia al agua y polvo IP67, autonomia de hasta 7 horas de reproduccion. "
              "Envio seguro con Mercado Envios desde Mexico. Compra con confianza, facturamos si se requiere."
          )

          # === Atributos completos con specs oficiales JBL Go 4 Negro ===
          attrs = [
              # Identificación
              {"id":"BRAND","value_name":"JBL"},
              {"id":"MODEL","value_name":"Go 4"},
              {"id":"MPN","value_name":"JBLGO4BLKAM"},
              {"id":"GTIN","value_name":"050036399340"},
              {"id":"MANUFACTURER","value_name":"Harman International Industries"},
              {"id":"SELLER_SKU","value_name":"JBL-GO4-NGR-001"},
              # Color
              {"id":"COLOR","value_name":"Negro"},
              {"id":"MAIN_COLOR","value_name":"Negro"},
              # Condición
              {"id":"ITEM_CONDITION","value_name":"Usado"},
              # Potencia / sonido
              {"id":"POWER_OUTPUT_RMS","value_struct":{"number":4.2,"unit":"W"}},
              {"id":"MIN_FREQUENCY_RESPONSE","value_struct":{"number":95,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE","value_struct":{"number":20,"unit":"kHz"}},
              {"id":"DISTORTION","value_struct":{"number":1,"unit":"%"}},
              {"id":"SOUND_RANGE","value_struct":{"number":10,"unit":"m"}},
              {"id":"SPEAKERS_NUMBER","value_name":"1"},
              {"id":"SPEAKER_FORMAT","value_name":"Caja"},
              {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
              # Alimentación / batería
              {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
              {"id":"MAX_BATTERY_AUTONOMY","value_struct":{"number":7,"unit":"h"}},
              {"id":"CHARGE_TIME","value_struct":{"number":2.5,"unit":"h"}},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              # Conectividad
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},
              {"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_NFC","value_name":"No"},
              {"id":"WITH_RADIO","value_name":"No"},
              {"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"OS_COMPATIBLES","values":[
                  {"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}
              ]},
              # Resistencia / uso
              {"id":"IS_WATERPROOF","value_name":"Sí"},
              {"id":"IP_CLASSIFICATION","value_name":"IP67"},
              {"id":"IS_DUST_RESISTANT","value_name":"Sí"},
              {"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
              {"id":"IS_PORTABLE","value_name":"Sí"},
              # Características negativas (honestidad)
              {"id":"WITH_BASE","value_name":"No"},
              {"id":"WITH_LED_LIGHTS","value_name":"No"},
              {"id":"WITH_MICROPHONE","value_name":"No"},
              {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},
              {"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
              {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},
              {"id":"WITH_VOICE_EFFECT","value_name":"No"},
              {"id":"WITH_SCREEN","value_name":"No"},
              {"id":"IS_GAMER","value_name":"No"},
              {"id":"IS_PROFESSIONAL","value_name":"No"},
              {"id":"IS_A_STAGE_MONITOR","value_name":"No"},
              {"id":"INCLUDES_SUPPORT","value_name":"No"},
              {"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
              {"id":"INCLUDES_CHARGER","value_name":"No"},
              {"id":"INCLUDES_WHEELS","value_name":"No"},
              {"id":"INCLUDES_LATCH","value_name":"No"},
              # Dimensiones físicas reales JBL Go 4
              {"id":"HEIGHT","value_struct":{"number":7.52,"unit":"cm"}},
              {"id":"WIDTH","value_struct":{"number":9.45,"unit":"cm"}},
              {"id":"DEPTH","value_struct":{"number":4.31,"unit":"cm"}},
              {"id":"WEIGHT","value_struct":{"number":190,"unit":"g"}},
          ]

          new_item = {
              "title": "JBL Go 4 Bocina Bluetooth Portatil Negra Original Usada",
              "category_id": "MLM59800",
              "price": 300,
              "currency_id": "MXN",
              "available_quantity": stock,
              "buying_mode": "buy_it_now",
              "listing_type_id": "gold_special",
              "condition": "used",
              "pictures": pictures,
              "attributes": attrs,
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"7 días"}
              ],
              "shipping": {
                  "mode": "me2",
                  "local_pick_up": False,
                  "free_shipping": False
              }
          }

          # Validar primero
          vr = requests.post("https://api.mercadolibre.com/items/validate", headers=H, json=new_item)
          print(f"[validate] status={vr.status_code}")
          if vr.status_code >= 400:
              print(json.dumps(vr.json(), indent=2, ensure_ascii=False)[:3000])
              # continuar a crear solo si no hay errores bloqueantes
              causes = vr.json().get("cause") or []
              hard = [c for c in causes if c.get("type")=="error" and "ignored" not in (c.get("message") or "").lower()]
              if hard:
                  print("[validate] HARD ERRORS, aborting")
                  sys.exit(1)
              else:
                  print("[validate] only warnings, continuing...")

          # Crear
          r = requests.post("https://api.mercadolibre.com/items", headers=H, json=new_item)
          print(f"[create] status={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(json.dumps(resp, indent=2, ensure_ascii=False)[:3000])
              sys.exit(1)

          new_id = resp["id"]
          new_link = resp.get("permalink")
          print(f"[create] new_id={new_id}")
          print(f"[create] attrs count filled: {len(resp.get('attributes',[]))}")

          # Descripción
          dr = requests.put(f"https://api.mercadolibre.com/items/{new_id}/description", headers=H,
              json={"plain_text": new_desc})
          print(f"[desc] status={dr.status_code}")

          # Cerrar viejo
          cr = requests.put(f"https://api.mercadolibre.com/items/{old_id}", headers=H,
              json={"status":"closed"})
          print(f"[close_old] status={cr.status_code}")

          # Telegram
          if os.environ.get("TELEGRAM_BOT_TOKEN") and os.environ.get("TELEGRAM_CHAT_ID"):
              msg = (f"🔁 *JBL Go 4 Negro — relistado con ficha completa*\n\n"
                     f"Nuevo: `{new_id}`\n"
                     f"Stock: {stock}\n"
                     f"Attrs: {len(resp.get('attributes',[]))} campos llenos\n"
                     f"🔗 {new_link}\n\n"
                     f"Viejo: `{old_id}` (closed)")
              requests.post(f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
                  json={"chat_id": os.environ["TELEGRAM_CHAT_ID"], "text": msg, "parse_mode":"Markdown"})

          print(f"\n==RELIST_OK==")
          print(f"==NEW_ID={new_id}==")
          print(f"==PERMALINK={new_link}==")
          PY
