name: Audit all items status (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          sid = 2681696373

          # Todos los items sin filtro
          for status_f in ["active","paused","closed","under_review"]:
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search",
                  params={"status":status_f, "limit":50}, headers=H).json()
              ids = r.get('results',[])
              print(f"=== status={status_f}: {len(ids)} ===")
              for iid in ids[:10]:
                  it = requests.get(f"https://api.mercadolibre.com/items/{iid}",
                      headers=H, params={"attributes":"id,title,available_quantity,sold_quantity,price,status,sub_status"}).json()
                  print(f"  {iid}  stock={it.get('available_quantity')} vend={it.get('sold_quantity')} sub={it.get('sub_status')} · {(it.get('title') or '')[:55]}")
          PY
