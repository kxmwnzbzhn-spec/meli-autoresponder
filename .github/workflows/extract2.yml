name: Extract Aqua + Go3 Negro (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          # 1. Go 3 Negro product MLM46039390
          pr = requests.get("https://api.mercadolibre.com/products/MLM46039390", headers=H).json()
          print(f"=== GO 3 Negro (MLM46039390) ===")
          print(f"  name: {pr.get('name','')}")
          for a in pr.get('attributes',[]):
              if a.get('id') in ('COLOR','MAIN_COLOR','BRAND','MODEL'):
                  print(f"  {a.get('id')}: {a.get('value_name')}")
          print(f"  domain_id: {pr.get('domain_id')}")
          print(f"  category_id: {pr.get('category_id')}")
          print(f"  pictures: {len(pr.get('pictures',[]))}")
          for p in pr.get('pictures',[])[:15]:
              print(f"  {p.get('url') or p.get('secure_url')}")

          print()
          # 2. Buscar JBL Go 4 Aqua en catalog
          print("=== Buscando JBL Go 4 Aqua ===")
          for q in ["JBL Go 4 Aqua", "JBL Go 4 azul claro"]:
              s = requests.get("https://api.mercadolibre.com/products/search",
                  params={"site_id":"MLM","q":q,"limit":10}, headers=H).json()
              print(f"q={q}:")
              for r in s.get('results',[])[:10]:
                  print(f"  {r.get('id')} - {r.get('name','')[:80]}")

          # Checar cada candidato buscando color aqua
          for pid in ["MLM36341303","MLM44232450","MLM40439493","MLM44731712","MLM45530822",
                      "MLM37361021","MLM45693226","MLM44731940"]:
              pr2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
              color = None
              for a in pr2.get('attributes',[]):
                  if a.get('id') in ('COLOR','MAIN_COLOR'): color=a.get('value_name'); break
              print(f"  {pid}: color={color}  n={pr2.get('name','')[:60]}")
          PY
