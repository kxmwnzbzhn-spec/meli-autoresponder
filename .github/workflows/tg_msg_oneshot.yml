name: tg-msg-oneshot
on:
  workflow_dispatch:
    inputs:
      msg:
        description: Mensaje
        required: true
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${{ inputs.msg }}"
