name: asva-go4-sep
on: {workflow_dispatch: {}}
jobs:
  run:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_ASVA: ${{ secrets.MELI_REFRESH_TOKEN_ASVA }}
        run: python scripts/asva_go4_sep.py
      - run: |
          git config user.email b@b.com && git config user.name bot
          git add stock_config_asva.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "ASVA Go4 separadas 6 colores"
          git push || true
