name: Check item health (one-shot)
on:
  workflow_dispatch:
    inputs:
      item_id:
        required: true
        type: string
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          ITEM_ID: ${{ inputs.item_id }}
        run: |
          python3 <<'PY'
          import os, json, requests, datetime as dt
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          item_id = os.environ["ITEM_ID"]

          it = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
          print("=== ITEM ===")
          print(f"  id: {it.get('id')}")
          print(f"  title: {it.get('title')}")
          print(f"  status: {it.get('status')}  sub: {it.get('sub_status')}")
          print(f"  price: ${it.get('price')} {it.get('currency_id')}")
          print(f"  condition: {it.get('condition')}")
          print(f"  stock disponible: {it.get('available_quantity')}")
          print(f"  vendidas: {it.get('sold_quantity')}")
          print(f"  listing_type: {it.get('listing_type_id')}")
          print(f"  category: {it.get('category_id')} domain: {it.get('domain_id')}")
          print(f"  permalink: {it.get('permalink')}")
          print(f"  date_created: {it.get('date_created')}")
          print(f"  last_updated: {it.get('last_updated')}")
          print(f"  health: {it.get('health')}")
          print(f"  tags: {it.get('tags')}")
          print(f"  pictures: {len(it.get('pictures',[]))}")
          fn = [a for a in it.get('attributes',[]) if a.get('value_name') or a.get('value_struct')]
          print(f"  atributos llenos: {len(fn)}/{len(it.get('attributes',[]))}")

          # Visitas ultimos 7 dias
          today = dt.date.today()
          d_from = (today - dt.timedelta(days=7)).strftime("%Y-%m-%d")
          d_to = today.strftime("%Y-%m-%d")
          v = requests.get(f"https://api.mercadolibre.com/items/visits/time_window",
              params={"ids": item_id, "last": 7, "unit": "day"},
              headers=H).json()
          print("\n=== VISITAS ultimos 7 dias ===")
          print(json.dumps(v, indent=2)[:1500])

          # Preguntas sobre el item
          q = requests.get(f"https://api.mercadolibre.com/questions/search",
              params={"item": item_id, "limit": 20}, headers=H).json()
          print(f"\n=== PREGUNTAS: total={q.get('total', len(q.get('questions',[])))} ===")
          for ques in q.get('questions',[])[:10]:
              st = ques.get('status','')
              ts = ques.get('date_created','')[:19]
              txt = ques.get('text','')[:140]
              ans = (ques.get('answer') or {}).get('text','')[:140]
              print(f"  [{st}] {ts}")
              print(f"    Q: {txt}")
              if ans: print(f"    A: {ans}")

          # Reviews
          rv = requests.get(f"https://api.mercadolibre.com/reviews/item/{item_id}", headers=H).json()
          if isinstance(rv, dict):
              print(f"\n=== REVIEWS: rating={rv.get('rating_average')} total={rv.get('paging',{}).get('total',0)} ===")

          # Orders relacionadas al vendedor que incluyan este item (recientes)
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me.get("id")
          ord_r = requests.get(f"https://api.mercadolibre.com/orders/search",
              params={"seller": sid, "sort":"date_desc", "limit": 20}, headers=H).json()
          rel = [o for o in ord_r.get("results",[])
                 if any((oi.get("item") or {}).get("id") == item_id for oi in o.get("order_items",[]))]
          print(f"\n=== ORDENES relacionadas al item: {len(rel)} (total vendedor: {ord_r.get('paging',{}).get('total',0)}) ===")
          for o in rel[:5]:
              print(f"  order {o.get('id')} status={o.get('status')} pay={o.get('payments',[{}])[0].get('status','')} total=${o.get('total_amount')} date={o.get('date_created','')[:19]}")
          PY
