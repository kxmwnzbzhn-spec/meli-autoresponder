name: Fix Charge6 + Publish Clip5 Rosa/Morado
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, io
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # === 1. Forzar reactivación Charge 6 Negro ===
          print("=== Charge 6 Negro: reenviando descripción + status active ===")
          iid = "MLM5209619958"
          new_desc = (
              "Bocina JBL Charge 6 color negro en excelente estado, practicamente sin uso. "
              "Se entrega con su caja original y accesorios originales. Producto 100% original JBL. "
              "Esta unidad no es compatible con la aplicacion JBL Portable; su operacion es Bluetooth estandar. "
              "Sonido potente, bateria con hasta 24 horas de reproduccion, "
              "resistencia IP68 al agua y al polvo. "
              "Envio GRATIS con Mercado Envios. Facturamos si se requiere.\n\n"
              "* Nota: esta version incluye entrada USB para reproduccion directa desde memoria."
          )
          dr = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
              headers=H, json={"plain_text": new_desc})
          print(f"  desc: {dr.status_code}")

          # Forzar status active
          r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
              headers=H, json={"status":"active"})
          print(f"  activate: {r.status_code}")
          try:
              rj = r.json(); print(f"    status={rj.get('status')} sub={rj.get('sub_status')}")
          except: pass

          # === 2. Buscar Clip 5 Rosa/Morado con más queries ===
          def find_best(queries, color_match):
              seen = set()
              best = None
              for q in queries:
                  s = requests.get("https://api.mercadolibre.com/products/search",
                      params={"site_id":"MLM","q":q,"limit":30}, headers=H).json()
                  for r in s.get('results',[]):
                      rid = r.get('id')
                      if rid in seen: continue
                      seen.add(rid)
                      pr = requests.get(f"https://api.mercadolibre.com/products/{rid}", headers=H).json()
                      col = None; mod = None
                      for a in pr.get('attributes',[]):
                          if a.get('id') == 'COLOR': col = a.get('value_name')
                          if a.get('id') == 'MODEL': mod = a.get('value_name')
                      n = r.get('name','').lower()
                      pics = len(pr.get('pictures',[]))
                      # match por color en nombre o en attr
                      if pics >= 3 and ('clip 5' in n or (mod and 'Clip 5' in str(mod))):
                          col_lower = (col or '').lower()
                          if any(cm in col_lower for cm in color_match) or any(cm in n for cm in color_match):
                              print(f"  {rid}: {r.get('name','')[:60]} color={col} pics={pics}")
                              if best is None or pics > best['pics']:
                                  best = {"id":rid, "pics":pics, "name":r.get('name','')}
              return best

          def upload_from(pid, limit=11):
              pr = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
              urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[])]
              ids = []
              for u in urls[:limit]:
                  try:
                      u2 = u.replace("-F.jpg","-O.jpg")
                      rr = requests.get(u2, timeout=15)
                      if rr.status_code != 200 or len(rr.content) < 3000:
                          rr = requests.get(u, timeout=15)
                      im = Image.open(io.BytesIO(rr.content))
                      if im.mode != "RGB":
                          if im.mode in ("RGBA","LA","P"):
                              bg = Image.new("RGB", im.size, (255,255,255))
                              if im.mode == "P": im = im.convert("RGBA")
                              bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                              im = bg
                          else: im = im.convert("RGB")
                      w,h = im.size
                      s = min(1200/w, 1200/h); nw, nh = int(w*s), int(h*s)
                      im = im.resize((nw,nh), Image.LANCZOS)
                      c = Image.new("RGB", (1200,1200), (255,255,255))
                      c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                      buf = io.BytesIO(); c.save(buf, "JPEG", quality=92)
                      up = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                          headers={"Authorization": f"Bearer {AT}"}, files={"file":("p.jpg",buf.getvalue(),"image/jpeg")})
                      if up.status_code < 400: ids.append({"id": up.json()["id"]})
                  except Exception as e:
                      print(f"  pic err: {e}")
              return ids

          clip5_specs_attrs = [
              {"id":"BRAND","value_name":"JBL"},{"id":"MODEL","value_name":"Clip 5"},
              {"id":"MANUFACTURER","value_name":"Harman International Industries"},
              {"id":"ITEM_CONDITION","value_name":"Usado"},
              {"id":"POWER_OUTPUT_RMS","value_name":"7 W","value_struct":{"number":7,"unit":"W"}},
              {"id":"MIN_FREQUENCY_RESPONSE","value_name":"105 Hz","value_struct":{"number":105,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE","value_name":"20 kHz","value_struct":{"number":20,"unit":"kHz"}},
              {"id":"SOUND_RANGE","value_name":"15 m","value_struct":{"number":15,"unit":"m"}},
              {"id":"SPEAKERS_NUMBER","value_name":"1"},{"id":"SPEAKER_FORMAT","value_name":"Caja"},
              {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
              {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
              {"id":"MAX_BATTERY_AUTONOMY","value_name":"12 h","value_struct":{"number":12,"unit":"h"}},
              {"id":"CHARGE_TIME","value_name":"3 h","value_struct":{"number":3,"unit":"h"}},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_NFC","value_name":"No"},{"id":"WITH_RADIO","value_name":"No"},
              {"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
              {"id":"IS_WATERPROOF","value_name":"Sí"},{"id":"IP_CLASSIFICATION","value_name":"IP67"},
              {"id":"IS_DUST_RESISTANT","value_name":"Sí"},{"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
              {"id":"IS_PORTABLE","value_name":"Sí"},{"id":"WITH_BASE","value_name":"No"},
              {"id":"WITH_LED_LIGHTS","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"No"},
              {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},{"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
              {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},{"id":"WITH_VOICE_EFFECT","value_name":"No"},
              {"id":"WITH_SCREEN","value_name":"No"},{"id":"IS_GAMER","value_name":"No"},
              {"id":"IS_PROFESSIONAL","value_name":"No"},{"id":"IS_A_STAGE_MONITOR","value_name":"No"},
              {"id":"INCLUDES_SUPPORT","value_name":"No"},{"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
              {"id":"INCLUDES_CHARGER","value_name":"No"},{"id":"INCLUDES_WHEELS","value_name":"No"},
              {"id":"INCLUDES_LATCH","value_name":"Sí"},
              {"id":"HEIGHT","value_name":"14 cm","value_struct":{"number":14,"unit":"cm"}},
              {"id":"WIDTH","value_name":"8.6 cm","value_struct":{"number":8.6,"unit":"cm"}},
              {"id":"DEPTH","value_name":"4.6 cm","value_struct":{"number":4.6,"unit":"cm"}},
              {"id":"WEIGHT","value_name":"285 g","value_struct":{"number":285,"unit":"g"}},
          ]

          def publish_clip5(color_query, color_norm, main_color, mpn, gtin, sku, product_id):
              print(f"\n>>> Publicar Clip 5 {color_query} desde {product_id}")
              pics = upload_from(product_id, 11)
              print(f"  pics: {len(pics)}")
              if not pics: return None
              title_col = color_query.capitalize() if color_query != "Rosa" else "Rosa"
              title = f"JBL Clip 5 Bocina Bluetooth Portatil {title_col} Original Usada"
              if len(title) > 60:
                  title = title.replace("Bocina Bluetooth Portatil","Bluetooth Portatil")
              desc = (
                  f"Bocina JBL Clip 5 color {color_norm.lower()} en perfecto estado, practicamente sin uso: "
                  f"solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
                  f"Producto 100 por ciento original JBL. "
                  f"IMPORTANTE: esta unidad NO es compatible con la aplicacion JBL Portable; "
                  f"su operacion es Bluetooth estandar. "
                  f"Mosqueton integrado para cuelgue facil, IP67, Bluetooth 5.3, "
                  f"hasta 12 horas de reproduccion. "
                  f"Envio GRATIS con Mercado Envios desde Mexico. Facturamos si se requiere."
              )
              attrs = list(clip5_specs_attrs) + [
                  {"id":"MPN","value_name":mpn},{"id":"GTIN","value_name":gtin},
                  {"id":"SELLER_SKU","value_name":sku},
                  {"id":"COLOR","value_name":color_norm},{"id":"MAIN_COLOR","value_name":main_color},
              ]
              item = {
                  "title":title,"category_id":"MLM59800","price":299,"currency_id":"MXN",
                  "available_quantity":1,"buying_mode":"buy_it_now",
                  "listing_type_id":"gold_pro","condition":"used",
                  "pictures":pics,"attributes":attrs,
                  "sale_terms":[
                      {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                      {"id":"WARRANTY_TIME","value_name":"7 días"},
                  ],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}
              }
              r = requests.post("https://api.mercadolibre.com/items", headers=H, json=item)
              print(f"  POST={r.status_code}")
              resp = r.json()
              if r.status_code >= 400:
                  print(f"  ERR: {json.dumps(resp, ensure_ascii=False)[:600]}")
                  return None
              nid = resp["id"]
              requests.put(f"https://api.mercadolibre.com/items/{nid}/description",
                  headers=H, json={"plain_text": desc})
              print(f"  OK {nid} {resp.get('permalink')}")
              return nid

          # Rosa: queries más amplias + colores variables
          print("\n=== Clip 5 ROSA ===")
          rosa = find_best(
              ["JBL Clip 5 Rosa","JBL Clip 5 pink","Clip 5 rosa chicle","Clip 5 fucsia"],
              ["rosa","pink","fucsia"]
          )
          print(f"BEST rosa: {rosa}")
          rosa_id = None
          if rosa:
              rosa_id = publish_clip5("rosa","Rosa chicle","Rosa chicle","JBLCLIP5PKAM","050036399951","JBL-CLIP5-ROSA-001",rosa["id"])

          print("\n=== Clip 5 MORADO ===")
          morado = find_best(
              ["JBL Clip 5 Morado","JBL Clip 5 purple","JBL Clip 5 violeta","JBL Clip 5 lila","Clip 5 purpura"],
              ["morado","purple","violeta","lila","purpura","púrpura"]
          )
          print(f"BEST morado: {morado}")
          morado_id = None
          if morado:
              morado_id = publish_clip5("morado","Morado","Violeta","JBLCLIP5PURAM","050036399968","JBL-CLIP5-MOR-001",morado["id"])

          print(f"\n=== RESULTADOS ===")
          print(f"  Charge 6 Negro re-patch: done")
          print(f"  Clip 5 Rosa: {rosa_id}")
          print(f"  Clip 5 Morado: {morado_id}")
          PY
