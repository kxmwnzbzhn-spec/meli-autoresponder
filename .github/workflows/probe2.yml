name: Probe PURCHASE_MAX formats (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Leer item viejo para reusar pictures
          cur = requests.get("https://api.mercadolibre.com/items/MLM2872660967", headers=H).json()
          pictures = [{"id": p["id"]} for p in cur.get("pictures", [])][:2]  # solo 2 para test

          base = {
              "title": "JBL Go 4 Bocina Bluetooth Portatil Negra Original Usada",
              "category_id": "MLM59800",
              "price": 300,
              "currency_id": "MXN",
              "available_quantity": 20,
              "buying_mode": "buy_it_now",
              "condition": "used",
              "pictures": pictures,
              "attributes": [
                  {"id":"BRAND","value_name":"JBL"},
                  {"id":"MODEL","value_name":"Go 4"},
                  {"id":"COLOR","value_name":"Negro"},
                  {"id":"LINE","value_name":"Go"},
                  {"id":"ITEM_CONDITION","value_name":"Usado"}
              ],
              "shipping": {"mode": "me2", "local_pick_up": False, "free_shipping": False}
          }

          # Variantes a probar (con dry_run para no crear de verdad)
          variantes = [
              ("v1: gold_special + value_name string '1'",
               {"listing_type_id":"gold_special",
                "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                              {"id":"WARRANTY_TIME","value_name":"7 días"},
                              {"id":"PURCHASE_MAX_QUANTITY","value_name":"1"}]}),
              ("v2: gold_special + value_name int 1",
               {"listing_type_id":"gold_special",
                "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                              {"id":"WARRANTY_TIME","value_name":"7 días"},
                              {"id":"PURCHASE_MAX_QUANTITY","value_name": 1}]}),
              ("v3: gold_special + value int",
               {"listing_type_id":"gold_special",
                "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                              {"id":"WARRANTY_TIME","value_name":"7 días"},
                              {"id":"PURCHASE_MAX_QUANTITY","value": 1}]}),
              ("v4: gold_pro + value_name '1'",
               {"listing_type_id":"gold_pro",
                "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                              {"id":"WARRANTY_TIME","value_name":"7 días"},
                              {"id":"PURCHASE_MAX_QUANTITY","value_name":"1"}]}),
          ]

          for label, extras in variantes:
              p = dict(base, **extras)
              r = requests.post("https://api.mercadolibre.com/items/validate",
                                headers=H, json=p)
              print(f"\n=== {label} ===")
              print(f"status={r.status_code}")
              try:
                  rj = r.json()
                  if r.status_code >= 400:
                      print(json.dumps(rj, indent=2, ensure_ascii=False)[:1500])
                  else:
                      print("  validate OK")
              except:
                  print(r.text[:500])
          PY
