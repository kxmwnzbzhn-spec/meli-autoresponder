name: Extract batch (Go3 Negra + Charge 6 x4)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          products = [
              ("go3_negro",   "MLM46039390"),
              ("charge6_negro","MLMU3327008323"),
              ("charge6_rojo","MLM49006175"),
              ("charge6_azul","MLM48897018"),
              ("charge6_camo","MLM50286496"),
          ]
          for key, pid in products:
              # probar /products/{pid}
              pr = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=H).json()
              if 'error' in pr:
                  # probar como item directo
                  print(f"[{key}] {pid} product 404, probando items")
                  it = requests.get(f"https://api.mercadolibre.com/items/{pid}", headers=H).json()
                  pr = it
              print(f"=== {key} ({pid}) ===")
              print(f"  name: {pr.get('name') or pr.get('title','')}")
              for a in pr.get('attributes',[]):
                  if a.get('id') in ('COLOR','MAIN_COLOR','BRAND','MODEL'):
                      print(f"  {a.get('id')}: {a.get('value_name')}")
              print(f"  pictures: {len(pr.get('pictures',[]))}")
              for p in pr.get('pictures',[])[:15]:
                  print(f"  {p.get('url') or p.get('secure_url')}")
              print()
          PY
