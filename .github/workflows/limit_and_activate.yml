name: Set max-1-per-buy and activate (one-shot)
on:
  workflow_dispatch:
    inputs:
      item_id:
        required: true
        type: string
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          ITEM_ID: ${{ inputs.item_id }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          item_id = os.environ["ITEM_ID"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Estado actual + sale_terms actuales
          cur = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
          print(f"[before] status={cur.get('status')} sale_terms={cur.get('sale_terms')}")

          # Approach 1: PUT sale_terms agregando PURCHASE_MAX_QUANTITY
          new_terms = list(cur.get("sale_terms") or [])
          # quitar duplicados de PURCHASE_MAX_QUANTITY si existieran
          new_terms = [t for t in new_terms if t.get("id") != "PURCHASE_MAX_QUANTITY"]
          new_terms.append({"id":"PURCHASE_MAX_QUANTITY","value_name":"1"})

          r1 = requests.put(f"https://api.mercadolibre.com/items/{item_id}", headers=H,
              json={"sale_terms": new_terms})
          print(f"[set max=1] status={r1.status_code}")
          if r1.status_code >= 400:
              print(json.dumps(r1.json(), indent=2)[:1500])

          # Reactivar
          r2 = requests.put(f"https://api.mercadolibre.com/items/{item_id}", headers=H,
              json={"status":"active"})
          print(f"[activate] status={r2.status_code}")

          # Verificar
          ver = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
          print(f"[after] status={ver.get('status')}")
          print(f"[after] sale_terms={[(t.get('id'),t.get('value_name')) for t in ver.get('sale_terms') or []]}")
          print(f"[after] permalink={ver.get('permalink')}")
          PY
