name: Test accreditation endpoints
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h_auth = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h_auth, timeout=15)
          sid = r.json()["id"]
          
          # Test item - any from accreditation required list
          test_iid = "MLM2879724127"  # Guerlain Patchouli Ardent (under_review - pending docs)
          
          # Read pdf
          with open("factura_jrp.pdf","rb") as f:
              pdf = f.read()
          print(f"PDF size: {len(pdf)}")
          
          # Try every possible endpoint
          endpoints = [
              # POST multipart
              ("POST", f"/items/{test_iid}/accreditation", "multipart"),
              ("POST", f"/items/{test_iid}/accreditations", "multipart"),
              ("POST", f"/items/{test_iid}/compliance", "multipart"),
              ("POST", f"/items/{test_iid}/compliance/document", "multipart"),
              ("POST", f"/items/{test_iid}/compliance/documents", "multipart"),
              ("POST", f"/items/{test_iid}/invoice", "multipart"),
              ("POST", f"/items/{test_iid}/invoices", "multipart"),
              ("POST", f"/items/{test_iid}/bill", "multipart"),
              ("POST", f"/items/{test_iid}/bills", "multipart"),
              ("POST", f"/items/{test_iid}/proof_of_purchase", "multipart"),
              ("POST", f"/items/{test_iid}/upload_document", "multipart"),
              ("POST", f"/items/{test_iid}/document", "multipart"),
              ("POST", f"/items/{test_iid}/documents", "multipart"),
              ("POST", f"/users/{sid}/items/{test_iid}/accreditation", "multipart"),
              ("POST", f"/users/{sid}/accreditation", "multipart"),
              ("POST", f"/sellers/{sid}/compliance/items/{test_iid}", "multipart"),
              ("POST", f"/compliance/items/{test_iid}", "multipart"),
              ("POST", f"/seller-compliance/{sid}/items/{test_iid}/documents", "multipart"),
              # GET paths to discover
              ("GET",  f"/items/{test_iid}/accreditation", "none"),
              ("GET",  f"/items/{test_iid}/compliance", "none"),
              ("GET",  f"/items/{test_iid}/moderations", "none"),
              ("GET",  f"/items/{test_iid}/inquiries", "none"),
              ("GET",  f"/seller-compliance/items/{test_iid}", "none"),
          ]
          
          for method, path, body_type in endpoints:
              try:
                  kwargs = {"headers": h_auth, "timeout": 10}
                  if body_type == "multipart":
                      kwargs["files"] = {"file": ("factura.pdf", pdf, "application/pdf")}
                  r = requests.request(method, f"https://api.mercadolibre.com{path}", **kwargs)
                  status = r.status_code
                  if status != 404:
                      print(f"  [{status}] {method} {path}")
                      body_snip = r.text[:250].replace('\n',' ')
                      print(f"       {body_snip}")
              except Exception as e:
                  pass
          PY
