name: Set JBL prices by model
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Match por keyword → precio target
          # ORDEN IMPORTA: checar "charge 6" antes que "go" (por si dice "go" en algún otro lado)
          rules = [
              (["charge 6","charge6"], 499),
              (["clip 5","clip5"],     399),
              (["flip 7","flip7"],     399),
              (["go 4","go4"],         299),
              (["go 3","go3"],         299),
              (["grip"],               399),
          ]
          
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status=active&limit=50", headers=h, timeout=15)
          active = r.json().get("results", [])
          print(f"Active items: {len(active)}")
          
          changed = []
          skipped = []
          for iid in active:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,price,has_bids", headers=h, timeout=10)
              it = r.json()
              title = (it.get("title") or "").lower()
              if "jbl" not in title:
                  continue  # skip non-JBL (Dashcam, Redmi)
              cur = int(it.get("price") or 0)
              # Match the first rule
              target = None
              model = None
              for keys, pr in rules:
                  if any(k in title for k in keys):
                      target = pr; model = keys[0]; break
              if target is None:
                  skipped.append((iid, "no match", title))
                  print(f"  ? {iid} no match | {title[:60]}")
                  continue
              if cur == target:
                  skipped.append((iid, "already", title))
                  print(f"  = {iid} ya en ${target} | {title[:55]}")
                  continue
              r_p = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"price": target}, timeout=15)
              if r_p.status_code == 200:
                  changed.append((iid, cur, target, model, title))
                  print(f"  ✓ {iid} ${cur} → ${target} [{model}] | {title[:50]}")
              else:
                  msg = r_p.json().get("message","")[:80]
                  skipped.append((iid, r_p.status_code, msg))
                  print(f"  ✗ {iid}: {r_p.status_code} {msg}")
          
          print(f"\n=== RESUMEN ===\n  Cambios: {len(changed)}\n  Saltados: {len(skipped)}")
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc and changed:
              m = f"💰 *Precios JBL fijados*\n\n"
              m += f"Cambios: *{len(changed)}*\n"
              m += f"Charge 6 → \\$499 | Clip 5 → \\$399\n"
              m += f"Flip 7 → \\$399 | Go 4 → \\$299\n"
              m += f"Go 3 → \\$299 | Grip → \\$399"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
