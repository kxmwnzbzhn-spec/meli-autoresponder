name: Check pending documentation
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_token():
              for attempt in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  body = r.json()
                  print(f"refresh attempt {attempt+1}: {r.status_code} {body}")
                  if r.status_code == 200 and "access_token" in body:
                      return body["access_token"]
                  time.sleep(5)
              raise Exception(f"Failed to refresh token: {body}")
          tok = get_token()
          h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          all_items = []
          for st in ("active","paused","under_review","inactive"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              all_items.extend([(iid, st) for iid in r.json().get("results",[])])
          
          pending_doc=[]; waiting_patch=[]; forbidden=[]; other_paused=[]; under_review=[]; active_ok=[]
          for iid, _ in all_items:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,status,sub_status", headers=h, timeout=8)
              it = r.json()
              title = it.get("title","")[:50]
              status = it.get("status","")
              ss = it.get("sub_status") or []
              if isinstance(ss, str): ss = [ss]
              
              if "pending_documentation" in ss:
                  pending_doc.append((iid, title, status))
              elif "waiting_for_patch" in ss:
                  waiting_patch.append((iid, title, status))
              elif any(s in ss for s in ("forbidden","deleted")):
                  forbidden.append((iid, title, status, ss))
              elif status == "paused":
                  other_paused.append((iid, title, ss))
              elif status == "under_review":
                  under_review.append((iid, title, ss))
              elif status == "active":
                  active_ok.append((iid, title))
          
          print(f"\n=== TOTAL: {len(all_items)} ===")
          print(f"🚨 PENDING_DOC (factura): {len(pending_doc)}")
          for iid, title, status in pending_doc:
              print(f"  {iid} [{status}] | {title}")
          print(f"\n📝 WAITING_FOR_PATCH: {len(waiting_patch)}")
          for iid, title, status in waiting_patch:
              print(f"  {iid} [{status}] | {title}")
          print(f"\n❌ FORBIDDEN/DELETED: {len(forbidden)}")
          for iid, title, status, ss in forbidden:
              print(f"  {iid} [{status}] ss={ss} | {title}")
          print(f"\n⚠ UNDER_REVIEW: {len(under_review)}")
          for iid, title, ss in under_review:
              print(f"  {iid} ss={ss} | {title}")
          print(f"\n🟡 OTRAS PAUSADAS: {len(other_paused)}")
          for iid, title, ss in other_paused[:20]:
              print(f"  {iid} ss={ss} | {title}")
          print(f"\n🟢 ACTIVAS OK: {len(active_ok)}")
          PY
