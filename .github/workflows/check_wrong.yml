name: Check wrong items
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          # Pause immediately so they don't sell
          ids = ["MLM5220682468","MLM2879717667","MLM2879387291"]
          for iid in ids:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=10)
              it = r.json()
              pics = [p.get("url") or p.get("secure_url") for p in it.get("pictures",[])]
              print(f"\n{iid}")
              print(f"  title: {it.get('title')}")
              print(f"  status: {it.get('status')}")
              print(f"  price: ${it.get('price')}")
              print(f"  pics ({len(pics)}):")
              for url in pics[:3]:
                  print(f"    {url}")
              print(f"  permalink: {it.get('permalink')}")
              
              # Pause
              rp = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"status":"paused"}, timeout=15)
              print(f"  PAUSE: {rp.status_code}")
          PY
