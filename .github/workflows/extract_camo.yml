name: Extract camouflage pictures (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, re
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          # Opciones para sacar imagenes
          # 1. GET /products/{id}
          for ep in [
              "/products/MLM37361021",
              "/items/MLM4808844030",
              "/catalog_listings/MLM4808844030",
          ]:
              r = requests.get(f"https://api.mercadolibre.com{ep}", headers=H)
              print(f"GET {ep} → {r.status_code}")
              try:
                  d = r.json()
                  if r.status_code >= 400:
                      print(f"  ERR: {str(d)[:200]}")
                      continue
                  if 'pictures' in d:
                      print(f"  name/title: {d.get('name') or d.get('title','')[:80]}")
                      print(f"  pictures: {len(d.get('pictures',[]))}")
                      for p in d['pictures'][:15]:
                          url = p.get('url') or p.get('secure_url') or p.get('id')
                          print(f"    {url}")
                  else:
                      print(f"  keys: {list(d.keys())[:12]}")
              except Exception as e:
                  print(f"  parse err: {e}")
              print()
          PY
