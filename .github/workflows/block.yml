name: Check Q + block buyer (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]
          print(f"seller_id={sid}")

          # Preguntas UNANSWERED
          q = requests.get("https://api.mercadolibre.com/questions/search",
              params={"seller_id": sid, "status":"UNANSWERED","limit":10}, headers=H).json()
          print(f"\n=== PREGUNTAS UNANSWERED: {q.get('total',0)} ===")
          for qu in q.get("questions",[])[:5]:
              print(f"  qid={qu.get('id')}")
              print(f"  item={qu.get('item_id')}")
              print(f"  buyer_id={qu.get('from',{}).get('id')}")
              print(f"  fecha={qu.get('date_created','')[:19]}")
              print(f"  status={qu.get('status')}")
              print(f"  Q: {(qu.get('text') or '')[:300]}")
              print()

          # Tambien preguntas ANSWERED recientes (para ver si el bot contestó)
          qa = requests.get("https://api.mercadolibre.com/questions/search",
              params={"seller_id": sid, "status":"ANSWERED","limit":5}, headers=H).json()
          print(f"\n=== ULTIMAS ANSWERED: {qa.get('total',0)} total ===")
          for qu in qa.get("questions",[])[:5]:
              print(f"  qid={qu.get('id')} buyer={qu.get('from',{}).get('id')} fecha={qu.get('date_created','')[:19]}")
              print(f"  Q: {(qu.get('text') or '')[:150]}")
              a = (qu.get('answer') or {})
              print(f"  A: {(a.get('text') or '')[:150]}")
              print()

          # Probar endpoints de blacklist disponibles
          print("\n=== Endpoints de blacklist (investigando) ===")
          for ep in [
              f"/users/{sid}/blacklist",
              f"/marketplace/users/{sid}/blacklist",
              f"/users/{sid}/restrictions",
          ]:
              r = requests.get(f"https://api.mercadolibre.com{ep}", headers=H)
              print(f"  GET {ep} → {r.status_code}")
              try: print(f"    {json.dumps(r.json())[:300]}")
              except: print(f"    {r.text[:200]}")
          PY
