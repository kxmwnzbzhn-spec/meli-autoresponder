name: Check JBL status
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          for st in ("active","paused","under_review","closed"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              ids = r.json().get("results",[])
              jbls = []
              for iid in ids:
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,sub_status", headers=h, timeout=6)
                  t = r2.json()
                  if "jbl" in (t.get("title","") or "").lower():
                      jbls.append((iid, t.get("title",""), t.get("sub_status",[])))
              print(f"\n=== {st} ({len(jbls)} JBL) ===")
              for iid, title, ss in jbls:
                  rec = "REACOND" if "reacondicionado" in title.lower() else "OLD"
                  print(f"  [{rec}] {iid} ss={ss} | {title[:55]}")
          PY
