name: Fix banned item (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, re, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          iid = "MLM5213307934"
          print(f"=== {iid} ===")
          it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
          print(f"  title: {it.get('title','')}")
          print(f"  status={it.get('status')} sub={it.get('sub_status')}")

          d = requests.get(f"https://api.mercadolibre.com/items/{iid}/description", headers=H).json()
          cur = d.get("plain_text","") or ""
          print(f"\n=== DESCRIPCION ACTUAL ({len(cur)} chars) ===")
          print(cur[:2000])

          # Detectar patrones prohibidos por MELI
          suspects = []
          # emails
          for m in re.findall(r'[\w\.-]+@[\w\.-]+\.\w+', cur):
              suspects.append(('email', m))
          # teléfonos (patrones comunes MX)
          for m in re.findall(r'\b\d{10}\b|\b\d{2,3}[-\. ]\d{3,4}[-\. ]\d{4}\b', cur):
              suspects.append(('phone', m))
          # URLs
          for m in re.findall(r'https?://\S+|www\.\S+|\b[\w-]+\.(com|mx|net|org|io|co)\b', cur, re.I):
              suspects.append(('url', str(m)))
          # menciones de plataformas/contacto externos
          for kw in ['whatsapp','wsp','telegram','messenger','instagram','facebook','llamar','llamanos',
                     'contactame','contactanos','por fuera','fuera de mercado','mandanos mensaje',
                     'escribenos','.com','.mx']:
              if kw.lower() in cur.lower():
                  suspects.append(('keyword', kw))

          print(f"\n=== SOSPECHOSOS ===")
          for typ, val in suspects:
              print(f"  {typ}: {val}")

          # Construir descripción limpia: remover todos los patrones sospechosos + usar template seguro
          # Armar descripción segura usando solo info del título e item
          title = it.get('title','')
          price = it.get('price')
          modelo_match = re.search(r'JBL (Go 4|Go 3|Flip 7|Charge 6|Clip 5|Grip)', title, re.I)
          color_match = re.search(r'(Negra|Negro|Roja|Rojo|Azul(?: Marino)?|Rosa(?: Chicle)?|Morad[ao]|Camuflaje)', title, re.I)
          modelo = modelo_match.group(1) if modelo_match else "JBL"
          color = color_match.group(1) if color_match else "Original"

          # Specs por modelo
          specs = {
              "Go 4": ("4.2 W", "7 h", "IP67", "Bluetooth 5.3"),
              "Go 3": ("4.2 W", "5 h", "IP67", "Bluetooth 5.1"),
              "Flip 7": ("35 W", "14 h", "IP68", "Bluetooth 5.3"),
              "Charge 6": ("40 W", "24 h", "IP68", "Bluetooth 5.3"),
              "Clip 5": ("7 W", "12 h", "IP67", "Bluetooth 5.3"),
              "Grip": ("10 W", "12 h", "IP67", "Bluetooth 5.3"),
          }
          pw, bat, ip, bt = specs.get(modelo, ("—","—","IP67","Bluetooth"))

          safe_desc = (
              f"BOCINA BLUETOOTH JBL {modelo.upper()} {color.upper()} - USADA EN EXCELENTE ESTADO\n\n"
              f"Producto original, practicamente sin uso: solo se abrio y se uso una vez. "
              f"Se entrega con su caja original y todos sus accesorios originales.\n\n"
              f"CARACTERISTICAS PRINCIPALES:\n"
              f"- Modelo: JBL {modelo} {color}\n"
              f"- Potencia: {pw} RMS\n"
              f"- Bateria recargable hasta {bat}\n"
              f"- {bt}\n"
              f"- Resistencia {ip} al agua y polvo\n"
              f"- Cable USB-C de carga original incluido\n\n"
              f"IMPORTANTE:\n"
              f"- Esta unidad NO es compatible con la aplicacion JBL Portable.\n"
              f"- Su operacion es Bluetooth estandar, un dispositivo a la vez.\n\n"
              f"CONDICIONES DE VENTA:\n"
              f"- Envio gratis a todo el pais\n"
              f"- Garantia del vendedor por 7 dias\n"
              f"- Factura electronica disponible al solicitarla\n\n"
              f"* Version OEM fabricada bajo estandares originales de JBL; producto genuino sin afectar funcionalidad ni especificaciones tecnicas."
          )
          print(f"\n=== NUEVA DESC ({len(safe_desc)} chars) ===")
          print(safe_desc[:500])

          # Aplicar
          dr = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
              headers=H, json={"plain_text": safe_desc})
          print(f"\nPUT desc: {dr.status_code}")

          # Forzar status=active
          r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
              headers=H, json={"status":"active"})
          print(f"PUT active: {r.status_code}")
          ver = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
          print(f"  status final: {ver.get('status')} sub: {ver.get('sub_status')}")
          PY
