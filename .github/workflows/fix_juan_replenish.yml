name: fix-juan-replenish
on: { workflow_dispatch: }
permissions: { contents: write }
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.REPO_PAT }}' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python scripts/fix_juan_replenish.py
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
      - run: |
          for i in 1 2 3 4 5; do
            git config user.email b@b.com && git config user.name bot
            git pull --rebase 2>/dev/null && git add stock_config.json && (git diff --cached --quiet || git commit -m "Juan: enable auto_replenish on all catalog items") && git push origin main && break
            sleep $((RANDOM % 8 + 3))
          done
