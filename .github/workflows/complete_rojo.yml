name: Complete rojo attrs (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          rojo = requests.get("https://api.mercadolibre.com/items/MLM2874595625", headers=H).json()
          # usar el mejor referenciador: el azul MLM2874595277 (66 attrs)
          ref = requests.get("https://api.mercadolibre.com/items/MLM2874595277", headers=H).json()

          def attrs_map(it):
              m = {}
              for a in it.get("attributes",[]) or []:
                  if a.get("value_name") or a.get("value_struct") or a.get("values"):
                      m[a["id"]] = {"value_name": a.get("value_name"),
                                    "value_struct": a.get("value_struct"),
                                    "values": a.get("values")}
              return m

          rm = attrs_map(rojo); refm = attrs_map(ref)
          missing = {k: refm[k] for k in refm if k not in rm}
          SKIP = {"COLOR","MAIN_COLOR","LINE","ALPHANUMERIC_MODEL","DETAILED_MODEL",
                  "PRODUCT_DATA_SOURCE","CATALOG_TITLE","SEARCH_ENHANCEMENT_FIELDS",
                  "DESCRIPTIVE_TAGS","PACKAGE_HEIGHT","PACKAGE_WIDTH","PACKAGE_LENGTH",
                  "PACKAGE_WEIGHT","SELLER_PACKAGE_WIDTH","SELLER_PACKAGE_LENGTH",
                  "SELLER_PACKAGE_HEIGHT","SELLER_PACKAGE_WEIGHT","SELLER_PACKAGE_DATA_SOURCE",
                  "PACKAGE_DATA_SOURCE","HAZMAT_TRANSPORTABILITY","VALUE_ADDED_TAX",
                  "IMPORT_DUTY","SUBTEL_CODE","ANATEL_HOMOLOGATION_LABEL",
                  "IS_SUITABLE_FOR_SHIPMENT","HAS_COMPATIBILITIES","IS_NEW_OFFER",
                  "MPN","GTIN","MANUFACTURER","SELLER_SKU"}
          to_push = []
          for k, v in missing.items():
              if k in SKIP: continue
              body = {"id": k}
              if v.get("value_name"): body["value_name"] = v["value_name"]
              if v.get("value_struct"): body["value_struct"] = v["value_struct"]
              if v.get("values"): body["values"] = v["values"]
              to_push.append(body)
          print(f"Rojo: {len(rm)} attrs, copiando {len(to_push)} de {len(refm)} del ref")
          for a in to_push: print(f"  + {a['id']}")

          if to_push:
              r = requests.put("https://api.mercadolibre.com/items/MLM2874595625",
                  headers=H, json={"attributes": to_push})
              rj = r.json()
              filled = sum(1 for a in rj.get("attributes",[]) if a.get("value_name") or a.get("value_struct") or a.get("values"))
              print(f"PUT status={r.status_code}, filled after: {filled}")

          # Gap final
          cat = requests.get("https://api.mercadolibre.com/categories/MLM59800/attributes", headers=H).json()
          final = requests.get("https://api.mercadolibre.com/items/MLM2874595625", headers=H).json()
          fm = attrs_map(final)
          gap = []
          for a in cat:
              tags = a.get("tags") or {}
              if a["id"] in fm: continue
              if tags.get("read_only") or tags.get("hidden"): continue
              gap.append((a["id"], tags))
          print(f"\nFinal rojo: {len(fm)} attrs llenos / {len(cat)} total")
          print(f"Gap llenable restante: {len(gap)}")
          for g in gap: print(f"  {g}")
          PY
