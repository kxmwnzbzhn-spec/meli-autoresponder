name: Check Redmi catalog
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          
          # Search specifically for NEW Redmi Buds 4 Lite Negro
          # The domain is MLM-HEADPHONES, search by domain
          r = requests.get("https://api.mercadolibre.com/products/search?site_id=MLM&domain_id=MLM-HEADPHONES&q=Redmi+Buds+4+Lite+Negro&limit=30", headers=h, timeout=20)
          res = r.json()
          print(f"Found {res.get('paging',{}).get('total')}")
          print(f"keys: {list(res.keys())[:5]}")
          for p in res.get('results', [])[:20]:
              pid = p.get('id')
              nm = p.get('name','')
              if 'Redmi' not in nm: continue
              r2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=h, timeout=10)
              pd = r2.json()
              cond = next((a.get('value_name') for a in pd.get('attributes',[]) if a.get('id')=='ITEM_CONDITION'), None)
              grad = next((a.get('value_name') for a in pd.get('attributes',[]) if a.get('id')=='GRADING'), None)
              color = next((a.get('value_name') for a in pd.get('attributes',[]) if a.get('id')=='COLOR'), None)
              bbw = pd.get('buy_box_winner') or {}
              print(f"  {pid} | {cond}/{grad} | {color} | BBW: ${bbw.get('price')} | {nm[:65]}")
          PY
