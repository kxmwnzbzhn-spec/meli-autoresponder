name: Check Redmi catalog
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          
          # Check candidates in detail
          candidates = ["MLM36029619","MLM52171702","MLM38597601","MLM24791861","MLM61933361",
                        "MLM25967407","MLM22448504","MLM29027135"]
          for cid in candidates:
              r = requests.get(f"https://api.mercadolibre.com/products/{cid}", headers=h, timeout=10)
              if r.status_code != 200:
                  print(f"{cid}: {r.status_code}"); continue
              pd = r.json()
              nm = pd.get('name','')
              bbw = pd.get('buy_box_winner') or {}
              # try listings count
              r2 = requests.get(f"https://api.mercadolibre.com/products/{cid}/items?limit=5", headers=h, timeout=10)
              lst = r2.json()
              n_items = len(lst.get('results',[]))
              # get main_title (category)
              print(f"\n{cid} | status={pd.get('status')}")
              print(f"  name: {nm[:80]}")
              print(f"  BBW: ${bbw.get('price')} by {bbw.get('seller_id')} item={bbw.get('item_id')}")
              print(f"  listings_endpoint: {r2.status_code} n={n_items}")
              # pickers show color variants
              for pk in pd.get('pickers',[])[:2]:
                  pn = pk.get('picker_name')
                  opts = [p.get('picker_label') for p in pk.get('products',[])]
                  print(f"  picker {pn}: {opts}")
              print(f"  main_title: {pd.get('main_title')}")
              attrs = {a['id']: a.get('value_name') for a in pd.get('attributes',[])[:10]}
              print(f"  attrs sample: COLOR={attrs.get('COLOR')} COND={attrs.get('ITEM_CONDITION')} GRAD={attrs.get('GRADING')} MODEL={attrs.get('MODEL')}")
          PY
