name: Check Redmi catalog
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]
          h = {"Authorization":f"Bearer {tok}"}
          
          # Search catalog products (NEW condition) for Redmi Buds 4 Lite
          r = requests.get("https://api.mercadolibre.com/products/search?status=active&site_id=MLM&q=Redmi+Buds+4+Lite&limit=20", headers=h, timeout=20)
          res = r.json()
          print(f"Found {res.get('paging',{}).get('total')} catalog products:")
          for p in res.get('results', [])[:15]:
              name = p.get('name','')
              cid = p.get('id')
              # Quick condition probe
              r2 = requests.get(f"https://api.mercadolibre.com/products/{cid}", headers=h, timeout=15)
              pd = r2.json()
              cond = next((a.get('value_name') for a in pd.get('attributes',[]) if a.get('id')=='ITEM_CONDITION'), '?')
              bbw = pd.get('buy_box_winner') or {}
              print(f"  {cid} | cond={cond:15} | winner=${bbw.get('price')} by {bbw.get('seller_id')} | {name[:70]}")
          
          # Now for the refurbished one (our current catalog_product_id), check listings endpoint
          print("\n=== LISTINGS for MLM2014404762 (refurbished) ===")
          r = requests.get("https://api.mercadolibre.com/products/MLM2014404762/items?limit=20", headers=h, timeout=20)
          print(f"Status: {r.status_code}")
          print(f"Body: {json.dumps(r.json(), indent=2)[:1500]}")
          
          # Test different item statuses for catalog competitor scan
          print("\n=== Testing alternate: search product items ===")
          r = requests.get("https://api.mercadolibre.com/products/MLM2014404762", headers=h, timeout=20)
          pd = r.json()
          print(f"Main pick item: {pd.get('main_features')}")
          print(f"Pickers: {pd.get('pickers',[])[:2]}")
          print(f"Status: {pd.get('status')}")
          # Buy box winner full
          print(f"Full buy_box_winner: {json.dumps(pd.get('buy_box_winner'), indent=2)}")
          PY
