name: claribel-go4
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_OFICIAL: ${{ secrets.MELI_REFRESH_TOKEN_OFICIAL }}
        run: python scripts/claribel_go4.py
      - run: |
          git config user.name bot
          git config user.email b@b.com
          git add stock_config_oficial.json
          git diff --cached --quiet || git commit -m "Claribel Go 4 reacondicionadas"
          git push || true
