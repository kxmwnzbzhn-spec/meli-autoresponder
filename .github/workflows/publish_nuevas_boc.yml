name: Publicar Go Essential 2 + Sony Reacondicionado
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          def find_pics(search_q, color_hint=None):
              # Try catalog search
              r = requests.get(f"https://api.mercadolibre.com/products/search?site_id=MLM&q={search_q.replace(' ','+')}&limit=15", headers=h, timeout=20)
              # Prefer with color match, fallback any
              best = None
              for p in r.json().get("results",[])[:15]:
                  pid = p.get("id")
                  r2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=h, timeout=8)
                  pd = r2.json()
                  nm = (pd.get("name","") or "").lower()
                  pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in pd.get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                  if not pics: continue
                  if color_hint and color_hint in nm:
                      return pid, pics[:8], pd
                  if not best: best = (pid, pics[:8], pd)
              # Fallback: item search
              if not best:
                  r = requests.get(f"https://api.mercadolibre.com/sites/MLM/search?q={search_q.replace(' ','+')}&limit=5&category=MLM59800", headers=h, timeout=15)
                  for it in r.json().get("results",[])[:5]:
                      iid = it.get("id")
                      r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=8)
                      pics = [{"source": pic.get("url") or pic.get("secure_url")} for pic in r2.json().get("pictures",[]) if pic.get("url") or pic.get("secure_url")]
                      if pics:
                          return None, pics[:8], r2.json()
              return best if best else (None, [], {})
          
          try:
              with open("stock_config.json") as f: stock = json.load(f)
          except: stock = {}
          
          results = []
          
          # ===== JBL Go Essential 2 — Azul + Rojo as Reacondicionado =====
          for color in [("azul","Azul"), ("rojo","Roja")]:
              color_es, color_title = color
              cat_pid, pics, pd = find_pics("JBL Go Essential 2", color_es)
              if not pics:
                  cat_pid, pics, pd = find_pics("JBL Go Essential", color_es)
              print(f"\n[Go Essential 2 {color_title}] cat={cat_pid} pics={len(pics)}")
              if not pics:
                  print(f"  ✗ no pics")
                  results.append((f"GE2 {color_title}","no_pics", None))
                  continue
              
              title = f"Bocina Bluetooth Jbl Go Essential 2 {color_title} Reacondicionado"
              if len(title) > 60: title = title[:60]
              body = {
                  "title": title,
                  "category_id":"MLM59800",
                  "price":499, "currency_id":"MXN",
                  "available_quantity":1, "buying_mode":"buy_it_now",
                  "condition":"used", "listing_type_id":"gold_pro",
                  "pictures": pics,
                  "attributes":[
                      {"id":"BRAND","value_name":"JBL"},
                      {"id":"MODEL","value_name":"Go Essential 2"},
                      {"id":"COLOR","value_name":color_title},
                      {"id":"GTIN","value_name":"050036398763"},
                      {"id":"PACKAGE_LENGTH","value_name":"11 cm"},
                      {"id":"PACKAGE_WIDTH","value_name":"10 cm"},
                      {"id":"PACKAGE_HEIGHT","value_name":"6 cm"},
                      {"id":"PACKAGE_WEIGHT","value_name":"260 g"},
                  ],
                  "sale_terms":[
                      {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                      {"id":"WARRANTY_TIME","value_name":"30 días"}
                  ],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}
              }
              if cat_pid: body["catalog_product_id"] = cat_pid
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              if r.status_code not in (200,201) and cat_pid:
                  body.pop("catalog_product_id", None)
                  r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              if r.status_code in (200,201):
                  new_id = r.json().get("id")
                  print(f"  ✓ {new_id}")
                  desc = (f"{title}\n\nPRODUCTO REACONDICIONADO\n"
                          f"Bocina JBL Go Essential 2 {color_title}. Reacondicionada a Excelente, probada 100% antes de enviar.\n\n"
                          f"INCLUYE:\n- Bocina + empaque retail + cable de carga\n\n"
                          f"CARACTERISTICAS:\n- Bluetooth portatil\n- Sonido potente\n- Resistencia al agua\n- Bateria recargable\n\n"
                          f"IMPORTANTE:\n- NO es compatible con la app oficial JBL Portable\n\n"
                          f"GARANTIAS:\n- 30 dias de garantia\n- Envio GRATIS el mismo dia antes de 3pm\n\n- Sonix Mx")
                  requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h, json={"plain_text":desc}, timeout=15)
                  stock[new_id] = {"real_stock":10,"sku":f"JBL-GE2-{color_es}","label":title[:50],
                                   "auto_replenish":True,"replenish_quantity":1,"seo_title":title,
                                   "previous_ids":[],"_new_bocina":True}
                  results.append((f"GE2 {color_title}","ok",new_id))
              else:
                  resp = r.json()
                  errs = [c for c in (resp.get("cause") or []) if isinstance(c,dict) and c.get("type")=="error"]
                  print(f"  ✗ {r.status_code}")
                  for c in errs[:3]: print(f"    {c.get('code')}: {c.get('message','')[:120]}")
                  results.append((f"GE2 {color_title}",f"err_{r.status_code}",None))
              time.sleep(2)
          
          # ===== Sony SRS-XB100 Negra — Reacondicionado =====
          cat_pid, pics, pd = find_pics("Sony SRS-XB100", "negra")
          if not pics:
              cat_pid, pics, pd = find_pics("Sony XB100", "negro")
          print(f"\n[Sony SRS-XB100 Negra] cat={cat_pid} pics={len(pics)}")
          if pics:
              title = "Bocina Bluetooth Sony Srs-xb100 Portatil Negra Reacondicionado"
              if len(title) > 60: title = title[:60]
              body = {
                  "title": title,
                  "category_id":"MLM59800",
                  "price":599, "currency_id":"MXN",
                  "available_quantity":1, "buying_mode":"buy_it_now",
                  "condition":"used", "listing_type_id":"gold_pro",
                  "pictures": pics,
                  "attributes":[
                      {"id":"BRAND","value_name":"Sony"},
                      {"id":"MODEL","value_name":"SRS-XB100"},
                      {"id":"COLOR","value_name":"Negra"},
                      {"id":"GTIN","value_name":"4548736143050"},
                      {"id":"PACKAGE_LENGTH","value_name":"10 cm"},
                      {"id":"PACKAGE_WIDTH","value_name":"12 cm"},
                      {"id":"PACKAGE_HEIGHT","value_name":"10 cm"},
                      {"id":"PACKAGE_WEIGHT","value_name":"340 g"},
                  ],
                  "sale_terms":[
                      {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                      {"id":"WARRANTY_TIME","value_name":"30 días"}
                  ],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}
              }
              if cat_pid: body["catalog_product_id"] = cat_pid
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              if r.status_code not in (200,201) and cat_pid:
                  body.pop("catalog_product_id", None)
                  r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              if r.status_code in (200,201):
                  new_id = r.json().get("id")
                  print(f"  ✓ {new_id}")
                  desc = (f"{title}\n\nPRODUCTO REACONDICIONADO\n"
                          f"Bocina Sony SRS-XB100 color Negra. Reacondicionada a Excelente, probada al 100%.\n\n"
                          f"INCLUYE:\n- Bocina + empaque retail + cable USB-C\n\n"
                          f"CARACTERISTICAS:\n- Sonido EXTRA BASS\n- Bluetooth 5.0\n- Hasta 16 hrs de bateria\n- Resistente agua/polvo IP67\n\n"
                          f"GARANTIAS:\n- 30 dias de garantia\n- Envio GRATIS el mismo dia antes 3pm\n\n- Sonix Mx")
                  requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h, json={"plain_text":desc}, timeout=15)
                  stock[new_id] = {"real_stock":10,"sku":"SONY-XB100-NEG","label":title[:50],
                                   "auto_replenish":True,"replenish_quantity":1,"seo_title":title,
                                   "previous_ids":[],"_new_bocina":True}
                  results.append(("Sony Negra","ok",new_id))
              else:
                  resp = r.json()
                  errs = [c for c in (resp.get("cause") or []) if isinstance(c,dict) and c.get("type")=="error"]
                  print(f"  ✗ {r.status_code}")
                  for c in errs[:3]: print(f"    {c.get('code')}: {c.get('message','')[:120]}")
                  results.append(("Sony Negra",f"err_{r.status_code}",None))
          else:
              results.append(("Sony Negra","no_pics",None))
          
          with open("stock_config.json","w") as f:
              json.dump(stock, f, indent=2, ensure_ascii=False)
          
          ok = [r for r in results if r[1]=="ok"]
          print(f"\n=== OK: {len(ok)}/{len(results)} ===")
          for n, st, iid in results:
              print(f"  {st}: {n} {iid or ''}")
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"🔊 *Bocinas Reacondicionado*\n\nPublicadas: *{len(ok)}/{len(results)}*\n\n"
              for n, st, iid in results:
                  icon = "✓" if st=="ok" else "✗"
                  m += f"{icon} {n} {iid or st}\n"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock_config.json
          git diff --cached --quiet || git commit -m "new bocinas Go Essential + Sony reacondicionado"
          git push || echo "no push"
