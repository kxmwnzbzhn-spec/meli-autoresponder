name: Publish test Oficial
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          MELI_REFRESH_TOKEN_OFICIAL: ${{ secrets.MELI_REFRESH_TOKEN_OFICIAL }}
        run: |
          python3 <<'PY'
          import os, json, requests
          def refresh(rt):
              r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                  "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                  "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":rt}, timeout=20)
              return r.json()
          inv = refresh(os.environ["MELI_REFRESH_TOKEN"])["access_token"]
          ofc = refresh(os.environ["MELI_REFRESH_TOKEN_OFICIAL"])["access_token"]
          h_inv = {"Authorization":f"Bearer {inv}"}
          h_ofc = {"Authorization":f"Bearer {ofc}","Content-Type":"application/json"}
          
          # First: check account status
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h_ofc, timeout=15)
          me = r.json()
          print(f"Account: {me.get('nickname')}")
          print(f"status: {json.dumps(me.get('status'), indent=2)}")
          
          r = requests.get("https://api.mercadolibre.com/items/MLM2876026329", headers=h_inv, timeout=15)
          src = r.json()
          gtin = next((a.get("value_name") for a in src.get("attributes",[]) if a.get("id")=="GTIN"), None)
          pic_urls = [{"source": p.get("url")} for p in src.get("pictures",[]) if p.get("url")][:8]
          
          body = {
              "title": "Bocina Bluetooth Jbl Go 4 Portatil Negra Original Usada",
              "category_id": src.get("category_id"),
              "price": 299, "currency_id":"MXN",
              "available_quantity":1, "buying_mode":"buy_it_now",
              "condition":"used", "listing_type_id":"gold_pro",
              "pictures": pic_urls,
              "attributes":[
                  {"id":"BRAND","value_name":"JBL"},
                  {"id":"MODEL","value_name":"Go 4"},
                  {"id":"COLOR","value_name":"Negro"},
                  {"id":"GTIN","value_name":gtin or "050036399340"},
              ],
              "sale_terms":[
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"30 días"}
              ],
              "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":False}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=h_ofc, json=body, timeout=30)
          print(f"\nPOST: {r.status_code}")
          print(f"Body: {json.dumps(r.json(), indent=2)[:3000]}")
          
          # Also test sell eligibility via dedicated endpoint
          r = requests.get("https://api.mercadolibre.com/users/me/restrictions", headers=h_ofc, timeout=15)
          print(f"\nRestrictions: {r.status_code}")
          print(json.dumps(r.json(), indent=2)[:1500])
          PY
