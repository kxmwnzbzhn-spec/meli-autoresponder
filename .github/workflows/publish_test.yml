name: Publish test Oficial
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          MELI_REFRESH_TOKEN_OFICIAL: ${{ secrets.MELI_REFRESH_TOKEN_OFICIAL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          def refresh(rt):
              r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                  "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                  "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":rt
              }, timeout=20)
              return r.json()
          inv = refresh(os.environ["MELI_REFRESH_TOKEN"])["access_token"]
          ofc = refresh(os.environ["MELI_REFRESH_TOKEN_OFICIAL"])["access_token"]
          h_inv = {"Authorization":f"Bearer {inv}"}
          h_ofc = {"Authorization":f"Bearer {ofc}","Content-Type":"application/json"}
          
          r = requests.get("https://api.mercadolibre.com/items/MLM2876026329", headers=h_inv, timeout=15)
          src = r.json()
          # Extract GTIN + attributes
          src_attrs = {a["id"]: a.get("value_name") or a.get("value_id") for a in src.get("attributes",[])}
          gtin = src_attrs.get("GTIN")
          print(f"Source GTIN: {gtin}")
          print(f"Source attrs: {list(src_attrs.keys())[:15]}")
          
          pic_urls = [{"source": p.get("url") or p.get("secure_url")} for p in src.get("pictures",[]) if p.get("url") or p.get("secure_url")]
          
          # Copy essential attributes, skip LINE (non-modifiable)
          attrs = [
              {"id":"BRAND","value_name":"JBL"},
              {"id":"MODEL","value_name":"Go 4"},
              {"id":"COLOR","value_name":"Negro"},
          ]
          if gtin:
              attrs.append({"id":"GTIN","value_name":gtin})
          # Copy other relevant attrs from source if they look transferable
          for a in src.get("attributes",[]):
              aid = a.get("id")
              val = a.get("value_name") or a.get("value_id")
              if not val: continue
              if aid in ("BRAND","MODEL","COLOR","GTIN","LINE","ITEM_CONDITION"):
                  continue
              # Skip empty/unknowns
              if str(val).lower() in ("otros","otro","no especifica"):
                  continue
              attrs.append({"id":aid, "value_name":val})
          
          body = {
              "title": "Bocina Bluetooth Jbl Go 4 Portatil Negra Original Usada",
              "category_id": src.get("category_id"),
              "price": 299,
              "currency_id":"MXN",
              "available_quantity":1,
              "buying_mode":"buy_it_now",
              "condition":"used",
              "listing_type_id":"gold_pro",
              "pictures": pic_urls[:8],
              "attributes": attrs,
              "sale_terms":[
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"30 días"}
              ],
              "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":False}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=h_ofc, json=body, timeout=30)
          print(f"\nPOST: {r.status_code}")
          resp = r.json()
          if r.status_code in (200,201):
              new_id = resp.get("id")
              print(f"✓ {new_id}")
              print(f"  status: {resp.get('status')} sub_status: {resp.get('sub_status')}")
              print(f"  permalink: {resp.get('permalink')}")
              desc = "Bocina Bluetooth JBL Go 4 portátil, color Negro. Condición usada, probada y funcional al 100%. Incluye cable de carga. Envío el mismo día. Garantía del vendedor 30 días."
              rd = requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h_ofc, json={"plain_text":desc}, timeout=15)
              print(f"  description: {rd.status_code}")
              tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
              if tt and tc:
                  requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown",
                      "text":f"🎯 *Test OFICIAL*\n\n`{new_id}` JBL Go 4 Negra $299\nStatus: {resp.get('status')}\n[Ver]({resp.get('permalink','')})"})
          else:
              # Solo mostrar causes tipo error (no warnings)
              errs = [c for c in resp.get("cause",[]) if c.get("type")=="error"]
              print(f"ERRORS ({len(errs)}):")
              for c in errs[:6]:
                  print(f"  {c.get('code')}: {c.get('message','')[:150]}")
          PY
