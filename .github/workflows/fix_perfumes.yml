name: Fix perfumes from audit
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          # Fixes por item — investigado marca real del fabricante
          FIXES = {
              # Game of Spades: brand real = "Jo Milano Paris"
              "MLM5221355096": {"brand":"Jo Milano Paris","perfume_name":"Game of Spades Wildcard","gtin":"0850026860016","title":"Perfume Jo Milano Game Of Spades Wildcard Parfum 100ml"},
              # Marshmallow Blush: brand = "Rue Broca"
              "MLM5221328952": {"brand":"Rue Broca","perfume_name":"Marshmallow Blush","gtin":"5060472451637","title":"Perfume Rue Broca Marshmallow Blush Edp 100ml Mujer"},
              # Armaf Club de Nuit Maleka: brand ok, solo GTIN placeholder
              "MLM5221356390": {"brand":"Armaf","perfume_name":"Club de Nuit Maleka","gtin":"6294015120844"},
              # Armaf Odyssey Spectra: gtin placeholder
              "MLM5221330720": {"brand":"Armaf","perfume_name":"Odyssey Spectra","gtin":"6294015139020"},
              # Armaf Odyssey Candee: gtin placeholder
              "MLM5221330622": {"brand":"Armaf","perfume_name":"Odyssey Candee","gtin":"6294015139013"},
              # JPG Le Male Elixir: gtin placeholder
              "MLM2880142605": {"brand":"Jean Paul Gaultier","perfume_name":"Le Male Elixir","gtin":"8435415055468"},
              # Armani Privé Oud Royal: BRAND ok, ajustar título
              "MLM5221767428": {"brand":"Giorgio Armani","perfume_name":"Oud Royal","title":"Giorgio Armani Prive Oud Royal Edp 100ml Original"},
              # Rabanne 1 Million Gold Intense: BRAND Paco Rabanne, ya coincide, re-validate
              "MLM5221355572": {"brand":"Paco Rabanne","perfume_name":"1 Million Gold Intense","title":"Paco Rabanne 1 Million Gold Intense Edp 100ml Hombre"},
              "MLM2879386811": {"brand":"Paco Rabanne","perfume_name":"1 Million Gold Intense","title":"Paco Rabanne 1 Million Gold Intense Edp 100ml Hombre"},
              # Dior Sauvage Eau Forte: ajustar título
              "MLM5221332874": {"brand":"Dior","perfume_name":"Sauvage Eau Forte","title":"Perfume Dior Sauvage Eau Forte 100ml Hombre Amaderado"},
              # Kurky Maison Francis: ajustar título
              "MLM2879717657": {"brand":"Maison Francis Kurkdjian","perfume_name":"Baccarat Rouge 540","title":"Maison Francis Kurkdjian Baccarat Rouge 540 Edp 70ml"},
              # Baccarat Rouge 540 Extrait — brand YA coincide en título (falso positivo de audit), no tocar
          }
          
          ok = 0; err = 0
          for iid, fix in FIXES.items():
              print(f"\n[{iid}]")
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,status,has_bids,sub_status", headers=h, timeout=10)
              if r.status_code != 200:
                  print(f"  ✗ GET {r.status_code}")
                  err += 1; continue
              it = r.json()
              if "forbidden" in (it.get("sub_status") or []):
                  print(f"  SKIP forbidden"); err += 1; continue
              
              # Build attr updates
              attrs_upd = []
              if "brand" in fix:
                  attrs_upd.append({"id":"BRAND","value_name":fix["brand"]})
              if "perfume_name" in fix:
                  attrs_upd.append({"id":"PERFUME_NAME","value_name":fix["perfume_name"]})
              if "gtin" in fix:
                  attrs_upd.append({"id":"GTIN","value_name":fix["gtin"]})
              
              body = {}
              if attrs_upd: body["attributes"] = attrs_upd
              if "title" in fix and len(fix["title"]) <= 60:
                  body["title"] = fix["title"]
              
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json=body, timeout=20)
              if r.status_code == 200:
                  print(f"  ✓ updated: {list(body.keys())}")
                  ok += 1
              else:
                  resp = r.json()
                  errs = [c for c in resp.get("cause",[]) if isinstance(c,dict) and c.get("type")=="error"]
                  print(f"  ✗ {r.status_code}")
                  for c in errs[:3]:
                      print(f"    {c.get('code')}: {c.get('message','')[:150]}")
                  # Try attrs only (skip title)
                  if "title" in body:
                      body2 = {"attributes": attrs_upd}
                      r2 = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json=body2, timeout=20)
                      if r2.status_code == 200:
                          print(f"  ✓ attrs only (title skipped)")
                          ok += 1; continue
                  err += 1
              time.sleep(1)
          
          print(f"\n=== FIXES === OK:{ok} ERR:{err}")
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown",
                  "text":f"🔧 *Fix perfumes*\n\nOK: *{ok}/{len(FIXES)}*\nErr: {err}"})
          PY
