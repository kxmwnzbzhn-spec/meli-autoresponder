name: SEO-optimize Dashcam (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}
          iid = "MLM2874596985"

          # Título optimizado SEO (keywords alto volumen MELI MX)
          new_title = "Dashcam Camara Para Auto 3 Lentes Full HD Pantalla Reversa"
          print(f"title len: {len(new_title)}")

          # Atributos COMPLETOS
          attrs = [
              {"id":"BRAND","value_name":"Asva Electronics"},
              {"id":"MODEL","value_name":"DVR-3"},
              {"id":"PART_NUMBER","value_name":"ASV-CAM-DASH"},
              {"id":"MPN","value_name":"ASV-CAM-DASH"},
              {"id":"SELLER_SKU","value_name":"ASVA-DVR3-001"},
              {"id":"VEHICLE_TYPE","value_name":"Carro/Camioneta"},
              {"id":"VOLTAGE","value_name":"12V"},
              {"id":"VISION_ANGLE","value_name":"170 °","value_struct":{"number":170,"unit":"°"}},
              {"id":"VIDEO_RESOLUTION","value_name":"1080p"},
              {"id":"STORAGE_CAPACITY","value_name":"32 GB","value_struct":{"number":32,"unit":"GB"}},
              {"id":"IS_COMPATIBLE_WITH_SD_STORAGE","value_name":"Sí"},
              {"id":"WITH_LOOP_RECORDING","value_name":"Sí"},
              {"id":"INCLUDES_SCREEN","value_name":"Sí"},
              {"id":"SCREEN_SIZE","value_name":"4 \"","value_struct":{"number":4,"unit":"\""}},
              {"id":"WITH_MOTION_SENSOR","value_name":"Sí"},
              {"id":"WITH_ASSISTED_DRIVING","value_name":"No"},
              {"id":"WITH_WIFI","value_name":"No"},
              {"id":"WITH_BLUETOOTH","value_name":"No"},
              {"id":"WITH_MOBILE_APP","value_name":"No"},
              {"id":"WITH_MICROPHONE","value_name":"Sí"},
              {"id":"IS_WATERPROOF","value_name":"No"},
              {"id":"WITH_LED_BULBS_FOR_NIGHT_VISION","value_name":"Sí"},
              {"id":"INCLUDES_CABLES","value_name":"Sí"},
              {"id":"ITEM_CONDITION","value_name":"Nuevo"},
              {"id":"MAIN_COLOR","value_name":"Negro"},
              {"id":"COLOR","value_name":"Negro"},
              {"id":"WITH_REVERSE_CAMERA","value_name":"Sí"},
              {"id":"WITH_NIGHT_VISION","value_name":"Sí"},
              {"id":"WITH_SCREEN","value_name":"Sí"},
              {"id":"WITH_GPS","value_name":"No"},
              {"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_G_SENSOR","value_name":"Sí"},
              {"id":"WITH_MOTION_DETECTION","value_name":"Sí"},
              {"id":"CAMERAS_QUANTITY","value_name":"3"},
              {"id":"POWER_SUPPLY_TYPES","value_name":"Toma de encendedor"},
          ]

          # Descripción SEO optimizada
          new_desc = (
              "CAMARA PARA AUTO DASHCAM 3 LENTES FULL HD CON PANTALLA Y CAMARA DE REVERSA\n\n"
              "Sistema de grabacion vehicular profesional con 3 camaras: frontal, interior y de reversa. "
              "Protege tu auto 24/7 contra accidentes, robos y demandas injustas. Ideal para Uber, DiDi, "
              "particulares y flotas.\n\n"
              "CARACTERISTICAS PRINCIPALES:\n"
              "- 3 camaras simultaneas (frontal + interior + reversa)\n"
              "- Resolucion Full HD 1080p en cada lente\n"
              "- Pantalla IPS integrada de 4 pulgadas para vision directa\n"
              "- Angulo amplio 170 grados gran angular\n"
              "- Vision nocturna por LEDs infrarrojos\n"
              "- Grabacion en loop automatica (sobrescribe lo mas viejo)\n"
              "- Sensor G (impacto) protege automaticamente el video del accidente\n"
              "- Deteccion de movimiento con inicio automatico\n"
              "- Microfono interno para audio\n"
              "- Camara de reversa con lineas guia al meter reversa\n"
              "- Compatible con tarjetas microSD hasta 32 GB (no incluida)\n"
              "- Alimentacion por toma de encendedor 12V del auto\n"
              "- Formato: MP4 estandar (compatible con cualquier reproductor)\n\n"
              "CONTENIDO DE LA CAJA:\n"
              "- 1 camara principal con pantalla\n"
              "- 1 camara interior\n"
              "- 1 camara de reversa\n"
              "- Cable largo para instalacion\n"
              "- Adaptador para toma de encendedor 12V\n"
              "- Soportes y accesorios de montaje\n"
              "- Manual de instalacion\n\n"
              "DATOS DEL PRODUCTO:\n"
              "- Marca: Asva Electronics\n"
              "- Modelo: DVR-3\n"
              "- Numero de parte: ASV-CAM-DASH\n"
              "- Condicion: NUEVO, caja sellada\n\n"
              "ENVIO GRATIS con Mercado Envios desde Mexico. Todos los envios llevan numero de rastreo. "
              "Garantia del vendedor por 30 dias contra defectos de fabrica. "
              "Facturamos electronicamente a solicitud posterior a la compra."
          )

          # Aplicar
          r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
              headers=H, json={"title": new_title, "attributes": attrs})
          print(f"PUT item: {r.status_code}")
          rj = r.json()
          if r.status_code >= 400:
              print(json.dumps(rj, ensure_ascii=False)[:2000])
          else:
              filled = sum(1 for a in rj.get("attributes",[]) if a.get("value_name") or a.get("value_struct") or a.get("values"))
              print(f"attrs filled: {filled}/{len(rj.get('attributes',[]))}")
              if "cause" in rj:
                  for c in rj.get("cause",[])[:10]:
                      print(f"  warn: {c.get('message','')[:200]}")

          dr = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
              headers=H, json={"plain_text": new_desc})
          print(f"PUT desc: {dr.status_code}")

          # Final audit
          it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
          print(f"\n=== FINAL ===")
          print(f"title: {it.get('title')}")
          print(f"attrs filled: {sum(1 for a in it.get('attributes',[]) if a.get('value_name') or a.get('value_struct') or a.get('values'))}")
          PY
