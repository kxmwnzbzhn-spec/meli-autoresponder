name: Find Go4 Aqua (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          # probar varias queries
          for q in ["JBL Go 4 agua","JBL Go 4 teal","Jbl Go4 turquesa","Jbl Go 4 aqua"]:
              print(f"\nq='{q}':")
              s = requests.get("https://api.mercadolibre.com/products/search",
                  params={"site_id":"MLM","q":q,"limit":10}, headers=H).json()
              for r in s.get('results',[])[:10]:
                  print(f"  {r.get('id')} - {r.get('name','')[:100]}")

          # Sacar item publico directo
          print("\n=== item MLM2801539003 via multiget ===")
          r = requests.get("https://api.mercadolibre.com/items",
              params={"ids":"MLM2801539003","attributes":"id,title,catalog_product_id,variations"},
              headers=H).json()
          print(json.dumps(r, indent=2)[:2500])
          PY
