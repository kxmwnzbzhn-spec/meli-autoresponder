name: Audit + fix Flip7/Charge6 + USB disclaimer
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, io, sys
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          def audit(iid):
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"\n=== {iid} ({it.get('title','')[:55]}) ===")
              print(f"  status={it.get('status')} sub={it.get('sub_status')} price=${it.get('price')} pics={len(it.get('pictures',[]))}")
              for a in it.get('attributes',[]) or []:
                  if a.get('id') in ('COLOR','MAIN_COLOR','MODEL','BRAND','IP_CLASSIFICATION','MAX_BATTERY_AUTONOMY'):
                      print(f"  {a.get('id')}={a.get('value_name')}")
              pics = it.get('pictures',[])[:2]
              for p in pics:
                  print(f"  pic: {p.get('url') or p.get('secure_url')}")
              return it

          # Primero auditamos ambos
          flip = audit("MLM5209620060")
          charge = audit("MLM5209619958")

          # FIX FLIP 7: reemplazar fotos con las del producto MLM63648346 (Flip 7 Negro real)
          def upload_pics_from(product_id, limit=11):
              pr = requests.get(f"https://api.mercadolibre.com/products/{product_id}", headers=H).json()
              urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[])]
              ids = []
              for u in urls[:limit]:
                  try:
                      u2 = u.replace("-F.jpg","-O.jpg")
                      rr = requests.get(u2, timeout=15)
                      if rr.status_code != 200 or len(rr.content) < 3000:
                          rr = requests.get(u, timeout=15)
                      im = Image.open(io.BytesIO(rr.content))
                      if im.mode != "RGB":
                          if im.mode in ("RGBA","LA","P"):
                              bg = Image.new("RGB", im.size, (255,255,255))
                              if im.mode == "P": im = im.convert("RGBA")
                              bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                              im = bg
                          else: im = im.convert("RGB")
                      w,h = im.size
                      s = min(1200/w, 1200/h); nw, nh = int(w*s), int(h*s)
                      im = im.resize((nw,nh), Image.LANCZOS)
                      c = Image.new("RGB", (1200,1200), (255,255,255))
                      c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                      buf = io.BytesIO(); c.save(buf, "JPEG", quality=92)
                      up = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                          headers={"Authorization": f"Bearer {AT}"}, files={"file":("p.jpg",buf.getvalue(),"image/jpeg")})
                      if up.status_code < 400: ids.append({"id": up.json()["id"]})
                  except Exception as e:
                      print(f"  pic err: {e}")
              return ids

          # Verificar si Flip 7 necesita fotos nuevas (si la primera foto es del blanco)
          first_url = (flip.get('pictures') or [{}])[0].get('url') or ''
          if 'MLM95001' in first_url or 'blanco' in first_url.lower() or True:  # siempre rehacer
              print("\n>>> Corrigiendo fotos Flip 7 Negro (desde MLM63648346)")
              pics = upload_pics_from("MLM63648346", 11)
              print(f"fotos nuevas: {len(pics)}")
              if pics:
                  r = requests.put("https://api.mercadolibre.com/items/MLM5209620060",
                      headers=H, json={"pictures": pics, "status":"active"})
                  print(f"  update pics: {r.status_code}")

          # CHARGE 6 NEGRO audit + recopilar data de charge actual para diagnostico
          print(f"\n>>> Charge 6 Negro MLM5209619958 detalle:")
          sub = (charge.get('sub_status') or [])
          print(f"  sub_status: {sub}")
          # Si es inactivo o no encuentra attrs de charge 6, reemplazar fotos
          # Cambiar a fotos del producto MLM48897018 (Azul) o buscar uno negro real
          # Mejor, uso el mismo product_id pero busco uno de charge 6 NEGRO real
          # Query fresh:
          s = requests.get("https://api.mercadolibre.com/products/search",
              params={"site_id":"MLM","q":"JBL Charge 6 Negro","limit":20}, headers=H).json()
          charge_neg = None
          for r in s.get('results',[])[:20]:
              rid = r.get('id')
              pr = requests.get(f"https://api.mercadolibre.com/products/{rid}", headers=H).json()
              color = None; model = None
              for a in pr.get('attributes',[]):
                  if a.get('id') == 'COLOR': color = a.get('value_name')
                  if a.get('id') == 'MODEL': model = a.get('value_name')
              if model and 'Charge 6' in str(model) and (color or '').lower() in ('negro','black'):
                  pics = len(pr.get('pictures',[]))
                  print(f"  candidato: {rid} model={model} color={color} pics={pics}")
                  if pics >= 4 and (charge_neg is None or pics > charge_neg['pics']):
                      charge_neg = {"id":rid, "pics":pics}
          if charge_neg:
              print(f"\n>>> Corrigiendo fotos Charge 6 Negro (desde {charge_neg['id']})")
              pics = upload_pics_from(charge_neg['id'], 11)
              if pics:
                  r = requests.put("https://api.mercadolibre.com/items/MLM5209619958",
                      headers=H, json={"pictures": pics})
                  print(f"  update: {r.status_code}")

          # Agregar disclaimer USB en los 5 items (Charge 6 x4 + Flip 7)
          usb_note = "\n\n* Nota: esta version incluye entrada USB para reproduccion directa desde memoria."
          targets = [
              "MLM5209619958",  # Charge 6 Negro
              "MLM2874596165",  # Charge 6 Rojo
              "MLM2874607951",  # Charge 6 Azul
              "MLM5209619970",  # Charge 6 Squad
              "MLM5209620060",  # Flip 7
          ]
          for iid in targets:
              d = requests.get(f"https://api.mercadolibre.com/items/{iid}/description", headers=H).json()
              cur = d.get('plain_text','') or ''
              if 'entrada USB' not in cur:
                  new_desc = cur + usb_note
                  r = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
                      headers=H, json={"plain_text": new_desc})
                  print(f"  desc USB {iid}: {r.status_code}")
              else:
                  print(f"  {iid}: ya tiene la nota USB")
          PY
