name: Probe promo types
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, requests, time, json
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Check what promo types a perfume accepts
          test_iid = "MLM2879716551"  # Billie Eilish (new)
          print(f"=== Probe {test_iid} ===\n")
          
          # GET item promo info with app_version variants
          for v in ("v2","v1","vpp","v3"):
              r = requests.get(f"https://api.mercadolibre.com/seller-promotions/items/{test_iid}?app_version={v}", headers=h, timeout=10)
              print(f"GET app_version={v}: [{r.status_code}] {r.text[:500]}")
          
          # Probar otros paths con GET
          for p in [
              f"/seller-promotions/items/{test_iid}/offers?app_version=v2",
              f"/seller-promotions/users/{sid}/items/{test_iid}?app_version=v2",
              f"/seller-promotions/promotions?app_version=v2&seller_id={sid}",
              f"/seller-promotions/users/{sid}?app_version=v2",
          ]:
              r = requests.get(f"https://api.mercadolibre.com{p}", headers=h, timeout=10)
              if r.status_code not in (404,):
                  print(f"\nGET {p}: [{r.status_code}]")
                  print(f"  {r.text[:500]}")
          
          # Probar POST con tipos distintos
          print("\n=== POST with different types ===")
          for ptype in ["DOD","SMART","MARKETPLACE_CAMPAIGN","VOLUME","DEAL","UNHEALTHY_STOCK","PRICE_MATCHING","MANUAL"]:
              b = {"type":ptype,"deal_price":849,
                   "start_date":"2026-04-21T19:00:00.000-06:00","finish_date":"2026-05-21T23:59:59.000-06:00"}
              r = requests.post(f"https://api.mercadolibre.com/seller-promotions/items/{test_iid}?app_version=v2", headers=h, json=b, timeout=10)
              if r.status_code not in (400,) or "Invalid promotion type" not in r.text:
                  print(f"  [{r.status_code}] type={ptype} → {r.text[:200]}")
          PY
