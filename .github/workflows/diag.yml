name: Diag Redmi trad
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          iid = "MLM2877535563"
          r = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=15)
          it = r.json()
          print(f"status={it.get('status')} sub_status={it.get('sub_status')} has_bids={it.get('has_bids')}")
          print(f"price={it.get('price')} catalog_listing={it.get('catalog_listing')}")
          r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=h, json={"price":149}, timeout=15)
          print(f"PUT 149: {r.status_code}")
          print(json.dumps(r.json(), indent=2)[:1200])
          PY
