name: Find Billie Eilish catalog
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          
          queries = [
              "Billie+Eilish+perfume",
              "Eilish+Eau+de+Parfum",
              "perfume+Billie+Eilish+mujer",
              "Billie+Eilish+100ml",
          ]
          seen = set()
          for q in queries:
              print(f"\n=== Query: {q} ===")
              r = requests.get(f"https://api.mercadolibre.com/sites/MLM/search?q={q}&limit=10&category=MLM4088", headers=h, timeout=15)
              # MLM4088 = Belleza y Cuidado Personal, probably broader perfume category
              for it in r.json().get('results',[])[:10]:
                  iid = it.get('id')
                  if iid in seen: continue
                  seen.add(iid)
                  t = it.get('title','').lower()
                  if 'perfume' in t or 'parfum' in t or 'fragancia' in t or 'edp' in t:
                      print(f"  {iid} | ${it.get('price')} | {it.get('category_id')} | {it.get('title','')[:75]}")
                      print(f"    thumb: {it.get('thumbnail','')}")
                      print(f"    cat_pid: {it.get('catalog_product_id')}")
          
          # Also try direct product search with exact name
          print("\n\n=== Direct product search ===")
          r = requests.get("https://api.mercadolibre.com/products/search?site_id=MLM&q=Eilish+Eau+de+Parfum&limit=10", headers=h, timeout=15)
          for p in r.json().get('results',[])[:10]:
              pid = p.get('id')
              nm = p.get('name','')
              if 'perfume' in nm.lower() or 'parfum' in nm.lower() or 'fragancia' in nm.lower():
                  print(f"  {pid} | {nm[:80]}")
                  r2 = requests.get(f"https://api.mercadolibre.com/products/{pid}", headers=h, timeout=10)
                  pd = r2.json()
                  print(f"    status={pd.get('status')} domain={pd.get('domain_id')}")
                  for pic in pd.get('pictures',[])[:2]:
                      print(f"    pic: {pic.get('url') or pic.get('secure_url')}")
          PY
