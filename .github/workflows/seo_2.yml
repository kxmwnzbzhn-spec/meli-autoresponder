name: SEO 2 items relistados (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          def desc(modelo, color, ip, bateria_h, potencia_w, extra=""):
              lines = [
                  f"BOCINA BLUETOOTH JBL {modelo.upper()} COLOR {color.upper()} - USADA EN EXCELENTE ESTADO",
                  "",
                  f"Producto 100% original JBL, practicamente sin uso: solo se abrio y se uso una vez. "
                  f"Se entrega con su caja original y todos sus accesorios originales.",
                  "",
                  "CARACTERISTICAS PRINCIPALES:",
                  f"- Modelo: JBL {modelo} {color}",
                  f"- Potencia: {potencia_w}W RMS",
                  f"- Bateria recargable hasta {bateria_h} horas",
                  f"- Bluetooth 5.3",
                  f"- Resistencia {ip} al agua y polvo",
                  "- Cable USB-C de carga original incluido",
              ]
              if extra: lines.append("- " + extra)
              lines += [
                  "",
                  "IMPORTANTE:",
                  "- Esta unidad NO es compatible con la aplicacion JBL Portable.",
                  "- Su operacion es Bluetooth estandar, un dispositivo a la vez.",
                  "",
                  "CONDICIONES DE VENTA:",
                  "- Envio GRATIS con Mercado Envios a todo Mexico",
                  "- Garantia del vendedor 7 dias",
                  "- Factura electronica a solicitud",
              ]
              return "\n".join(lines)

          targets = [
              ("MLM2874600533", "Bocina Bluetooth JBL Go 4 Portatil Negra Original Usada", "Go 4", "Negro", "IP67", 7, 4.2),
              ("MLM2874538531", "Bocina Bluetooth JBL Go 4 Portatil Camuflaje Original Usada", "Go 4", "Camuflaje", "IP67", 7, 4.2),
          ]
          for iid, title, modelo, color, ip, bat, pow in targets:
              if len(title) > 60:
                  title = title.replace("Bocina Bluetooth","Bocina BT")
              print(f"\n>>> {iid} ({len(title)}): {title}")
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}",
                  headers=H, json={"title": title})
              print(f"  title PUT: {r.status_code}")
              if r.status_code >= 400:
                  try: print(f"   err: {r.json().get('message','')[:200]}")
                  except: pass
              dr = requests.put(f"https://api.mercadolibre.com/items/{iid}/description",
                  headers=H, json={"plain_text": desc(modelo, color, ip, bat, pow)})
              print(f"  desc PUT: {dr.status_code}")
          PY
