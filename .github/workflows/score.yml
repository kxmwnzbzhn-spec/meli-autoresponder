name: Quality score azul (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          item_id = "MLM2874595277"

          it = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
          attrs_total_cat = requests.get(f"https://api.mercadolibre.com/categories/{it['category_id']}/attributes", headers=H).json()

          filled = [a for a in it.get("attributes",[]) if a.get("value_name") or a.get("value_struct") or a.get("values")]
          all_cat = attrs_total_cat  # lista de dicts
          cat_ids = {a["id"]: a for a in all_cat}
          filled_ids = {a["id"] for a in filled}

          # Gap: cuáles requeridos/recomendados siguen vacíos
          gap_req = []
          gap_cat_req = []
          gap_cond_req = []
          gap_other = []
          for a in all_cat:
              aid = a["id"]
              if aid in filled_ids: continue
              tags = a.get("tags") or {}
              if tags.get("read_only") or tags.get("hidden"):
                  continue  # no podemos llenar
              if tags.get("required"): gap_req.append(aid)
              elif tags.get("catalog_required"): gap_cat_req.append(aid)
              elif tags.get("conditional_required"): gap_cond_req.append(aid)
              else: gap_other.append(aid)

          print(f"=== SCORE item {item_id} ===")
          print(f"  Atributos llenos: {len(filled)}")
          print(f"  Atributos totales categoría: {len(all_cat)}")
          print(f"  Cobertura: {len(filled)/len(all_cat)*100:.1f}%")
          print(f"\n  Fotos: {len(it.get('pictures',[]))}")
          print(f"  Status: {it.get('status')}  sub: {it.get('sub_status')}")
          print(f"  Listing: {it.get('listing_type_id')}")
          print(f"  Tags: {it.get('tags')}")
          print(f"  Health: {it.get('health')}")
          print(f"  Title len: {len(it.get('title',''))}")

          print(f"\n  GAP required: {gap_req}")
          print(f"  GAP catalog_required: {gap_cat_req}")
          print(f"  GAP conditional_required: {gap_cond_req}")
          print(f"  GAP recomendados (no llenos, no RO): {len(gap_other)}")
          print(f"    {gap_other[:25]}")

          # Health check endpoint
          hr = requests.get(f"https://api.mercadolibre.com/items/{item_id}/health", headers=H)
          print(f"\n  /items/{item_id}/health status={hr.status_code}")
          if hr.status_code < 400:
              print(json.dumps(hr.json(), indent=2, ensure_ascii=False)[:2000])
          PY
