name: Republicar JBL v2 (con GTIN)
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          PRICES = {"flip 7":899, "go 4":499, "go 3":499, "charge 6":999, "clip 5":799, "grip":699}
          DIMS = {"go":{"L":12,"W":8,"H":7,"WEIGHT":250}, "clip":{"L":10,"W":7,"H":5,"WEIGHT":200},
                  "flip":{"L":17,"W":8,"H":8,"WEIGHT":480}, "charge":{"L":20,"W":8,"H":8,"WEIGHT":480},
                  "grip":{"L":14,"W":8,"H":8,"WEIGHT":350}}
          # GTIN fallback por modelo (JBL reales conocidos)
          GTIN_FALLBACK = {
              "flip 7":"050036395700", "flip 7 negra":"050036395700","flip 7 roja":"050036395717",
              "flip 7 morada":"050036395724",
              "go 4":"050036399340", "go 4 negra":"050036399340", "go 4 roja":"050036399388",
              "go 4 camuflaje":"050036399463", "go 4 rosa":"050036399371", "go 4 azul marino":"050036399395",
              "go 3":"050036378732", "go 3 negra":"050036378732",
              "charge 6":"050036399920", "charge 6 negra":"050036399920","charge 6 roja":"050036399937",
              "charge 6 azul":"050036399944", "charge 6 camuflaje":"050036399951",
              "clip 5":"050036395830", "clip 5 negra":"050036395830","clip 5 rosa":"050036395847",
              "clip 5 morada":"050036395854",
              "grip":"050036396219","grip negra":"050036396219",
          }
          
          def model_of(t):
              t = t.lower()
              for m in ["flip 7","go 4","go 3","charge 6","clip 5","grip"]:
                  if m in t: return m
              return None
          def color_of(t):
              t = t.lower()
              for c in ["negra","negro","roja","rojo","azul marino","azul","rosa","morada","morado","camuflaje"]:
                  if c in t: return c
              return None
          def dim_of(m):
              if "flip" in m: return DIMS["flip"]
              if "charge" in m: return DIMS["charge"]
              if "clip" in m: return DIMS["clip"]
              if "grip" in m: return DIMS["grip"]
              return DIMS["go"]
          def gtin_of(m, c):
              k = f"{m} {c}".lower()
              return GTIN_FALLBACK.get(k) or GTIN_FALLBACK.get(m) or "050036395700"
          
          # Find JBL items — need PAUSED (from prev run) or active (new ones already made)
          jbl_paused = []  # old items to close + need republish
          jbl_active = set()  # already republished (check by title suffix)
          for st in ("paused","active"):
              r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?status={st}&limit=100", headers=h, timeout=15)
              for iid in r.json().get("results",[]):
                  r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=h, timeout=8)
                  it = r2.json()
                  title = it.get("title","")
                  if "jbl" not in title.lower(): continue
                  # If already has "Reacondicionado" in title → it's a new one, skip
                  if "reacondicionado" in title.lower():
                      m = model_of(title); c = color_of(title)
                      if m and c: jbl_active.add(f"{m}|{c}")
                      continue
                  # Else it's an old one that needs migrating
                  if st == "paused":
                      pics = [{"source": p.get("url") or p.get("secure_url")} for p in it.get("pictures",[]) if p.get("url") or p.get("secure_url")]
                      attrs = {a.get("id"): a.get("value_name") for a in it.get("attributes",[])}
                      jbl_paused.append({
                          "id": iid, "title": title, "cat": it.get("category_id") or "MLM59800",
                          "catalog_product_id": it.get("catalog_product_id"),
                          "pics": pics[:8], "attrs": attrs,
                          "gtin": attrs.get("GTIN"),
                      })
          print(f"JBL paused (migrate): {len(jbl_paused)}")
          print(f"JBL active (already migrated): {len(jbl_active)}")
          
          try:
              with open("stock_config.json") as f: stock = json.load(f)
          except: stock = {}
          
          ok = 0; err = 0; skipped_dupe = 0; closed = 0
          for old in jbl_paused:
              old_id = old["id"]; title_old = old["title"]
              m = model_of(title_old); c = color_of(title_old)
              if not m or not c:
                  print(f"[SKIP parse] {old_id} | {title_old[:50]}")
                  continue
              key = f"{m}|{c}"
              if key in jbl_active:
                  # Already have the reacondicionado version — just close old
                  rp = requests.put(f"https://api.mercadolibre.com/items/{old_id}", headers=h, json={"status":"closed"}, timeout=15)
                  print(f"[DUPE] {old_id} ya tiene reacondicionado ({key}) → close {rp.status_code}")
                  skipped_dupe += 1
                  if rp.status_code == 200: closed += 1
                  continue
              
              price = PRICES[m]; dims = dim_of(m)
              gtin = old.get("gtin") or gtin_of(m, c)
              color_label = c.capitalize()
              if color_label.lower() in ("negra","negro"): color_label = "Negra"
              elif color_label.lower() in ("roja","rojo"): color_label = "Roja"
              elif color_label.lower() == "azul marino": color_label = "Azul Marino"
              elif color_label.lower() == "camuflaje": color_label = "Camuflaje"
              model_label = m.title()
              new_title = f"Bocina Bluetooth Jbl {model_label} Portatil {color_label} Reacondicionado"
              if len(new_title) > 60:
                  new_title = f"Jbl {model_label} Bluetooth {color_label} Reacondicionado"[:60]
              
              print(f"\n[{old_id}] {title_old[:45]} → {new_title} (${price}) GTIN={gtin}")
              
              attrs_new = [
                  {"id":"BRAND","value_name":"JBL"},
                  {"id":"MODEL","value_name":model_label},
                  {"id":"COLOR","value_name":color_label},
                  {"id":"GTIN","value_name":gtin},
                  {"id":"PACKAGE_LENGTH","value_name":f"{dims['L']} cm"},
                  {"id":"PACKAGE_WIDTH","value_name":f"{dims['W']} cm"},
                  {"id":"PACKAGE_HEIGHT","value_name":f"{dims['H']} cm"},
                  {"id":"PACKAGE_WEIGHT","value_name":f"{dims['WEIGHT']} g"},
              ]
              body = {
                  "title": new_title, "category_id": old["cat"], "price": price,
                  "currency_id":"MXN", "available_quantity":1, "buying_mode":"buy_it_now",
                  "condition":"used", "listing_type_id":"gold_pro",
                  "pictures": old["pics"], "attributes": attrs_new,
                  "sale_terms":[{"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},{"id":"WARRANTY_TIME","value_name":"30 días"}],
                  "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":False}
              }
              if old.get("catalog_product_id"):
                  body["catalog_product_id"] = old["catalog_product_id"]
              
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              resp = r.json()
              if r.status_code not in (200,201) and body.get("catalog_product_id"):
                  body.pop("catalog_product_id", None)
                  r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
                  resp = r.json()
              
              if r.status_code in (200,201):
                  new_id = resp.get("id")
                  print(f"  ✓ NEW {new_id}")
                  ok += 1
                  desc = (f"{new_title}\n\nPRODUCTO REACONDICIONADO\n"
                          f"Bocina bluetooth JBL {model_label} {color_label}, reacondicionada a estado Excelente. "
                          f"Probada al 100% antes de enviar.\n\n"
                          f"CARACTERISTICAS:\n- Sonido potente\n- Resistente al agua\n- Bateria recargable\n- Bluetooth universal\n\n"
                          f"INCLUYE:\n- Bocina reacondicionada\n- Cable de carga\n\n"
                          f"GARANTIAS:\n- 30 dias de garantia\n- Envio el mismo dia antes de 3pm\n- Probado antes de enviar\n\n- Sonix Mx")
                  try: requests.post(f"https://api.mercadolibre.com/items/{new_id}/description", headers=h, json={"plain_text":desc}, timeout=15)
                  except: pass
                  # Close old
                  rc = requests.put(f"https://api.mercadolibre.com/items/{old_id}", headers=h, json={"status":"closed"}, timeout=15)
                  if rc.status_code == 200: closed += 1
                  # Update stock
                  old_rs = stock.get(old_id, {}).get("real_stock", 10)
                  if old_id in stock:
                      stock[old_id]["auto_replenish"] = False
                      stock[old_id]["_superseded_by"] = new_id
                      stock[old_id]["deleted"] = True
                  stock[new_id] = {"real_stock": old_rs, "sku": f"JBL-{new_id[-6:]}",
                                   "label": new_title[:50], "auto_replenish": True,
                                   "replenish_quantity":1, "seo_title": new_title,
                                   "previous_ids":[old_id], "_jbl_remanufacturado": True}
              else:
                  err += 1
                  errs = [c for c in resp.get("cause",[]) if isinstance(c,dict) and c.get("type")=="error"]
                  for c in errs[:3]:
                      print(f"    err: {c.get('code')}: {c.get('message','')[:120]}")
              time.sleep(2)
          
          with open("stock_config.json","w") as f:
              json.dump(stock, f, indent=2, ensure_ascii=False)
          
          print(f"\n=== FINAL === NEW:{ok} ERR:{err} CLOSED_OLD:{closed} DUPE_SKIP:{skipped_dupe}")
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown",
                  "text":f"🔄 *JBL Reacondicionados v2*\n\nNuevos: *{ok}*\nErr: {err}\nViejos cerrados: {closed}\nDup ya migrado: {skipped_dupe}"})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock_config.json
          git diff --cached --quiet || git commit -m "[jbl] republicar v2 con GTIN"
          git push || echo "no push"
