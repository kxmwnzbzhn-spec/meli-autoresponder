name: Returns sim v2 (one-shot)
on:
  workflow_dispatch:
jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token
      - uses: actions/cache@v4
        with:
          path: .seen_claims.json
          key: seen-state
          restore-keys: seen-state
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RETURNS_BOT_TOKEN: ${{ secrets.TELEGRAM_RETURNS_BOT_TOKEN }}
        run: |
          python3 <<'PY'
          import sys, time
          sys.path.insert(0, ".")
          import meli_autoresponder as M

          state = M.load_state()
          # Limpiar estados previos de test
          rs = state.setdefault("return_states", {})
          for k in list(rs.keys()):
              if k.startswith("TEST-"):
                  del rs[k]

          fake_cid = "TEST-DEV-002"
          fake_claim = {
              "id": fake_cid,
              "reason_id": "product_is_not_original",
              "players": [{"user_id": 999999999}],
          }
          M.start_return_playbook("FAKE_TOKEN", fake_cid, fake_claim, state)
          M.save_json(M.STATE_FILE, state)
          print("STATE after inject:", state.get("return_states",{}).get(fake_cid))
          PY
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: .seen_claims.json
          key: seen-state-${{ github.run_id }}
