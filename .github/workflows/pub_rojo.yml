name: Publish JBL Go 4 Rojo (one-shot)
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, sys
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          pic_ids = []
          for i in range(1, 6):
              path = f"assets/go4_rojo_001/img_{i}.jpg"
              with open(path, "rb") as f:
                  files = {"file": (f"img_{i}.jpg", f, "image/jpeg")}
                  rr = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                      headers={"Authorization": f"Bearer {AT}"}, files=files)
              if rr.status_code >= 400:
                  print(f"[pic] img_{i} ERR {rr.status_code}: {rr.text[:200]}"); sys.exit(1)
              pid = rr.json().get("id")
              pic_ids.append({"id": pid})
              print(f"[pic] img_{i} → {pid}")

          desc = (
              "Bocina JBL Go 4 color rojo en perfecto estado, practicamente sin uso: "
              "solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
              "Producto 100 por ciento original JBL. "
              "IMPORTANTE: este modelo NO es compatible con la aplicacion JBL Portable ni con Auracast; "
              "su operacion es Bluetooth estandar, un dispositivo a la vez. "
              "Sonido potente y claro, bateria en excelente estado, resistencia al agua y polvo IP67, "
              "hasta 7 horas de reproduccion. "
              "Envio seguro con Mercado Envios desde Mexico. Facturamos si se requiere."
          )

          attrs = [
              {"id":"BRAND","value_name":"JBL"},
              {"id":"MODEL","value_name":"Go 4"},
              {"id":"MPN","value_name":"JBLGO4REDAM"},
              {"id":"GTIN","value_name":"050036399371"},
              {"id":"MANUFACTURER","value_name":"Harman International Industries"},
              {"id":"SELLER_SKU","value_name":"JBL-GO4-RED-001"},
              {"id":"COLOR","value_name":"Rojo"},
              {"id":"MAIN_COLOR","value_name":"Rojo"},
              {"id":"ITEM_CONDITION","value_name":"Usado"},
              {"id":"POWER_OUTPUT_RMS","value_name":"4.2 W","value_struct":{"number":4.2,"unit":"W"}},
              {"id":"MIN_FREQUENCY_RESPONSE","value_name":"95 Hz","value_struct":{"number":95,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE","value_name":"20 kHz","value_struct":{"number":20,"unit":"kHz"}},
              {"id":"DISTORTION","value_name":"1 %","value_struct":{"number":1,"unit":"%"}},
              {"id":"SOUND_RANGE","value_name":"10 m","value_struct":{"number":10,"unit":"m"}},
              {"id":"SPEAKERS_NUMBER","value_name":"1"},
              {"id":"SPEAKER_FORMAT","value_name":"Caja"},
              {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
              {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
              {"id":"MAX_BATTERY_AUTONOMY","value_name":"7 h","value_struct":{"number":7,"unit":"h"}},
              {"id":"CHARGE_TIME","value_name":"2.5 h","value_struct":{"number":2.5,"unit":"h"}},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},
              {"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_NFC","value_name":"No"},
              {"id":"WITH_RADIO","value_name":"No"},
              {"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
              {"id":"IS_WATERPROOF","value_name":"Sí"},
              {"id":"IP_CLASSIFICATION","value_name":"IP67"},
              {"id":"IS_DUST_RESISTANT","value_name":"Sí"},
              {"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
              {"id":"IS_PORTABLE","value_name":"Sí"},
              {"id":"WITH_BASE","value_name":"No"},
              {"id":"WITH_LED_LIGHTS","value_name":"No"},
              {"id":"WITH_MICROPHONE","value_name":"No"},
              {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},
              {"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
              {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},
              {"id":"WITH_VOICE_EFFECT","value_name":"No"},
              {"id":"WITH_SCREEN","value_name":"No"},
              {"id":"IS_GAMER","value_name":"No"},
              {"id":"IS_PROFESSIONAL","value_name":"No"},
              {"id":"IS_A_STAGE_MONITOR","value_name":"No"},
              {"id":"INCLUDES_SUPPORT","value_name":"No"},
              {"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
              {"id":"INCLUDES_CHARGER","value_name":"No"},
              {"id":"INCLUDES_WHEELS","value_name":"No"},
              {"id":"INCLUDES_LATCH","value_name":"No"},
              {"id":"HEIGHT","value_name":"7.52 cm","value_struct":{"number":7.52,"unit":"cm"}},
              {"id":"WIDTH","value_name":"9.45 cm","value_struct":{"number":9.45,"unit":"cm"}},
              {"id":"DEPTH","value_name":"4.31 cm","value_struct":{"number":4.31,"unit":"cm"}},
              {"id":"WEIGHT","value_name":"190 g","value_struct":{"number":190,"unit":"g"}},
          ]

          new_item = {
              "title": "JBL Go 4 Bocina Bluetooth Portatil Roja Original Usada",
              "category_id": "MLM59800",
              "price": 299,
              "currency_id": "MXN",
              "available_quantity": 1,
              "buying_mode": "buy_it_now",
              "listing_type_id": "gold_pro",
              "condition": "used",
              "pictures": pic_ids,
              "attributes": attrs,
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"7 días"},
              ],
              "shipping": {"mode":"me2","local_pick_up":False,"free_shipping":False}
          }

          r = requests.post("https://api.mercadolibre.com/items", headers=H, json=new_item)
          print(f"[item] status={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(json.dumps(resp, indent=2, ensure_ascii=False)[:3000]); sys.exit(1)
          new_id = resp["id"]; new_link = resp.get("permalink")
          filled = sum(1 for a in resp.get("attributes",[]) if a.get("value_name") or a.get("value_struct") or a.get("values"))
          print(f"[item] OK id={new_id}")
          print(f"[item] link={new_link}")
          print(f"[item] attrs filled: {filled}")

          dr = requests.put(f"https://api.mercadolibre.com/items/{new_id}/description",
              headers=H, json={"plain_text": desc})
          print(f"[desc] status={dr.status_code}")

          tt = os.environ.get("TELEGRAM_BOT_TOKEN"); tc = os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage",
                  json={"chat_id": tc, "parse_mode":"Markdown",
                        "text": f"🔴 *Publicada JBL Go 4 Rojo*\n\n🆔 `{new_id}`\n💰 $299 usado\nAttrs: {filled}\n🔗 {new_link}"})

          print(f"==NEW_ID={new_id}==")
          PY
