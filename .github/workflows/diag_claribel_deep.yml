name: diag-claribel-deep
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests -q
      - run: |
          python3 - <<'PY'
          import os, json, requests
          API="https://api.mercadolibre.com"
          r = requests.post(f"{API}/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN_CLARIBEL"]
          }, timeout=15).json()
          tok=r.get("access_token"); uid=r.get("user_id")
          print(f"OAuth: tok={'ok' if tok else 'FAIL'} | uid={uid}")
          if not tok: 
              print(json.dumps(r, indent=2))
              raise SystemExit(1)
          h={"Authorization":f"Bearer {tok}"}
          # Print raw response of items/search
          for s in ["active","paused","closed",None]:
              url = f"{API}/users/{uid}/items/search?limit=10"
              if s: url += f"&status={s}"
              j=requests.get(url, headers=h, timeout=15).json()
              print(f"\n=== {url} ===")
              print(json.dumps(j, indent=2)[:1500])

          # Try with seller_id instead of users/{id}
          print("\n\n=== /items/search?seller_id ===")
          j=requests.get(f"{API}/items/search?seller_id={uid}&limit=10", headers=h, timeout=15).json()
          print(json.dumps(j, indent=2)[:1500])

          # Try sites endpoint
          print("\n\n=== /sites/MLM/search?seller_id ===")
          j=requests.get(f"{API}/sites/MLM/search?seller_id={uid}&limit=10", headers=h, timeout=15).json()
          print(f"Total: {j.get('paging',{}).get('total')}")
          for it in j.get("results",[])[:5]:
              print(f"  {it.get('id')}: {it.get('title','')[:60]} status={it.get('status')}")
          PY
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_CLARIBEL: ${{ secrets.MELI_REFRESH_TOKEN_CLARIBEL }}
