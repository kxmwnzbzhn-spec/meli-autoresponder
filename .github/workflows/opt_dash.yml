name: Optimize Dashcam SEO (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}
          iid = "MLM2874596985"

          it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
          cat_id = it.get("category_id")
          print(f"cat: {cat_id}")

          # Ver attrs de la categoría
          cat_attrs = requests.get(f"https://api.mercadolibre.com/categories/{cat_id}/attributes", headers=H).json()
          filled = {a["id"] for a in it.get("attributes",[]) if a.get("value_name") or a.get("value_struct") or a.get("values")}
          print(f"actuales llenos: {len(filled)}  total categoria: {len(cat_attrs)}")

          # Dump applicable
          print("\n=== ATTRS disponibles (non-RO/HID) ===")
          for a in cat_attrs:
              tags = a.get("tags") or {}
              if tags.get("read_only") or tags.get("hidden"): continue
              vals = [v.get("name") for v in (a.get("values") or [])][:6]
              print(f"  {a['id']}|{a.get('name')}|{a.get('value_type')}|vals={vals}")
          PY
