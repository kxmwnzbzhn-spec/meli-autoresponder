name: Publish Rosa + free_shipping all (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, sys
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # === 1. Publicar Rosa ===
          pic_ids = []
          for i in range(1, 6):
              with open(f"assets/go4_rosa_001/img_{i}.jpg","rb") as f:
                  files = {"file": (f"img_{i}.jpg", f, "image/jpeg")}
                  rr = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                      headers={"Authorization": f"Bearer {AT}"}, files=files)
              if rr.status_code >= 400:
                  print(f"[pic] ERR {rr.status_code}: {rr.text[:200]}"); sys.exit(1)
              pic_ids.append({"id": rr.json()["id"]})
              print(f"[pic] img_{i} → {pic_ids[-1]['id']}")

          desc = (
              "Bocina JBL Go 4 color rosa chicle en perfecto estado, practicamente sin uso: "
              "solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
              "Producto 100 por ciento original JBL. "
              "IMPORTANTE: este modelo NO es compatible con la aplicacion JBL Portable ni con Auracast; "
              "su operacion es Bluetooth estandar, un dispositivo a la vez. "
              "Sonido potente y claro, bateria en excelente estado, resistencia al agua y polvo IP67, "
              "hasta 7 horas de reproduccion. Envio gratis con Mercado Envios. Facturamos si se requiere."
          )

          attrs = [
              {"id":"BRAND","value_name":"JBL"},{"id":"MODEL","value_name":"Go 4"},
              {"id":"MPN","value_name":"JBLGO4PKAM"},{"id":"GTIN","value_name":"050036399395"},
              {"id":"MANUFACTURER","value_name":"Harman International Industries"},
              {"id":"SELLER_SKU","value_name":"JBL-GO4-ROSA-001"},
              {"id":"COLOR","value_name":"Rosa chicle"},{"id":"MAIN_COLOR","value_name":"Rosa chicle"},
              {"id":"ITEM_CONDITION","value_name":"Usado"},
              {"id":"POWER_OUTPUT_RMS","value_name":"4.2 W","value_struct":{"number":4.2,"unit":"W"}},
              {"id":"MIN_FREQUENCY_RESPONSE","value_name":"95 Hz","value_struct":{"number":95,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE","value_name":"20 kHz","value_struct":{"number":20,"unit":"kHz"}},
              {"id":"DISTORTION","value_name":"1 %","value_struct":{"number":1,"unit":"%"}},
              {"id":"SOUND_RANGE","value_name":"10 m","value_struct":{"number":10,"unit":"m"}},
              {"id":"SPEAKERS_NUMBER","value_name":"1"},{"id":"SPEAKER_FORMAT","value_name":"Caja"},
              {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
              {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
              {"id":"MAX_BATTERY_AUTONOMY","value_name":"7 h","value_struct":{"number":7,"unit":"h"}},
              {"id":"CHARGE_TIME","value_name":"2.5 h","value_struct":{"number":2.5,"unit":"h"}},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_NFC","value_name":"No"},{"id":"WITH_RADIO","value_name":"No"},
              {"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
              {"id":"IS_WATERPROOF","value_name":"Sí"},{"id":"IP_CLASSIFICATION","value_name":"IP67"},
              {"id":"IS_DUST_RESISTANT","value_name":"Sí"},{"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
              {"id":"IS_PORTABLE","value_name":"Sí"},{"id":"WITH_BASE","value_name":"No"},
              {"id":"WITH_LED_LIGHTS","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"No"},
              {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},{"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
              {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},{"id":"WITH_VOICE_EFFECT","value_name":"No"},
              {"id":"WITH_SCREEN","value_name":"No"},{"id":"IS_GAMER","value_name":"No"},
              {"id":"IS_PROFESSIONAL","value_name":"No"},{"id":"IS_A_STAGE_MONITOR","value_name":"No"},
              {"id":"INCLUDES_SUPPORT","value_name":"No"},{"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
              {"id":"INCLUDES_CHARGER","value_name":"No"},{"id":"INCLUDES_WHEELS","value_name":"No"},
              {"id":"INCLUDES_LATCH","value_name":"No"},
              {"id":"HEIGHT","value_name":"7.52 cm","value_struct":{"number":7.52,"unit":"cm"}},
              {"id":"WIDTH","value_name":"9.45 cm","value_struct":{"number":9.45,"unit":"cm"}},
              {"id":"DEPTH","value_name":"4.31 cm","value_struct":{"number":4.31,"unit":"cm"}},
              {"id":"WEIGHT","value_name":"190 g","value_struct":{"number":190,"unit":"g"}},
          ]

          new_item = {
              "title": "JBL Go 4 Bocina Bluetooth Rosa Chicle Original Usada",
              "category_id": "MLM59800", "price": 299, "currency_id": "MXN",
              "available_quantity": 1, "buying_mode": "buy_it_now",
              "listing_type_id": "gold_pro", "condition": "used",
              "pictures": pic_ids, "attributes": attrs,
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"7 días"},
              ],
              "shipping": {"mode":"me2","local_pick_up":False,"free_shipping":True}
          }

          r = requests.post("https://api.mercadolibre.com/items", headers=H, json=new_item)
          print(f"[rosa] status={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(json.dumps(resp, indent=2, ensure_ascii=False)[:2000]); sys.exit(1)
          rosa_id = resp["id"]
          print(f"[rosa] OK id={rosa_id}  link={resp.get('permalink')}")

          requests.put(f"https://api.mercadolibre.com/items/{rosa_id}/description",
              headers=H, json={"plain_text": desc})

          # === 2. Activar envío gratis en los 4 existentes ===
          existing = [
              ("MLM2874367731","Negro"),
              ("MLM2874595277","Azul Marino"),
              ("MLM2874595625","Rojo"),
              ("MLM5209619690","Camuflaje"),
          ]
          for iid, label in existing:
              r = requests.put(f"https://api.mercadolibre.com/items/{iid}", headers=H,
                  json={"shipping": {"mode":"me2","local_pick_up":False,"free_shipping":True}})
              rj = r.json() if r.headers.get("content-type","").startswith("application/json") else {}
              fs = (rj.get("shipping") or {}).get("free_shipping")
              print(f"[free ship] {iid} {label}: status={r.status_code} free_shipping={fs}")
              if r.status_code >= 400:
                  print(f"  err: {json.dumps(rj, ensure_ascii=False)[:500]}")

          # Telegram
          tt = os.environ.get("TELEGRAM_BOT_TOKEN"); tc = os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage",
                  json={"chat_id": tc, "parse_mode":"Markdown",
                        "text": f"🌸 *Rosa publicada + envio gratis activado*\n\nRosa: `{rosa_id}`\nEnvio gratis aplicado a los 5 listings."})

          print(f"\n==ROSA_ID={rosa_id}==")
          PY
