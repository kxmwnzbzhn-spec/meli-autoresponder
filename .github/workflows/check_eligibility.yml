name: Check catalog eligibility
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          print("=== ALL items (incl. paused/closed, sorted by date) ===")
          # Get ALL items sorted by date_created desc
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?limit=50&search_type=scan", headers=h, timeout=15)
          print(f"status: {r.status_code}")
          ids = r.json().get("results", [])
          print(f"total ids: {len(ids)}")
          # Filter Redmi ones
          for iid in ids:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,status,condition,catalog_listing,catalog_product_id,price,available_quantity,date_created", headers=h, timeout=10)
              it = r.json()
              title = (it.get('title') or '').lower()
              if 'redmi' in title or 'buds' in title:
                  print(f"  {iid} | {it.get('status'):10} | {it.get('condition'):8} | catalog={it.get('catalog_listing')!s:6} | cat_pid={it.get('catalog_product_id')} | ${it.get('price')} qty={it.get('available_quantity')} | {it.get('date_created','')[:10]} | {it.get('title','')[:50]}")
          PY
