name: Check catalog eligibility
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          # Get full eligible list
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?catalog_listing_eligible=true&limit=50", headers=h, timeout=15)
          eligible = r.json().get("results", [])
          print(f"=== {len(eligible)} ELIGIBLE items ===")
          # Detail each
          for iid in eligible:
              r = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,price,catalog_product_id,catalog_listing,condition,category_id,status", headers=h, timeout=10)
              it = r.json()
              print(f"  {iid} | {it.get('status'):8} | {it.get('condition'):8} | {it.get('catalog_listing')!s:6} | cat_pid={it.get('catalog_product_id')} | cat={it.get('category_id')} | ${it.get('price')} | {it.get('title','')[:50]}")
          
          # Also check the item the user wants
          print("\n=== Our Redmi item ===")
          r = requests.get("https://api.mercadolibre.com/items/MLM2874537869?attributes=id,title,price,catalog_product_id,catalog_listing,condition,category_id,status,sold_quantity,has_bids", headers=h, timeout=10)
          print(json.dumps(r.json(), indent=2))
          PY
