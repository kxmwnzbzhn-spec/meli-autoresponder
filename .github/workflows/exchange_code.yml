name: Exchange OAuth code oficial
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests pynacl
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          REPO_PAT: ${{ secrets.REPO_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, base64, urllib.request, urllib.error, requests
          from nacl import encoding, public
          
          CODE = "TG-69e6e26454ac560001169820-3348766821"
          
          # Exchange code for tokens
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"authorization_code",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "code":CODE,
              "redirect_uri":"https://oauth.pstmn.io/v1/callback"
          }, timeout=20)
          print(f"Exchange: {r.status_code}")
          body = r.json()
          if r.status_code != 200:
              print(f"ERR: {body}")
              raise SystemExit(1)
          
          refresh = body["refresh_token"]
          access = body["access_token"]
          print(f"access token len: {len(access)}")
          print(f"refresh token len: {len(refresh)}")
          
          # Verify: GET /users/me
          hv = {"Authorization": f"Bearer {access}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=hv, timeout=15)
          me = r.json()
          print(f"\n=== Cuenta autorizada ===")
          print(f"  nickname: {me.get('nickname')}")
          print(f"  id: {me.get('id')}")
          print(f"  email: {me.get('email')}")
          print(f"  country: {me.get('country_id')}")
          rep = me.get('seller_reputation') or {}
          print(f"  reputation: {rep.get('level_id')}")
          tx = rep.get('transactions') or {}
          print(f"  transactions total: {tx.get('total')}")
          
          # Save refresh_token to GitHub Secrets as MELI_REFRESH_TOKEN_OFICIAL
          # Need PAT (not GITHUB_TOKEN) because secrets API requires it
          pat = os.environ.get("REPO_PAT")
          if not pat:
              print("\n⚠️ REPO_PAT secret no configurado. Voy a imprimir el refresh_token.")
              print(f"\nREFRESH TOKEN (guárdalo manual):\n{refresh}\n")
          else:
              REPO = "kxmwnzbzhn-spec/meli-autoresponder"
              pk_req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
                  headers={"Authorization": f"token {pat}", "Accept":"application/vnd.github+json"})
              pk_data = json.loads(urllib.request.urlopen(pk_req).read())
              pk = public.PublicKey(pk_data["key"].encode(), encoding.Base64Encoder())
              sealed = public.SealedBox(pk)
              enc = base64.b64encode(sealed.encrypt(refresh.encode())).decode()
              put_req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/MELI_REFRESH_TOKEN_OFICIAL",
                  data=json.dumps({"encrypted_value":enc,"key_id":pk_data["key_id"]}).encode(),
                  method="PUT",
                  headers={"Authorization":f"token {pat}","Accept":"application/vnd.github+json"})
              try:
                  r2 = urllib.request.urlopen(put_req)
                  print(f"\n✓ MELI_REFRESH_TOKEN_OFICIAL guardado: {r2.status}")
              except urllib.error.HTTPError as e:
                  print(f"\n✗ Save secret err: {e.code} {e.read()[:200]}")
          
          # Notify Telegram
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"✓ *Cuenta Oficial autorizada*\n\n"
              m += f"Nickname: `{me.get('nickname')}`\n"
              m += f"ID: `{me.get('id')}`\n"
              m += f"Reputación: {rep.get('level_id')}\n"
              m += f"Transacciones: {tx.get('total',0)}"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
