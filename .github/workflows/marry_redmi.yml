name: Marry Redmi catalog + traditional
on: {workflow_dispatch: {}}
permissions:
  contents: write
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}", "Content-Type":"application/json"}
          
          OLD = "MLM2874537869"
          CATALOG_ITEM = "MLM2877711851"
          PROD = "MLM2014404762"
          PRICE = 149
          GTIN = "6941812721032"
          
          # 1) OLD: try forceful removal
          print(f"=== STEP 1: Try removing {OLD} ===")
          r = requests.get(f"https://api.mercadolibre.com/items/{OLD}", headers=h, timeout=15)
          print(f"current status: {r.json().get('status')} sub_status: {r.json().get('sub_status')}")
          
          # 2) Verify catalog
          r = requests.get(f"https://api.mercadolibre.com/items/{CATALOG_ITEM}", headers=h, timeout=20)
          ci = r.json()
          print(f"Catalog {CATALOG_ITEM}: status={ci.get('status')} ${ci.get('price')}")
          
          # 3) Create traditional with short title (<=60)
          pic_ids = [{"id": p.get('id')} for p in ci.get('pictures',[]) if p.get('id')][:8]
          # Title: 57 chars
          title = "Xiaomi Redmi Buds 4 Lite Audifonos Bluetooth Negro Nuevo"
          assert len(title) <= 60, f"len={len(title)}"
          
          body = {
              "title": title,
              "category_id": "MLM5072",
              "price": PRICE,
              "currency_id": "MXN",
              "available_quantity": 1,
              "buying_mode": "buy_it_now",
              "condition": "new",
              "listing_type_id": "gold_pro",
              "pictures": pic_ids,
              "attributes": [
                  {"id":"BRAND","value_name":"Xiaomi"},
                  {"id":"LINE","value_name":"Redmi"},
                  {"id":"MODEL","value_name":"Redmi Buds 4 Lite"},
                  {"id":"COLOR","value_name":"Negro"},
                  {"id":"GTIN","value_name":GTIN},
                  {"id":"ITEM_CONDITION","value_name":"Nuevo"},
              ],
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"30 días"}
              ],
              "shipping": {"mode":"me2","local_pick_up":False,"free_shipping":False}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
          resp = r.json()
          print(f"\nPOST tradicional: {r.status_code}")
          new_id = None
          if r.status_code in (200,201):
              new_id = resp.get("id")
              print(f"✓ TRADICIONAL: {new_id}")
              print(f"  permalink: {resp.get('permalink')}")
              # Add description
              desc = "Audífonos bluetooth inalámbricos Xiaomi Redmi Buds 4 Lite Negro. Producto nuevo y original. Incluye caja, manual y cable de carga. Garantía del vendedor 30 días."
              rd = requests.post(f"https://api.mercadolibre.com/items/{new_id}/description",
                  headers=h, json={"plain_text":desc}, timeout=15)
              print(f"  description: {rd.status_code}")
          else:
              for c in resp.get("cause",[])[:10]:
                  t = c.get('type','?')
                  print(f"  [{t}] {c.get('code')} | {c.get('message','')[:140]}")
          
          # 4) State
          state = {
              "_comment": "Casadas: catalog + tradicional. Bot sincroniza precio.",
              PROD: {
                  "catalog_item_id": CATALOG_ITEM,
                  "traditional_item_id": new_id,
                  "label": "Redmi Buds 4 Lite Negro",
                  "floor": 120,
                  "step": 10,
                  "last_price": PRICE,
                  "active": True,
                  "floor_alerted": False,
                  "sync_price_to_traditional": True,
                  "sync_stock": True
              }
          }
          with open("catalog_listings.json","w") as f:
              json.dump(state, f, indent=2, ensure_ascii=False)
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"💍 *Redmi Buds 4 Lite — casadas*\n\n"
              m += f"🎯 Catálogo: `{CATALOG_ITEM}` ${PRICE}\n"
              if new_id:
                  m += f"📦 Tradicional: `{new_id}` ${PRICE} (título limpio)\n"
              else:
                  m += f"⚠️ Tradicional no creada aún\n"
              m += f"❌ Vieja `{OLD}`: under_review (MELI revisando)\n\nFloor \\$120 | Step \\$10"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add catalog_listings.json
          git diff --cached --quiet || git commit -m "[catalog] marry Redmi tradicional"
          git push || echo "nothing"
