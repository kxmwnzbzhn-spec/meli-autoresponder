name: Marry Redmi catalog + traditional
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}", "Content-Type":"application/json"}
          
          OLD = "MLM2874537869"
          CATALOG_ITEM = "MLM2877711851"
          PROD = "MLM2014404762"
          PRICE = 149
          GTIN = "6941812721032"  # Xiaomi Redmi Buds 4 Lite Negro
          
          # 1) OLD is under_review — try delete via DELETE method; also try sub_status
          print(f"=== STEP 1: Try removing {OLD} ===")
          r = requests.delete(f"https://api.mercadolibre.com/items/{OLD}", headers=h, timeout=20)
          print(f"DELETE: {r.status_code} {r.text[:200]}")
          # If DELETE not supported, try setting deleted sub_status
          r = requests.put(f"https://api.mercadolibre.com/items/{OLD}", headers=h,
                          json={"deleted":"true"}, timeout=20)
          print(f"PUT deleted=true: {r.status_code} {r.text[:200]}")
          
          # 2) Verify catalog OK
          print(f"\n=== STEP 2: Catalog item {CATALOG_ITEM} ===")
          r = requests.get(f"https://api.mercadolibre.com/items/{CATALOG_ITEM}", headers=h, timeout=20)
          ci = r.json()
          print(f"  status={ci.get('status')} price=${ci.get('price')}")
          
          # 3) Create traditional - WITHOUT catalog_product_id, with GTIN, clean "new" title
          print(f"\n=== STEP 3: Create traditional (clean, sin catalog) ===")
          pic_ids = [{"id": p.get('id')} for p in ci.get('pictures',[]) if p.get('id')][:8]
          
          body = {
              "title": "Audifonos Bluetooth Xiaomi Redmi Buds 4 Lite Negros Originales Nuevos",
              "category_id": "MLM5072",
              "price": PRICE,
              "currency_id": "MXN",
              "available_quantity": 1,
              "buying_mode": "buy_it_now",
              "condition": "new",
              "listing_type_id": "gold_pro",
              "pictures": pic_ids,
              "attributes": [
                  {"id":"BRAND","value_name":"Xiaomi"},
                  {"id":"LINE","value_name":"Redmi"},
                  {"id":"MODEL","value_name":"Redmi Buds 4 Lite"},
                  {"id":"COLOR","value_name":"Negro"},
                  {"id":"GTIN","value_name":GTIN},
                  {"id":"ITEM_CONDITION","value_name":"Nuevo"},
              ],
              "sale_terms": [
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"30 días"}
              ],
              "shipping": {"mode":"me2","local_pick_up":False,"free_shipping":False}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
          resp = r.json()
          print(f"  POST: {r.status_code}")
          new_id = None
          if r.status_code in (200,201):
              new_id = resp.get("id")
              print(f"  ✓ TRADICIONAL: {new_id}")
              print(f"  permalink: {resp.get('permalink')}")
          else:
              for c in resp.get("cause",[])[:8]:
                  print(f"  err: {c.get('code')} | {c.get('message','')[:140]}")
          
          # 4) Update catalog_listings.json
          state = {
              "_comment": "Casadas: catalog + tradicional sincronizadas. Bot vigila precio del catalogo y replica al tradicional.",
              PROD: {
                  "catalog_item_id": CATALOG_ITEM,
                  "traditional_item_id": new_id,
                  "label": "Redmi Buds 4 Lite Negro",
                  "floor": 120,
                  "step": 10,
                  "last_price": PRICE,
                  "active": True,
                  "floor_alerted": False,
                  "sync_price_to_traditional": True,
                  "sync_stock": True
              }
          }
          with open("catalog_listings.json","w") as f:
              json.dump(state, f, indent=2, ensure_ascii=False)
          
          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              m = f"💍 *Redmi Buds 4 Lite — casadas*\n\n"
              m += f"🎯 Catálogo: `{CATALOG_ITEM}` ${PRICE}\n"
              if new_id:
                  m += f"📦 Tradicional: `{new_id}` ${PRICE} (sin catalog_product_id, titulo limpio)\n"
              else:
                  m += f"⚠️ Tradicional NO creada\n"
              m += f"❌ Vieja `{OLD}`: en under_review (MELI revisando, no modificable)\n"
              m += f"\nBot va a sincronizar precio entre las dos. Floor \\$120 | Step \\$10"
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={"chat_id":tc,"parse_mode":"Markdown","text":m})
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add catalog_listings.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "[catalog] marry Redmi"
          git push || echo "nothing to push"
