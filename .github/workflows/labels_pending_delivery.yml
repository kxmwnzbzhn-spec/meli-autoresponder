name: labels-pending-delivery
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 06:00 CDMX (todos los días)
permissions: { contents: write }
concurrency:
  group: labels-pending
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.REPO_PAT }}' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests openpyxl pypdf -q
      - run: python scripts/labels_pending_delivery.py
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          MELI_REFRESH_TOKEN_CLARIBEL: ${{ secrets.MELI_REFRESH_TOKEN_CLARIBEL }}
          MELI_REFRESH_TOKEN_ASVA: ${{ secrets.MELI_REFRESH_TOKEN_ASVA }}
          MELI_REFRESH_TOKEN_RAYMUNDO: ${{ secrets.MELI_REFRESH_TOKEN_RAYMUNDO }}
          MELI_REFRESH_TOKEN_DILCIE: ${{ secrets.MELI_REFRESH_TOKEN_DILCIE }}
          MELI_REFRESH_TOKEN_MILDRED: ${{ secrets.MELI_REFRESH_TOKEN_MILDRED }}
          MELI_REFRESH_TOKEN_BREN: ${{ secrets.MELI_REFRESH_TOKEN_BREN }}
          MELI_REFRESH_TOKEN_YC_NEW: ${{ secrets.MELI_REFRESH_TOKEN_YC_NEW }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Build merged PDF + send to Telegram
        run: |
          python3 - <<'PY'
          import glob, os, requests
          from pypdf import PdfWriter
          dirs = sorted(glob.glob("labels_pending_*"), reverse=True)
          if not dirs:
              print("No labels folder")
              raise SystemExit(0)
          d = dirs[0]
          out = f"TODAS_{d}.pdf"
          w = PdfWriter()
          pdfs = sorted(glob.glob(f"{d}/*.pdf"))
          unicos = [p for p in pdfs if "MIXTO" not in p]
          mixtos = [p for p in pdfs if "MIXTO" in p]
          for p in unicos + mixtos:
              w.append(p)
          if len(unicos + mixtos) == 0:
              print("No PDFs to merge")
              raise SystemExit(0)
          with open(out, "wb") as f:
              w.write(f)
          print(f"Merged {len(unicos+mixtos)} PDFs into {out}")

          tg_token = os.environ.get("TELEGRAM_BOT_TOKEN")
          tg_chat = os.environ.get("TELEGRAM_CHAT_ID")
          if tg_token and tg_chat:
              with open(out, "rb") as f:
                  r = requests.post(
                      f"https://api.telegram.org/bot{tg_token}/sendDocument",
                      data={"chat_id": tg_chat, "caption": f"📦 Etiquetas {d}\n{len(unicos+mixtos)} envíos"},
                      files={"document": (out, f, "application/pdf")},
                      timeout=60,
                  )
                  print("TG:", r.status_code, r.text[:200])
          PY
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: labels-${{ github.run_id }}
          path: |
            labels_pending_*/
            TODAS_labels_pending_*.pdf
      - name: Commit labels to repo
        run: |
          git config user.email b@b.com
          git config user.name bot
          for i in 1 2 3 4 5; do
            git pull --rebase 2>/dev/null || true
            git add -A labels_pending_* TODAS_labels_pending_*.pdf 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "Nothing to commit"
              break
            fi
            git commit -m "Etiquetas corte 6am" && git push origin main && break
            sleep $((RANDOM % 8 + 3))
          done
