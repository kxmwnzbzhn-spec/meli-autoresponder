name: Probe Mercado Ads API
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, requests, time, json
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          me = r.json(); sid = me["id"]
          print(f"=== {me.get('nickname')} ({sid}) ===")
          print(f"Reputation: {me.get('seller_reputation',{}).get('level_id')}")
          print(f"Power seller: {me.get('seller_reputation',{}).get('power_seller_status')}")
          
          # Probe ad-related endpoints
          endpoints = [
              f"/advertising/product_ads/campaigns",
              f"/advertising/product_ads/campaigns?user_id={sid}",
              f"/advertising/display_ads/campaigns",
              f"/advertising/brand_ads/campaigns",
              f"/advertising/items/search?user_id={sid}",
              f"/advertising/product_ads/items?user_id={sid}&limit=10",
              f"/advertising/product_ads/auctions",
              f"/advertising/users/{sid}",
              f"/advertising/advertiser/{sid}",
              f"/advertising/credits",
              f"/advertising/credits/{sid}",
              f"/advertising/budgets",
              f"/marketplace/seller/{sid}/advertising",
              f"/users/{sid}/advertising",
              f"/advertisers/{sid}",
              f"/advertising/product_ads/keywords",
              # Mercado Ads (Product Ads v2)
              f"/advertising/product_ads/v2/campaigns?advertiser_id={sid}",
              f"/advertising/product_ads/v3/campaigns?advertiser_id={sid}",
              # Brand ads
              f"/marketplace/advertisers",
              # Analytics
              f"/advertising/product_ads/metrics?advertiser_id={sid}",
              # Self-service Ad status
              f"/ads/status/{sid}",
              f"/users/{sid}/ads/status",
          ]
          for path in endpoints:
              try:
                  r = requests.get(f"https://api.mercadolibre.com{path}", headers=h, timeout=10)
                  if r.status_code != 404:
                      body_snip = r.text[:200].replace('\n',' ')
                      print(f"\n  [{r.status_code}] {path}")
                      print(f"     {body_snip}")
              except Exception as e:
                  pass
          
          # Check MELI ads documentation endpoint
          print("\n=== Ad eligibility probe ===")
          for iid in ["MLM2880426761", "MLM2880426775"]:  # Some JBL Reacondicionado
              r = requests.get(f"https://api.mercadolibre.com/advertising/items/{iid}", headers=h, timeout=8)
              if r.status_code != 404:
                  print(f"  /advertising/items/{iid}: {r.status_code}")
                  print(f"    {r.text[:250]}")
          PY
