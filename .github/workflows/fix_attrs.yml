name: Fix attrs and stock=1 (one-shot)
on:
  workflow_dispatch:
    inputs:
      item_id:
        required: true
        type: string
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          ITEM_ID: ${{ inputs.item_id }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}
          item_id = os.environ["ITEM_ID"]

          # Atributos number_unit con AMBOS value_name + value_struct
          number_attrs = [
              {"id":"POWER_OUTPUT_RMS",       "value_name":"4.2 W",     "value_struct":{"number":4.2,"unit":"W"}},
              {"id":"MAX_BATTERY_AUTONOMY",   "value_name":"7 h",       "value_struct":{"number":7,"unit":"h"}},
              {"id":"CHARGE_TIME",            "value_name":"2.5 h",     "value_struct":{"number":2.5,"unit":"h"}},
              {"id":"MIN_FREQUENCY_RESPONSE", "value_name":"95 Hz",     "value_struct":{"number":95,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE", "value_name":"20 kHz",    "value_struct":{"number":20,"unit":"kHz"}},
              {"id":"DISTORTION",             "value_name":"1 %",       "value_struct":{"number":1,"unit":"%"}},
              {"id":"SOUND_RANGE",            "value_name":"10 m",      "value_struct":{"number":10,"unit":"m"}},
              {"id":"HEIGHT",                 "value_name":"7.52 cm",   "value_struct":{"number":7.52,"unit":"cm"}},
              {"id":"WIDTH",                  "value_name":"9.45 cm",   "value_struct":{"number":9.45,"unit":"cm"}},
              {"id":"DEPTH",                  "value_name":"4.31 cm",   "value_struct":{"number":4.31,"unit":"cm"}},
              {"id":"WEIGHT",                 "value_name":"190 g",     "value_struct":{"number":190,"unit":"g"}},
          ]

          # Stock 1 + atributos numéricos
          payload = {
              "available_quantity": 1,
              "attributes": number_attrs
          }
          r = requests.put(f"https://api.mercadolibre.com/items/{item_id}", headers=H, json=payload)
          print(f"[update] status={r.status_code}")
          rj = r.json()
          if r.status_code >= 400:
              print(json.dumps(rj, indent=2, ensure_ascii=False)[:2500])
          else:
              print(f"[update] OK stock={rj.get('available_quantity')}")
              # Contar attrs con valores reales (no None)
              filled = sum(1 for a in rj.get('attributes',[]) if a.get('value_name') or a.get('value_struct'))
              print(f"[update] attributes filled: {filled}")
          PY
