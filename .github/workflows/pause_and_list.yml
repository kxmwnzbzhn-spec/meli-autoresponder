name: Pause Sauvage + list accreditation
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, time
          def get_tok():
              for _ in range(3):
                  r = requests.post("https://api.mercadolibre.com/oauth/token", data={
                      "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                      "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
                  }, timeout=20)
                  b = r.json()
                  if r.status_code == 200 and "access_token" in b: return b["access_token"]
                  time.sleep(5)
              raise Exception("auth")
          tok = get_tok(); h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          # Pause Sauvage wrong photos
          r = requests.put("https://api.mercadolibre.com/items/MLM5221358592", headers=h, json={"status":"paused"}, timeout=15)
          print(f"Pause MLM5221358592: {r.status_code}")
          
          # Fetch the 69 items that need accreditation
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          r = requests.get(f"https://api.mercadolibre.com/users/{sid}/items/search?filters=UNDER_REVIEW_ACCREDITATION_REQUIRED&limit=100", headers=h, timeout=20)
          ids = r.json().get("results", [])
          print(f"\n=== {len(ids)} items UNDER_REVIEW_ACCREDITATION_REQUIRED ===\n")
          for iid in ids:
              r2 = requests.get(f"https://api.mercadolibre.com/items/{iid}?attributes=id,title,status,price", headers=h, timeout=5)
              it = r2.json()
              print(f"  {iid} [{it.get('status')}] ${it.get('price')} | {it.get('title','')[:60]}")
          PY
