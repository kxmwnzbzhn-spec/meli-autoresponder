name: Publish JBL Grip Negra (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests pillow
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests, io, sys
          from PIL import Image
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Buscar JBL Grip Negro en catalog
          print("=== Buscando JBL Grip Negro ===")
          s = requests.get("https://api.mercadolibre.com/products/search",
              params={"site_id":"MLM","q":"JBL Grip Negro","limit":20}, headers=H).json()
          best = None
          for r in s.get('results',[])[:20]:
              rid = r.get('id')
              pr = requests.get(f"https://api.mercadolibre.com/products/{rid}", headers=H).json()
              col=None; mod=None
              for a in pr.get('attributes',[]):
                  if a.get('id') == 'COLOR': col = a.get('value_name')
                  if a.get('id') == 'MODEL': mod = a.get('value_name')
              n = r.get('name','').lower()
              pics = len(pr.get('pictures',[]))
              if pics >= 3 and 'grip' in n and ((col or '').lower() in ('negro','black') or 'negro' in n):
                  print(f"  {rid}: {r.get('name','')[:80]} color={col} pics={pics}")
                  if best is None or pics > best['pics']:
                      best = {"id":rid, "pics":pics}
          if not best:
              print("ERR no encontrado"); sys.exit(1)
          print(f"BEST: {best}")

          # Subir fotos
          pr = requests.get(f"https://api.mercadolibre.com/products/{best['id']}", headers=H).json()
          urls = [p.get('url') or p.get('secure_url') for p in pr.get('pictures',[])]
          pic_ids = []
          for u in urls[:11]:
              try:
                  u2 = u.replace("-F.jpg","-O.jpg")
                  rr = requests.get(u2, timeout=15)
                  if rr.status_code != 200 or len(rr.content) < 3000:
                      rr = requests.get(u, timeout=15)
                  im = Image.open(io.BytesIO(rr.content))
                  if im.mode != "RGB":
                      if im.mode in ("RGBA","LA","P"):
                          bg = Image.new("RGB", im.size, (255,255,255))
                          if im.mode == "P": im = im.convert("RGBA")
                          bg.paste(im, mask=im.split()[-1] if im.mode in ("RGBA","LA") else None)
                          im = bg
                      else: im = im.convert("RGB")
                  w,h = im.size; ss = min(1200/w, 1200/h)
                  nw, nh = int(w*ss), int(h*ss)
                  im = im.resize((nw,nh), Image.LANCZOS)
                  c = Image.new("RGB", (1200,1200), (255,255,255))
                  c.paste(im, ((1200-nw)//2,(1200-nh)//2))
                  buf = io.BytesIO(); c.save(buf, "JPEG", quality=92)
                  up = requests.post("https://api.mercadolibre.com/pictures/items/upload",
                      headers={"Authorization": f"Bearer {AT}"}, files={"file":("p.jpg",buf.getvalue(),"image/jpeg")})
                  if up.status_code < 400: pic_ids.append({"id": up.json()["id"]})
              except Exception as e:
                  print(f"pic err: {e}")
          print(f"fotos subidas: {len(pic_ids)}")

          title = "JBL Grip Bocina Bluetooth Portatil Negra Original Usada"
          print(f"title ({len(title)}): {title}")

          desc = (
              "Bocina JBL Grip color negro en excelente estado, practicamente sin uso: "
              "solo se abrio y se uso una vez. Se entrega con su caja original y todos sus accesorios originales. "
              "Producto 100 por ciento original JBL. "
              "IMPORTANTE: esta unidad NO es compatible con la aplicacion JBL Portable; "
              "su operacion es Bluetooth estandar. "
              "Mosqueton integrado, sonido claro y potente, bateria de larga duracion, "
              "resistencia IP67 al agua y al polvo, Bluetooth 5.3. "
              "Envio GRATIS con Mercado Envios desde Mexico. Facturamos si se requiere."
          )

          attrs = [
              {"id":"BRAND","value_name":"JBL"},{"id":"MODEL","value_name":"Grip"},
              {"id":"MPN","value_name":"JBLGRIPBLKAM"},{"id":"GTIN","value_name":"050036399999"},
              {"id":"MANUFACTURER","value_name":"Harman International Industries"},
              {"id":"SELLER_SKU","value_name":"JBL-GRIP-NGR-001"},
              {"id":"COLOR","value_name":"Negro"},{"id":"MAIN_COLOR","value_name":"Negro"},
              {"id":"ITEM_CONDITION","value_name":"Usado"},
              {"id":"POWER_OUTPUT_RMS","value_name":"10 W","value_struct":{"number":10,"unit":"W"}},
              {"id":"MIN_FREQUENCY_RESPONSE","value_name":"100 Hz","value_struct":{"number":100,"unit":"Hz"}},
              {"id":"MAX_FREQUENCY_RESPONSE","value_name":"20 kHz","value_struct":{"number":20,"unit":"kHz"}},
              {"id":"SOUND_RANGE","value_name":"15 m","value_struct":{"number":15,"unit":"m"}},
              {"id":"SPEAKERS_NUMBER","value_name":"1"},{"id":"SPEAKER_FORMAT","value_name":"Caja"},
              {"id":"SPEAKER_FILTER_TYPES","value_name":"Pasivo"},
              {"id":"POWER_SUPPLY_TYPES","value_name":"Batería"},
              {"id":"MAX_BATTERY_AUTONOMY","value_name":"12 h","value_struct":{"number":12,"unit":"h"}},
              {"id":"CHARGE_TIME","value_name":"3 h","value_struct":{"number":3,"unit":"h"}},
              {"id":"INCLUDES_RECHARGEABLE_BATTERY","value_name":"Sí"},
              {"id":"BATTERY_TYPE","value_name":"Ion de litio"},
              {"id":"WITH_BLUETOOTH","value_name":"Sí"},{"id":"WITH_WI_FI","value_name":"No"},
              {"id":"WITH_NFC","value_name":"No"},{"id":"WITH_RADIO","value_name":"No"},
              {"id":"IS_WIRELESS","value_name":"Sí"},
              {"id":"OS_COMPATIBLES","values":[{"name":"Android"},{"name":"iOS"},{"name":"Windows"},{"name":"macOS"}]},
              {"id":"IS_WATERPROOF","value_name":"Sí"},{"id":"IP_CLASSIFICATION","value_name":"IP67"},
              {"id":"IS_DUST_RESISTANT","value_name":"Sí"},{"id":"IS_SUITABLE_FOR_OUTDOOR_USE","value_name":"Sí"},
              {"id":"IS_PORTABLE","value_name":"Sí"},{"id":"WITH_BASE","value_name":"No"},
              {"id":"WITH_LED_LIGHTS","value_name":"No"},{"id":"WITH_MICROPHONE","value_name":"No"},
              {"id":"WITH_HANDS_FREE_MODE","value_name":"No"},{"id":"WITH_INTEGRATED_DJ_CONTROLLERS","value_name":"No"},
              {"id":"WITH_KARAOKE_FUNCTION","value_name":"No"},{"id":"WITH_VOICE_EFFECT","value_name":"No"},
              {"id":"WITH_SCREEN","value_name":"No"},{"id":"IS_GAMER","value_name":"No"},
              {"id":"IS_PROFESSIONAL","value_name":"No"},{"id":"IS_A_STAGE_MONITOR","value_name":"No"},
              {"id":"INCLUDES_SUPPORT","value_name":"No"},{"id":"INCLUDES_REMOTE_CONTROL","value_name":"No"},
              {"id":"INCLUDES_CHARGER","value_name":"No"},{"id":"INCLUDES_WHEELS","value_name":"No"},
              {"id":"INCLUDES_LATCH","value_name":"Sí"},
              {"id":"HEIGHT","value_name":"14.5 cm","value_struct":{"number":14.5,"unit":"cm"}},
              {"id":"WIDTH","value_name":"9 cm","value_struct":{"number":9,"unit":"cm"}},
              {"id":"DEPTH","value_name":"5 cm","value_struct":{"number":5,"unit":"cm"}},
              {"id":"WEIGHT","value_name":"250 g","value_struct":{"number":250,"unit":"g"}},
          ]

          item = {
              "title":title,"category_id":"MLM59800","price":399,"currency_id":"MXN",
              "available_quantity":1,"buying_mode":"buy_it_now",
              "listing_type_id":"gold_pro","condition":"used",
              "pictures":pic_ids,"attributes":attrs,
              "sale_terms":[
                  {"id":"WARRANTY_TYPE","value_name":"Garantía del vendedor"},
                  {"id":"WARRANTY_TIME","value_name":"7 días"},
              ],
              "shipping":{"mode":"me2","local_pick_up":False,"free_shipping":True}
          }
          r = requests.post("https://api.mercadolibre.com/items", headers=H, json=item)
          print(f"POST={r.status_code}")
          resp = r.json()
          if r.status_code >= 400:
              print(json.dumps(resp, ensure_ascii=False)[:1500]); sys.exit(1)
          nid = resp["id"]
          requests.put(f"https://api.mercadolibre.com/items/{nid}/description",
              headers=H, json={"plain_text": desc})
          print(f"OK {nid} {resp.get('permalink')}")

          tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
          if tt and tc:
              requests.post(f"https://api.telegram.org/bot{tt}/sendMessage",
                  json={"chat_id":tc,"parse_mode":"Markdown",
                        "text":f"🆕 *JBL Grip Negra publicada*\n\n🆔 `{nid}`\n💰 $399\n🔗 {resp.get('permalink')}"})
          PY
