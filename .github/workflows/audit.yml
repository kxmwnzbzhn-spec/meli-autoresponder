name: Audit Flip7 + Charge6 Negro (one-shot)
on: { workflow_dispatch: {} }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          for iid in ["MLM5209620060","MLM5209619958"]:
              it = requests.get(f"https://api.mercadolibre.com/items/{iid}", headers=H).json()
              print(f"\n=== {iid} ===")
              print(f"  title: {it.get('title','')}")
              print(f"  status: {it.get('status')}  sub: {it.get('sub_status')}")
              print(f"  price: ${it.get('price')}")
              print(f"  stock/sold: {it.get('available_quantity')}/{it.get('sold_quantity')}")
              print(f"  pictures: {len(it.get('pictures',[]))}")
              for p in it.get('pictures',[])[:3]:
                  print(f"    {p.get('url') or p.get('secure_url')}")
              # attrs clave
              for a in it.get('attributes',[]) or []:
                  if a.get('id') in ('COLOR','MAIN_COLOR','MODEL','BRAND','MPN','IP_CLASSIFICATION','MAX_BATTERY_AUTONOMY','POWER_OUTPUT_RMS'):
                      print(f"    {a.get('id')} = {a.get('value_name')}")
              # obtener descripcion
              d = requests.get(f"https://api.mercadolibre.com/items/{iid}/description", headers=H).json()
              desc = (d.get('plain_text') or '')[:200]
              print(f"  desc: {desc}")
              # shipping
              sh = it.get('shipping') or {}
              print(f"  shipping: mode={sh.get('mode')} free={sh.get('free_shipping')}")
          PY
