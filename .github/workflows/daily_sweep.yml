name: Daily sweep - Qs + summary
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests, unicodedata, re
          from datetime import datetime, timedelta, timezone
          
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          r = requests.get("https://api.mercadolibre.com/users/me", headers=h, timeout=15)
          sid = r.json()["id"]
          
          def norm(s):
              s = (s or "").lower()
              s = unicodedata.normalize("NFD", s)
              return "".join(c for c in s if unicodedata.category(c) != "Mn")
          
          # 1) Answer all pending with expanded templates
          templates = [
              (["^hola$","^buenas$","^buen dia$","^saludos$","^hey$","^info$","^informes$","^informacion$","^ola$"],
               "Hola! Claro, con gusto te ayudo. ¿Qué duda tienes sobre el producto?"),
              (["disponible","sigue disponible","tienes stock","hay stock","cuantas hay","aun tienes"],
               "Hola! Sí, está disponible con envío inmediato. Saludos!"),
              (["cuanto tarda","tiempo de envio","cuando llega","llegaria","envio rapido","tarda mucho"],
               "Hola! Enviamos el mismo día si compras antes de las 3pm. Tiempo estimado: 1-3 días hábiles. Saludos!"),
              (["envio gratis","tiene envio","cuanto cuesta el envio","costo de envio","envio a domicilio"],
               "Hola! El envío lo calcula MercadoLibre según tu CP. Checa en 'Calcular costo de envío'. Saludos!"),
              (["caja","empaque","con caja"],
               "Hola! Sí, viene con su caja original. Accesorios incluidos: cable de carga y manual."),
              (["fotos","foto","mas foto","otra foto","imagen","marcas visibles"],
               "Hola! Las fotos del anuncio son reales del producto exacto. Si necesitas una específica dime y te la tomo."),
              (["es original","original","autentico","autentica","pirata","clon","copia"],
               "Hola! Sí, es 100% original, producto auténtico."),
              (["garantia","garantiza","si se descompone","devolucion si falla"],
               "Hola! Tiene 30 días de garantía del vendedor. Si algo falla lo resolvemos."),
              (["es nuevo","nueva","esta nuevo","viene nuevo","usado","seminuevo","que problema","como esta","condicion"],
               "Hola! La condición está en el anuncio. Probado y 100% funcional antes de enviar. Solo marcas estéticas normales de uso."),
              (["enciende","prende","funciona","se escucha","reproduce","suena"],
               "Hola! Sí, enciende y funciona al 100%. Probado antes de enviar."),
              (["mas barato","descuento","rebaja","oferta","precio especial","bajas el precio","ultimo precio"],
               "Hola! El precio mostrado ya es nuestro mejor precio."),
              (["factura","facturar","tiene factura","dan factura"],
               "Hola! Sí, facturamos. Al confirmar envía tus datos fiscales por mensaje."),
              (["color","que color","que tonos","colores disponibles"],
               "Hola! El color es el que aparece en el título y las fotos del anuncio."),
              (["que modelo","modelo exacto","que version"],
               "Hola! El modelo exacto está en el título. Especificaciones en la descripción."),
              (["bateria","cuanto dura","duracion bateria","horas de reproduccion"],
               "Hola! La duración depende del volumen y uso. Consulta las specs oficiales en la descripción."),
              (["resistente al agua","agua","sumergible","ipx"],
               "Hola! Según el fabricante tiene resistencia al agua IP67."),
              (["bluetooth","se conecta","compatible con","funciona con","iphone","android"],
               "Hola! Funciona con cualquier dispositivo Bluetooth (iPhone, Android, PC)."),
              (["recoger","paso por el","ir por el","entrega en mano"],
               "Hola! Solo manejamos envío por MercadoEnvíos, no hay recolección en persona."),
              (["efectivo","oxxo","contraentrega","pago contra"],
               "Hola! Pagos por MercadoPago (tarjeta, OXXO, SPEI). No manejamos pago contra entrega."),
              (["jbl","marca"],
               "Hola! Sí, es marca JBL 100% original."),
          ]
          
          r = requests.get(f"https://api.mercadolibre.com/questions/search?seller_id={sid}&status=UNANSWERED&limit=50&sort_fields=date_created&sort_types=ASC", headers=h, timeout=15)
          pending = r.json().get("questions",[]) or []
          print(f"=== {len(pending)} PENDIENTES ===")
          
          SIG = "\n\n— Sonix Mx"
          answered = []; unmatched = []
          for q in pending:
              qid = q.get("id"); qt = q.get("text","")
              qn = norm(qt).strip()
              matched = None
              for keys, resp in templates:
                  for k in keys:
                      if k.startswith("^") and k.endswith("$"):
                          if re.match(k, qn): matched = resp; break
                      elif k in qn:
                          matched = resp; break
                  if matched: break
              if not matched:
                  unmatched.append((qid, qt))
                  continue
              r_a = requests.post("https://api.mercadolibre.com/answers", headers=h,
                  json={"question_id": int(qid), "text": matched + SIG}, timeout=15)
              if r_a.status_code == 200:
                  answered.append((qid, qt[:50]))
                  print(f"  ✓ {qid} | {qt[:50]}")
              else:
                  unmatched.append((qid, qt))
          print(f"  Respondidas: {len(answered)}")
          print(f"  Sin template: {len(unmatched)}")
          for qid, qt in unmatched[:10]:
              print(f"    · {qid}: {qt[:80]}")
          
          # 2) Resumen de AYER
          now = datetime.now(timezone.utc)
          today_start = now.replace(hour=0,minute=0,second=0,microsecond=0)
          yest_start = today_start - timedelta(days=1)
          yest_end = today_start
          
          print(f"\n=== RESUMEN AYER ({yest_start.strftime('%Y-%m-%d')}) ===")
          # Ventas
          r = requests.get(f"https://api.mercadolibre.com/orders/search?seller={sid}&order.date_created.from={yest_start.strftime('%Y-%m-%dT%H:%M:%S.000Z')}&order.date_created.to={yest_end.strftime('%Y-%m-%dT%H:%M:%S.000Z')}&limit=50", headers=h, timeout=15)
          orders = r.json().get("results",[])
          total = sum(float(x.get('total_amount',0)) for x in orders)
          # Split by status
          paid = [o for o in orders if o.get("status") == "paid"]
          cancelled = [o for o in orders if o.get("status") == "cancelled"]
          other = [o for o in orders if o.get("status") not in ("paid","cancelled")]
          
          print(f"Total órdenes: {len(orders)} | Revenue bruto: ${total:,.0f}")
          print(f"  Pagadas: {len(paid)} | ${sum(float(x.get('total_amount',0)) for x in paid):,.0f}")
          print(f"  Canceladas: {len(cancelled)} | ${sum(float(x.get('total_amount',0)) for x in cancelled):,.0f}")
          print(f"  Otras: {len(other)}")
          
          # Por item
          by_item = {}
          for o in paid:
              for oi in o.get("order_items",[]):
                  k = oi.get("item",{}).get("id","?")
                  t = oi.get("item",{}).get("title","?")[:45]
                  by_item[k] = by_item.get(k, [0, t, 0])
                  by_item[k][0] += 1
                  by_item[k][2] += float(o.get("total_amount",0))
          print(f"\nVentas pagadas ayer por item:")
          for iid, (n, t, amt) in sorted(by_item.items(), key=lambda x:-x[1][0]):
              print(f"  {n}x ${amt:,.0f} | {t}")
          
          # Cancelaciones detalle
          if cancelled:
              print(f"\nCanceladas ayer:")
              for o in cancelled[:10]:
                  cd = o.get("cancel_detail") or {}
                  group = cd.get("group","?")
                  reason = cd.get("code") or "?"
                  buyer = (o.get("buyer") or {}).get("nickname","?")
                  amt = o.get("total_amount",0)
                  items = ",".join(oi.get("item",{}).get("title","?")[:30] for oi in o.get("order_items",[]))
                  print(f"  ${amt} | {buyer} | [{group}/{reason}] | {items}")
          
          # Q&A stats ayer
          r = requests.get(f"https://api.mercadolibre.com/questions/search?seller_id={sid}&status=ANSWERED&limit=50&sort_fields=date_created&sort_types=DESC", headers=h, timeout=15)
          qs_ans = r.json().get("questions",[]) or []
          ans_yesterday = [q for q in qs_ans if yest_start.strftime("%Y-%m-%d") in (q.get("date_created") or "")]
          print(f"\nPreguntas respondidas ayer: {len(ans_yesterday)}")
          PY
