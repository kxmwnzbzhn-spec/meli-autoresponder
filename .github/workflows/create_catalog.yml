name: Create Redmi catalog listing
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token",
              "client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],
              "refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}", "Content-Type":"application/json"}
          
          CATALOG = "MLM2014404762"
          PRICE = 149
          OUR_CAT = "MLM5072"
          TITLE = "Auriculares Xiaomi Redmi Buds 4 Lite Bluetooth Negros"
          
          # Try multiple combinations until one works
          attempts = [
              {"label":"used+me2","condition":"used", "shipping":{"mode":"me2","free_shipping":False,"local_pick_up":False}},
              {"label":"used+me2+free","condition":"used", "shipping":{"mode":"me2","free_shipping":True,"local_pick_up":False}},
              {"label":"new+me2","condition":"new", "shipping":{"mode":"me2","free_shipping":False,"local_pick_up":False}},
              {"label":"new+me2+free","condition":"new", "shipping":{"mode":"me2","free_shipping":True,"local_pick_up":False}},
          ]
          
          success_id = None
          for att in attempts:
              body = {
                  "title": TITLE,
                  "category_id": OUR_CAT,
                  "catalog_listing": True,
                  "catalog_product_id": CATALOG,
                  "condition": att["condition"],
                  "listing_type_id": "gold_pro",
                  "price": PRICE,
                  "currency_id": "MXN",
                  "available_quantity": 1,
                  "sale_terms": [
                      {"id": "WARRANTY_TYPE", "value_name": "Garantía del vendedor"},
                      {"id": "WARRANTY_TIME", "value_name": "30 días"}
                  ],
                  "shipping": att["shipping"]
              }
              r = requests.post("https://api.mercadolibre.com/items", headers=h, json=body, timeout=30)
              resp = r.json()
              print(f"\n=== ATTEMPT {att['label']} → {r.status_code} ===")
              if r.status_code in (200,201):
                  success_id = resp.get("id")
                  print(f"SUCCESS: {success_id} | {resp.get('permalink','')}")
                  break
              else:
                  errs = resp.get("cause", [])
                  for e in errs[:3]:
                      print(f"  err: {e.get('code')} | {e.get('message','')[:100]}")
          
          if success_id:
              # Save catalog state
              state_file = "catalog_listings.json"
              try:
                  with open(state_file) as f: st = json.load(f)
              except: st = {}
              st[CATALOG] = {"item_id": success_id, "floor": 120, "step": 10, "last_price": PRICE,
                             "last_check": None, "active": True,
                             "label": "Redmi Buds 4 Lite Negro"}
              with open(state_file,"w") as f:
                  json.dump(st, f, indent=2)
              tt=os.environ.get("TELEGRAM_BOT_TOKEN"); tc=os.environ.get("TELEGRAM_CHAT_ID")
              if tt and tc:
                  requests.post(f"https://api.telegram.org/bot{tt}/sendMessage", json={
                      "chat_id":tc, "parse_mode":"Markdown",
                      "text":f"🎯 *Catalog listing creado*\n\n`{success_id}` Redmi Buds 4 Lite\nPrecio: $149 | Floor: $120 | Step: $10"
                  })
          else:
              print("\n✗ All attempts failed")
          PY
      - name: Commit state
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add catalog_listings.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "[auto] catalog_listings.json"
          git push || echo "nothing to push"
