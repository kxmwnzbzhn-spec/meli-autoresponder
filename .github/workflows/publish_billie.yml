name: Publish Billie Eilish
on: {workflow_dispatch: {}}
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token", data={
              "grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
              "client_secret":os.environ["MELI_APP_SECRET"],"refresh_token":os.environ["MELI_REFRESH_TOKEN"]
          }, timeout=20)
          tok = r.json()["access_token"]; h = {"Authorization":f"Bearer {tok}","Content-Type":"application/json"}
          
          # Browse categories to find perfumes
          print("MLM root categories:")
          r = requests.get("https://api.mercadolibre.com/sites/MLM/categories", headers=h, timeout=15)
          for c in r.json():
              if 'belleza' in c.get('name','').lower() or 'perfume' in c.get('name','').lower():
                  print(f"  {c.get('id')} - {c.get('name')}")
          
          # Common perfume cats in MLM
          for cat in ["MLM109003","MLM109012","MLM175794","MLM1246","MLM87195"]:
              r = requests.get(f"https://api.mercadolibre.com/categories/{cat}", headers=h, timeout=10)
              if r.status_code == 200:
                  c = r.json()
                  listing_types = [s.get("site_id") for s in c.get("settings",{}).get("listing_allowed_attributes",[])]
                  print(f"  {cat} | {c.get('name')}")
          
          # Best bet: MLM109003 is Perfumes.
          # Try predicting via the correct API
          print("\nPredict:")
          r = requests.get("https://api.mercadolibre.com/sites/MLM/domain_discovery/search?limit=3&q=Billie%20Eilish%20Perfume%20100ml", headers=h, timeout=15)
          print(r.text[:600])
          PY
