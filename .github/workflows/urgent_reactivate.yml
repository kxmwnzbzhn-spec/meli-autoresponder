name: urgent-reactivate
on:
  workflow_dispatch:
  schedule:
    - cron: '*/3 * * * *'  # cada 3 min — safety net además del replenish principal
permissions:
  contents: write
concurrency:
  group: urgent-reactivate
  cancel-in-progress: true
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python scripts/urgent_reactivate.py
        env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN_CLARIBEL: ${{ secrets.MELI_REFRESH_TOKEN_CLARIBEL }}
