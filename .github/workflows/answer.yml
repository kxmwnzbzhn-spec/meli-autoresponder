name: Answer question (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}", "Content-Type":"application/json"}

          # Traer la pregunta sin responder
          item_id = "MLM2874367731"
          q = requests.get("https://api.mercadolibre.com/questions/search",
              params={"item": item_id, "status":"UNANSWERED"}, headers=H).json()
          questions = q.get("questions",[])
          if not questions:
              print("No hay preguntas UNANSWERED"); exit(0)

          qu = questions[0]
          qid = qu.get("id")
          qtext = qu.get("text","")
          print(f"Pregunta [{qid}]: {qtext}")

          answer = (
              "Buenas tardes. Agradecemos su interes. La JBL Go 4 cuenta con "
              "tecnologia Auracast gracias a su Bluetooth 5.3, lo que permite "
              "vincularla con otras bocinas JBL compatibles para reproduccion "
              "simultanea. Sin embargo, este modelo no es compatible con la "
              "aplicacion JBL Portable ni con ninguna aplicacion de JBL; su "
              "operacion es directa mediante conexion Bluetooth, sin requerir "
              "configuracion adicional. Quedamos a sus ordenes para cualquier "
              "otra consulta. Saludos cordiales."
          )
          print(f"\nRespuesta a enviar:\n{answer}\n")

          r = requests.post("https://api.mercadolibre.com/answers",
              headers=H,
              json={"question_id": qid, "text": answer})
          print(f"POST /answers status={r.status_code}")
          try:
              rj = r.json()
              print(json.dumps(rj, indent=2, ensure_ascii=False)[:1200])
          except:
              print(r.text[:500])
          PY
