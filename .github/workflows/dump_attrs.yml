name: Dump category attributes (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          tk = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token","client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = tk["access_token"]
          H = {"Authorization": f"Bearer {AT}"}

          attrs = requests.get("https://api.mercadolibre.com/categories/MLM59800/attributes", headers=H).json()
          print(f"TOTAL_ATTRS={len(attrs)}")
          for a in attrs:
              vals = a.get("values") or []
              tags = a.get("tags") or {}
              flags = []
              if tags.get("required"): flags.append("REQ")
              if tags.get("catalog_required"): flags.append("CAT_REQ")
              if tags.get("conditional_required"): flags.append("COND_REQ")
              if tags.get("hidden"): flags.append("HID")
              if tags.get("read_only"): flags.append("RO")
              if tags.get("allow_variations"): flags.append("VAR")
              flag_s = ",".join(flags) or "."
              vt = a.get("value_type")
              vmax = a.get("value_max_length")
              top_vals = [v.get("name") for v in vals[:8]]
              print(f"  {a['id']}|{a['name']}|{vt}|{flag_s}|len={vmax}|vals={top_vals}")
          PY
