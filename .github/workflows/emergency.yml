name: Emergency stock check (one-shot)
on:
  workflow_dispatch:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: .meli_token.json
          key: meli-refresh-token
          restore-keys: meli-refresh-token
      - uses: actions/cache@v4
        with:
          path: .seen_claims.json
          key: seen-state
          restore-keys: seen-state
      - run: pip install requests
      - env:
          MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
          MELI_APP_SECRET: ${{ secrets.MELI_APP_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
        run: |
          python3 <<'PY'
          import os, json, requests
          r = requests.post("https://api.mercadolibre.com/oauth/token",
              data={"grant_type":"refresh_token",
                    "client_id":os.environ["MELI_APP_ID"],
                    "client_secret":os.environ["MELI_APP_SECRET"],
                    "refresh_token":os.environ["MELI_REFRESH_TOKEN"]}).json()
          AT = r["access_token"]
          H = {"Authorization": f"Bearer {AT}"}
          item_id = "MLM2872698375"
          it = requests.get(f"https://api.mercadolibre.com/items/{item_id}", headers=H).json()
          print("=== STATUS ITEM ===")
          print(f"  id: {it.get('id')}")
          print(f"  status: {it.get('status')}")
          print(f"  sub_status: {it.get('sub_status')}")
          print(f"  available_quantity: {it.get('available_quantity')}")
          print(f"  sold_quantity: {it.get('sold_quantity')}")
          print(f"  last_updated: {it.get('last_updated')}")
          print(f"  health: {it.get('health')}")

          # .seen_claims.json estado
          import os.path
          if os.path.exists(".seen_claims.json"):
              with open(".seen_claims.json") as f:
                  state = json.load(f)
              print("\n=== STATE (seen_claims) ===")
              if "_stock_config_dirty" in state:
                  print(f"  _stock_config_dirty: {state.get('_stock_config_dirty')}")
              if "return_states" in state:
                  print(f"  return_states keys: {list(state.get('return_states', {}).keys())}")
              print(f"  claim_states count: {len(state.get('claim_states', {}))}")
              print(f"  seller_id: {state.get('seller_id')}")
          else:
              print("\n  .seen_claims.json no existe")

          # Ordenes recientes del vendedor
          me = requests.get("https://api.mercadolibre.com/users/me", headers=H).json()
          sid = me["id"]
          ord_r = requests.get(f"https://api.mercadolibre.com/orders/search",
              params={"seller": sid, "sort":"date_desc", "limit": 10}, headers=H).json()
          print(f"\n=== ORDENES RECIENTES (total vendedor={ord_r.get('paging',{}).get('total',0)}) ===")
          for o in ord_r.get("results",[])[:5]:
              item_ids = [(oi.get('item') or {}).get('id') for oi in o.get('order_items',[])]
              print(f"  order={o.get('id')} status={o.get('status')} pay={[p.get('status') for p in o.get('payments',[])]} items={item_ids} total=${o.get('total_amount')} date={o.get('date_created','')[:19]}")
          PY
